line:0dc3dde: A suspicious sound comes from the Bamboo Forest…
line:06c46e2: "\"The vibe's off? I'm heading out.\""
line:0257156: "\"No way~ Why don't you try fishing one yourself?\""
line:0f52646: "\"What, you want |{0}|? I'm in a good mood, so I'll give it to you.\""
line:00dc681: "\"Hmm... I don't want this in the first place. Here, you can have it.\""
line:09c940c: "\"Oh my, you're so irritable.\""
line:0a0da16: '"Too bad, it’s already part of my collection."'
line:0eab3e1: "\"After all, I'm so strong. It's only normal to forgive me.\""
line:07cb2be: "\"You were a step too slow. I'm confident in my speed after all.\""
line:0155b90: "\"This is mine! I'm not giving it to you!\""
line:0640b79: '"Oh, do you need |{0}|? You can have it."'
line:0003aa9: '"Please wait a moment—I have an extra |{0}|. Feel free to take one
  if you need it."'
line:0ed1f87: "\"Sometimes it's nice not to think about anything at all~\""
