"line:0e80e9a": '"Oh, hey, {0}! You''ve encountered the kappa''s drones, right?"'
"line:00a9945": '"Those are knock-offs of our patent in the Lunar Capital. We hope
  you''ll help us defend our intellectual property."'
"line:05575e9": "[Help] Get card: |{0}|."
"line:09ee960": '"What''s an intellectual property? All I know is that those drones
  are annoying."'
"line:0deca08": "\"Much appreciated! This new countermeasure weapon developed by the\
  \ Lunar Capital will be of assistance.\"\n(Great, now I don't need to run errands\
  \ and do test runs!)"
"line:0ddd7b7": '[Continue]'
"line:0b93b5a": "[Refuse] Get three random Tool cards and gain Misfortune: |{0}|."
"line:0a26145": '"What''s some moon rabbit ordering me around for? Do I have to teach
  you a lesson?"'
"line:0b3160d": '"No-no-no, I wouldn''t dare! Forget about me, you just met a rabbit
  on her way to buy some dango."'
"line:080f7f2": 'Ringo takes out a strange stick-shaped instrument and waves it in
  front of {0}, dropping a bunch of stuff and fleeing.'
"line:06797b6": '"...Huh? A moon rabbit buying dango on Earth? How strange."'
"line:0c1abfc": '"Woah! Who left all these gadgets here...?"'
"line:095a793": '[None of My Business] Nothing happens.'
"line:0bfddbe": '"This sounds like something Eiki would be able to handle. Go ask
  her."'
"line:065ee92": '"If a yama could handle a copyright dispute, maybe she could also
  handle us moon rabbits'' labor disputes."'

line:00f11f7: "\"I'm the strongest. I'll freeze you if you don't believe me.\""
line:01cf70f: "\"I'm not signing any contracts without carefully reading the fine\
  \ print. See you later.\""
line:057628f: '"Ugh, the wall of text is making me dizzy."'
line:014c651: "\"You make such a good point, I'm convinced...\""
line:082e36e: '"Exterminating drones is a piece of cake."'
line:0659c8a: "\"The drones won't freeze, I hate them, destroy them all!\""
line:0250688: "\"So that thing is called a drone, then I won't hesitate to destroy\
  \ it.\""
line:00f79ea: "\"You're not in with those telecom scammers, are you? Should I take\
  \ you down right now?\""
line:06e4380: '"This is so suspicious. Should I ask my sis to take a look?"'
line:0966360: "\"I'm not signing any contracts without carefully reading the fine\
  \ print. See you later.\"\n\"There isn't any fine print here... Hold on, let me\
  \ read it through.\""
line:010ac9a: "\"That's a bit too much to ask of a fairy, isn't it...\""
line:0ed06df: "\"I don't really understand intellectual property and stuff like that,\
  \ and I don't want to understand it either.\""
line:0d19c44: '"I wish a few easy clients would come by. It’s tough being a front-line
  salesperson..."'
line:0e52736: "\"Your Lunarian business are nothing but trouble. You'd better not\
  \ drag me into this.\""
