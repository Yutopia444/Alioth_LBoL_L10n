line:008fa52: "\"Come on, let's support Kaguya-chan together!\""
line:0678716: '[Receive Clothes] Gain Exhibit: |Idol T-Shirt|.'
line:0670be2: '"Remember to wear it for everyone to see!"'
line:00d22b0: '[Leave] Nothing happens.'
line:0fc2c16: '"{Censor:select false=\"Eugh, ''Kaguya-chan''. Talk about gross.\"
  true=\"Ugh, your outfit was already weird enough—let''s just forget about it.\"}"'
line:0ba9037: "\"It's free? I'll take one, then.\""
line:063a72b: '"According to my research, I have found that Kaguya-chan is warm and
  friendly, unlike other lunarians."'
line:01566ec: '[Trade Clothes] Gain Exhibit: |Idol T-Shirt (Large)|.'
line:059fbd3: "\"It's free? I'll take one, then. A large one.\""
line:0ba87b6: '"Remember to wear it for everyone to see!"'
line:062b5d5: '"Free? That means I could borrow it without returning, right?"'
line:0f24388: '"Things made for the strongest should be free."'
line:0a99c1c: "\"Well, I'll take this large one! This looks great!\""
line:0bd1ffa: '"The ice will melt if I wear black..."'
line:00a6aad: "\"Woah~ This~ isn't~ cute at all!\""
line:00d286e: '"Free of charge? Let me dress my sis up with this tonight."'
line:022c403: "\"Free, you say? The souvenir I'm bringing for Milady this time is\
  \ quite unique.\""
line:0a28c4c: '"Great opportunity—give me the large one!"'
line:0c1968a: "\"I'll take this as a souvenir for Meiling. Just hand me the larger\
  \ one for now.\""
line:0e45c03: "\"Of course I'm taking the largest one!\""
line:055f5d6: "\"It doesn't even look like it would work well as a rag.\""
