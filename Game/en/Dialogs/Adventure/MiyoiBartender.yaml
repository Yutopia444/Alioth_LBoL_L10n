"line:0c9cdfa": '{0} mistakenly enters late-night |Sanshoku Geidontei|. A heavy smell
  of alcohol permeates the building…'
"line:0c66585": '"Miss {0}! Come in! What would you like today?"'
"line:0868bad": '(Geidontei... If I remember correctly, it opens to youkai during
  the night.)'
"line:061da42": '[A Swig] Gain Exhibit: |{0}|. Remove a card from the library.'
"line:096d262": '"Give me some of that special sake Aya drank last time!"'
"line:0da2517": '"THAT sake? Are you sure you can handle it, Miss {0}?"'
"line:05ad143": '"Ack... it''s this big?! But everyone is looking at me, I can''t
  turn back now!"'
"line:0c7c734": '({0} finally finishes the |Breath of the Whale|, but due to the booze,
  she forgets the bill and something important.)'
"line:0269654": 'Did I forget something...? Choose one card to remove.'
"line:018cd9a": "[Drinking Competition] Gain {0} <sprite=\"Point\" name=\"Gold\">\
  \ and gain two Misfortunes: |{1}|."
"line:0c77879": '"What''s wrong, Suika? You''ve been giving me that smug look ever
  since I entered."'
"line:0b95170": '"What''s that, {0}? Miss black-out-in-one-cup issuin'' me a challenge?"'
"line:00d22c7": 'The surrounding youkai start cheering. Some even make bets on who
  would emerge victorious.'
"line:0bdfac4": '"You tryin'' to raise a pet whale? That ain''t enough!"'
"line:0064f30": '"Behold my ultimate attack, Depth Charge!"'
"line:0c29c84": "Overflowing with resolve, {0} emerges victorious and takes home the\
  \ prize.\nWas it worth it, though?"
"line:0bea743": '[A Sip] Fight a random group of enemies and get a random Rare Exhibit.'
"line:05203c5": '"Yes, yes, I''ll have the usual. Keep it on my tab, alright?"'
"line:0862f2d": '"Hey—don''t you still owe me last month''s bill?"'
"line:015f1aa": '"Ugh, why do I feel so sleepy after just one... glass..."'
"line:024e390": '(In a dream, {0} senses a suspect''s presence!)'
"line:0e46351": '"Such powerful illusions... did you add something to the sake?!"'
"line:0b0300d": '"Uwah! Please take this and keep it a secret!"'
"line:0b3a02b": "[Accept] Gain Exhibit: |{0}|."
"line:0bd13e0": '"Now that''s how you do business. See you next time!"'
"line:0d8166c": '[Refuse] Nothing happens.'
"line:01b5a50": '"No thanks, I''m not falling for your tricks anymore."'
"line:0ea1dc5": '[Invalid] All eligible Exhibits have been acquired.'

line:079518c: '"You drunk oni, your head must be filled with nothing but alcohol."'
line:0ad4f5f: "\"I don't care about the alcohol content or anything like that!\""
line:0bc049a: "\"Oh, I guess I'll just run a tab like usual.\""
line:0516764: "\"That's some pretty intense hallucinations... Does regular sake usually\
  \ do this?\""
line:0b5dc3f: "\"I'll be back next time~\""
line:09e6032: "\"I'm heading back today!\""
line:0c520a6: "\"I won't be coming back, you know~\""
line:0457b1b: "\"Way to go! We'll be counting on you the next time as well.\""
line:06ae762: "\"Can we put that on our gatekeeper's tab?\""
line:09bf9df: "\"Suika, what's going on? You've been looking down on me ever since\
  \ we started.\""
line:07f78ec: '"Oh my, I’ve felt eyes on me ever since I walked in. What’s going on?"'
line:09fc586: "\"Hey! Just because you think I'm the strongest doesn't mean you can\
  \ go around taunting me.\""
line:08fdecb: '"Miss oni, have you been staring at me this whole time?"'
line:0682132: "\"Don't underestimate a shrine maiden's drinking ability—I'm a pro\
  \ at this.\""
line:0a9ad13: "\"Don't say such stupid things!.. Bring me a stronger one!\""
line:025d5c2: "\"Don't underestimate me! I can even call on all the fairies to drink\
  \ with you!\""
line:05e7e3f: '"Oooooh~ The world is spinning~~ This is starting to get fun!"'
line:00dd0ad: "\"I'll pay next time I come by. Until then, just give me a little time~\""
line:0187bf6: '"Money!? I have none of that!"'
line:0ceddc8: '"Well then, bye-bye!"'
line:0d1602b: "\"I'm starting to hallucinate... Just how strong was that sake you\
  \ gave me!?\""
line:0ce111a: "\"That's some serious hallucinations... You didn't happen to add something\
  \ in the sake, did you?\""
line:0fcf6e4: '"Ugh... I feel awful... So that means someone must have added something
  suspicious in this sake!"'
line:00d591a: '"Hmm... That sake earlier... it felt like something strange had been
  added in..."'
line:09556a4: "\"That's quite a lot to handle. I'll be stopping by more often.\""
line:0365d92: "\"That's so generous! I'll definitely stop by again.\""
line:0c15665: "\"Oh, you're giving this to me!? You're such a nice person!\""
line:05290b5: "\"Hey, hey, cut me some slack—I'm calling it a day.\""
