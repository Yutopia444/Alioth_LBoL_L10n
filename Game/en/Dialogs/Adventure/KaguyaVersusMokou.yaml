"line:04ceb26": '"{Censor:select false=\"''Game Girl Advance'' is the best portable
  console! I won''t let you badmouth ''Nentendo''!\" true=\"You dare call yourself
  a gamer even though you never owned a single game cartridge? I won''t let a bookworm
  like you tarnish our reputation!\"}"'
"line:06b80ce": '"{Censor:select false=\"A company that can''t even understand the
  concept of the ''metaverse''? It''s as lousy as your expo!\" true=\"Who in this
  day and age would stockpile non-fireproof products at home? I''d say, just like
  you, your expo is out of touch with the times!\"}"'
"line:0bc6368": '(I have no idea what they''re fighting over, but if they continue
  to fight, the thief might use the chaos to get away.)'
"line:008a9a4": "[Help Kaguya] Lose {0} life, gain Exhibit: |{1}|."
"line:07ab6fd": '{0} tries to separate them by force—after blocking a few punches
  from Mokou, Kaguya gradually gets the upper hand.'
"line:0921fbf": '"Tch, stop being nosy, {0}..."'
"line:0219773": '"Please accept this as a token of my appreciation, Miss {0}! I''m
  counting on you to resolve the incident."'
"line:09d8d02": '[Continue]'
"line:0d3703c": "[Help Mokou] Lose {0} life, gain Exhibit: |{1}|."
"line:0f73a43": '"{Censor:select false=\"Don''t fight anymore! I heard that ''Moneyverse''
  technology can bring in a lot of wealth!\" true=\"Don''t fight anymore! Even Rinnosuke
  hasn''t collected that many CDs!\"}"'
"line:04fec24": '{0} tries to separate them with force—in the chaos, Mokou gradually
  gets the upper hand.'
"line:015db7a": '"Hmph, this isn''t over!"'
"line:0c1db12": '"It seems {0} is on the same page. As one of my people, I''ll give
  you this souvenir as thanks."'
"line:0460217": '[Continue]'
"line:0db14e0": '[Pass By] Nothing happens.'
"line:0677c42": '"{Censor:select false=\"You say that, but then why did you ask me
  ''Are the game consoles Rinnosuke bought on display?''\" true=\"You say that, but
  then why did you ask me ''Is the packaging design for the new game attractive?''\"}"'
"line:0a72879": '"I just came to see if your expo is as good as you claim! Turns out
  it''s just as bad as I imagined!"'
"line:01185cd": '"I''ll just leave them alone..."'

line:0848d98: "\"{Censor:select false=\\\"Don't fight anymore! Nentendo's 'Ultimate\
  \ Mariso: Galaxy' is really fun to play!\\\" true=\\\"Stop fighting! I couldn't\
  \ borrow digital games from others because they aren't on CDs!\\\"}\""
line:093aa03: "\"{Censor:select false=\\\"Stop it, please! Milady also likes to play\
  \ 'Scarletvania: Symphony of the Devil' on that console!\\\" true=\\\"Stop it, please!\
  \ If you play with Milady, you could win a free game console right now!\\\"}\""
line:02e8c97: "\"{Censor:select false=\\\"Don't fight anymore! I heard 'Nentendo'\
  \ has a strategy game about fire!\\\" true=\\\"Don't fight anymore! Local small\
  \ businesses like Kourindou will face an economic crisis if no one buys CDs anymore!\\\
  \"}\""
line:0e1beb9: "\"{Censor:select false=\\\"Don't fight anymore! I heard that everything\
