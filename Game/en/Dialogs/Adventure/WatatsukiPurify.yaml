"line:05fe9e1": '"There you are, Master Eirin''s assistant. Allow me to lend you a
  hand."'
"line:0220408": "[Recite Prayer] Lose {0} maximum life, gain two |{1}|."
"line:08e2a8a": '"I borrowed the Kagura bell of |Idunome| from Yorihime. Let it rid
  you of impurity."'
"line:050b98e": 'With the Kagura bell''s blessing, {0} feels a small amount of her
  impurity dissipate…'
"line:022c54a": '"Thanks!"'
"line:015cd2b": "[Consume Peach] Increase maximum life by {0}, gain Misfortune: |{1}|."
"line:07b8cb5": '"If you don''t mind, you can eat this peach I brought. It''s sweet,
  you know."'
"line:005d895": 'Despite smelling like suspicious industrial additives, the Lunar
  Capital''s genetically modified peaches are still very delicious.'
"line:09c8a85": '"It tastes way too good!"'
"line:0c671d8": '[Refuse] Nothing happens.'
"line:0b9590a": '"I could solve a small incident like this with my eyes closed!"'
"line:0c46a1e": '"That is fine. I''m only here to catch up with Master Eirin anyways."'

line:0c4ae27: '"Thanks!"'
line:0eb127d: '"Thanks!"'
line:00ebbaa: '"Thanks!"'
line:0052cc6: '"Thanks!"'
line:0b908c2: '"Thanks!"'
line:07574a3: "\"This is delicious. Why didn't you serve me this when I was on the\
