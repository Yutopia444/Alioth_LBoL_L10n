line:087180e: "\"I'm already the strongest even without that! I don't need it!\""
line:0b3c5dd: "\"So sweet and delicious~, I'm feeling perked up.\""
line:0cc6dc5: '"This tasted great! I wish I could have had this when I went to the
  moon last time!"'
line:0aeaa2e: '"This is so delicious! I have to take some back for Milady."'
line:0e687b1: "\"Woah—! That's delicious! Is there any more!?\""
line:07974a1: "\"No need. If you've already stepped in, what use are incident-resolution\
