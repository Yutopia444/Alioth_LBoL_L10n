VictoryLong:
  Name: Victory (Extended)
  Original: Gensokyo Millennium ~ History of the Moon
  TrackName: Victory (Extended)
MainMenu:
  Name: Main Menu
  Original: Gensokyo Millennium ~ History of the Moon
  TrackName: The Nineteenth Form of Fantasy
  Comment: "An experimental electronic music inspired by \"Gensokyo Millennium\".\
    \ The composition emphasizes the contrast between the intro and the chorus, revealing\
    \ the game's nature of being both lighthearted and action-packed.\nRegarding the\
    \ description of \"The Nineteenth Form\": This is our nineteenth piece of \"Gensokyo\
    \ Millennium\", and we are still exploring the various possibilities of this composition."
Shop:
  Name: Takane's Shop
  Original: Banditry Technology
  TrackName: A Break in the Woods
  Comment: "This is a song that captures the relaxed vibe of a holiday.\nStop fighting\
    \ with each other—let's sit this one out together!"
Adventure3:
  Name: Event 3
  Original: Girls' Secret Sealing Club
  TrackName: Left Behind
  Comment: "This is a song written when the composer is being emotional.\nMaybe the\
    \ emoticon “ORZ” captures the mood best?"
Aya:
  Name: Aya Shameimaru
  Original: Youkai Mountain ~ Mysterious Mountain
  TrackName: A Hasty Story
  Comment: "This is the character-specific battle theme for Aya Shameimaru.\nWherever\
    \ the wind blows, the sound of cameras clicking follows. Truth and falsehood,\
    \ right and wrong, reality and fiction all find their way into the newspapers,\
    \ dispelling the boredom of the afternoon. But if you look closer, you’ll find\
    \ that most of it is nothing more than unverified rumors, which can’t help but\
    \ make one sigh, “Typical journalism standards.”"
