Stage1:
  Name: 'Act 1: Bamboo Forest of the Lost'
  Original: Retribution for the Eternal Night ~ Imperishable Night
  TrackName: Night Chasers
  Comment: "The theme of Bamboo Forest of the Lost, the first stage theme.\nThis piece\
    \ is filled with the excitement of battle, quickly getting the player to be ready\
    \ for the upcoming battles.\nIt also incorporates sounds reminiscent of birdsing\
    \ to enhance the night-time atmosphere of the track."
Stage2:
  Original: Fall of Fall ~ Autumnal Waterfall
  Name: 'Act 2: Genbu Ravine'
  TrackName: Discovery & Discoverer
  Comment: "The theme of Genbu Ravine, the second stage theme.\nThis piece gives off\
    \ a heavy feeling of mystery and unknown adventure. It features extensive use\
    \ of ethnic percussion, letting the player feel that they are in an unknown place."
Stage3:
  Name: "Act 3: Wind God's Lake"
  Original: The Primal Scene of Japan the Girl Saw
  TrackName: Hermit Sought on Wind
  Comment: "The theme of Wind God's Lake, the third stage theme.\nThis piece feels\
    \ like cruising along the winds. Does it feel like the danmaku is right ahead?\
    \ Let's dance in the upcoming battles alongside the theme!"
Gap:
  Name: Inside a Gap
  Original: Necrofantasia
  TrackName: Nightfall Melody
  Comment: "This is an European-styled song.\nWith the elegant harpsichord and serene\
    \ glockenspiel, it makes one feel very relaxed and especially want to take a break."
Adventure1:
  Name: Event 1
  Original: Gensokyo Millennium ~ History of the Moon
  TrackName: Set Out
  Comment: "This is a cheerful, narrative-driven song.\nIt features the Irish whistle,\
    \ marimba, and a variety of percussion instruments playing in unison. The intertwining\
    \ melodies evoke the sense of wonder felt by an adventurer preparing to set out\
    \ into the world."
Adventure2:
  Name: Event 2
  Original: The Gensokyo the Gods Loved
  TrackName: Playing in the Woods
  Comment: "This is a song that conveys a sense of lightheartedness and positivity.\n\
    The introduction's piano evokes the quiet atmosphere of a forest, with the cheerful\
    \ violin serving as the main melody, creating a vivid image of carefree play in\
    \ the woods."
Elite1:
  Name: Elite 1
  Original: Eternal Transient Reign
  TrackName: Do Not Underestimate
  Comment: "This is the song that plays when an elite appears.\nThe intense rhythm\
    \ serves as a reminder that a major battle is about to begin. Are they confident\
    \ in their victory?"
Elite2:
  Original: Bell of Avīci ~ Infinite Nightmare
  Name: Elite 2
  TrackName: Standoff
  Comment: "This is the song that plays when an elite appears.\nThe intense rhythm\
    \ captures the tension and excitement of battle—if the player doesn’t give it\
    \ their all, they’ll be defeated in no time!"
Sanyue:
  Original: The Refrain of the Lovely Great War/Great Fairy Wars ~ Fairy Wars
  Name: Three Fairies of Light
  TrackName: Curious & Alert & Mischievous
  Comment: "This is the character-specific battle theme for the Three Fairies of Light.\n\
    1v1 battles are long outdated; 3v1 is the true definition of friendship. Sneak\
    \ up silently, leaving but a faint trace behind. Getting impatient? You sure are!\
    \ Now we can finally kick off a full-scale war with pride!"
Rin:
  Name: Rin Kaenbyou
  Original: Corpse Voyage ~ Be of good cheer!
  TrackName: Spirit Channeler
  Comment: "This is the character-specific battle theme for Rin Kaenbyou.\nUnwelcomed\
    \ youkai lurking in the shadows, waiting for their chance—so if you're being targeted,\
    \ you'd better watch out. When vengeful spirits from the underworld are closing\
    \ in, you'll have no choice but to face them head-on. However, is the Hell's Traffic\
    \ Accident's reputation a mere empty title?"
Kokoro:
  Name: Hata no Kokoro
  Original: The Lost Emotion
  TrackName: Ǝmotioɲ
  Comment: "This is the character-specific battle theme for Hata no Kokoro.\nIs it\
    \ a smiling or a crying face behind the mask? A thousand emotions give rise to\
    \ a thousand expressions—some reassuring, some hiding danger. See through the\
    \ disguise and you may find her true emotions, possibly a key to defeating her."
Clownpiece:
  Name: Clownpiece
  Original: Pierrot of The Star-Spangled Banner
  TrackName: Chaotic paradise
  Comment: "This is the character-specific battle theme for Clownpiece.\nThe chaos\
    \ from hell is her gift bestowed upon humanity, and transforming the Lunar Capital\
    \ into a chaotic paradise is also the most urgent task. You still got time to\
    \ escape before facing this incident. 3, 2, 1... Time's up!"
Siji:
  Name: Eiki Shiki
  Original: Eastern Judgement in the Sixtieth Year ~ Fate of Sixty Years
  TrackName: THe last judgment
  Comment: "This is the character-specific battle theme for Eiki Shiki.\nThe final\
    \ judgement is about to begin. Before the judge, confess your sins. Then, grant\
    \ everyone a chance to resist: fight for their freedom, or atone for your sins\
    \ in hell."
Reimu:
  Name: Reimu Hakurei
  Original: Maiden's Capriccio ~ Dream Battle
  TrackName: Form of Spirit Seal
  Comment: "This is the character-specific battle theme for Reimu Hakurei.\nAt the\
    \ starting point of the adventure, she stands there as always, waiting for her\
    \ challengers. The eternal Form of Spirit Seal, along with its timeless rules\
    \ and order, form this impenetrable barrier. Only by passing this trial will you\
    \ earn her approval and be worthy of moving forward."
Marisa:
  Name: Marisa Kirisame
  Original: Love-Colored Master Spark
  TrackName: Form of Magic
  Comment: "This is the character-specific battle theme for Marisa Kirisame.\nThe\
    \ renowned magician is about to arrive, promising a dazzling spectacle. The sky\
    \ will come alive with starlight as the magic cannon activates, setting the quiet\
    \ sky ablaze with sparks. It will be a breathtaking moment where light and sound\
    \ converge."
Sakuya:
  Name: Sakuya Izayoi
  Original: Flowering Night
  TrackName: Form of Stopped Time
  Comment: "This is the character-specific battle theme for Sakuya Izayoi.\nFreeze\
    \ the moment! In this realm beyond time, all movement is within its master's grasp.\
    \ Arrange the knives in perfect order, tips pointed toward the enemy, then snap\
    \ a finger! Usher the rotated spacetime, turning everything upside down."
Cirno:
  Original: Tomboyish Girl in Love
  Name: Cirno
  TrackName: Form of Freezing Ice
  Comment: "This is the character-specific battle theme for Cirno.\nNo matter the\
    \ season or time of day, the cold is a timeless theme. Don't underestimate her\
    \ because she's a child, a child's mischief can keep you on your toes. If you're\
    \ not careful and got trapped in an icy situation, fate will slip through your\
    \ fingers, and danger will be quick to follow."
Koishi:
  Original: Last Remote
  Name: Koishi Komeiji
  TrackName: Heartfelt Impulses
  Comment: "This is the character-specific battle theme for Koishi Komeiji.\nHeartfelt\
    \ but not reckless impulses, sharing only the most genuine emotions, with the\
    \ unknown dreams that come flooding in alongside the emotions. Only the strongest\
    \ people can face their inner selves and prevent her from taking advantage of\
    \ your vulnerabilities!"
Long:
  Name: Megumu Iizunamaru
  Original: Starry Mountain of Tenma
  TrackName: Form of Falling Star
  Comment: "This is the character-specific battle theme for Megumu Iizunamaru.\nA\
    \ spark can set the field ablaze, but can also become a deadly weapon aimed at\
    \ the enemy. If you lose your way in this fantastical Form of Falling Star, danger\
    \ will follow like a shadow. Starlight is fleeting, so is your chance to turn\
    \ danger into safety. Find the only way out amid this kaleidoscope of colors!"
Tianzi:
  Name: Tenshi Hinanawi
  Original: Bhavaagra As Seen Through a Child's Mind
  TrackName: Form of Shining Sword
  Comment: "This is the character-specific battle theme for Tenshi Hinanawi.\nTenshi\
    \ descends, and the aura of her sword follows. Her momentum is capable of splitting\
    \ the heaven and earth, with echos that shake the world itself. The moment the\
    \ Form of Shining Sword is set, the enemy's weaknesses are laid bare. As the earth\
    \ trembles, this young lady will sweep away all who dare to show her disrespect."
Remilia:
  Original: Septette for a Dead Princess
  Name: Remilia
  TrackName: Form of Scarlet Red
  Comment: "This is the character-specific battle theme for Remilia Scarlet.\nAn invitation\
    \ from the head of the Scarlet Devil Mansion, please sit down and have a cup of\
    \ tea.\nOf course, only a fierce, pulsating rhythm can match the scarlet swirling\
    \ through the air, but be very careful, you might be swallowed up by the Form\
    \ of Scarlet Red before you know it."
Sanae:
  Name: Sanae Kochiya
  Original: Faith Is for the Transient People
  TrackName: Form of Wind Priestess
  Comment: "This is the character-specific battle theme for Sanae Kochiya.\nSummon\
    \ the wind! Then fight! Dance to the rhythm of the electronic music, and before\
    \ you know it, the Form of Wind Priestess will have taken shape. People of Gensokyo,\
    \ hold fast to your faith and wait for the Wind God to bring about a miracle."
Junko:
  Original: Pure Furies ~ Whereabouts of the Heart
  Name: Junko
  TrackName: Form of Murderous Intent
  Comment: "This is the character-specific battle theme for Junko.\nGrudge transforms\
    \ into blind devotion to power, vowing to devour every enemy without mercy. Trapped\
    \ within the Form of Murderous Intent, the frenzied music pushes the battle to\
    \ the brink of chaos. Victory or defeat hangs in the balance."
Stage4:
  Name: "Final Act: Skies Above the Wind God's Lake"
  Original: The Exaggerated Castle Keep
  TrackName: The Path to the Center
  Comment: "This is the theme for the final act.\nThe strongest enemy stands at the\
    \ center of the world. All roads lead to the center of the world, once a place\
    \ that could not be disturbed, but now…"
Seija:
  Original: Romantic Escape Flight
  Name: Seija Kijin
  TrackName: Social Upheaval and Final Standstill
  Comment: "This is the character-specific battle theme for Seija Kijin.\nSet out\
    \ on the path to the final battle, where a world turned upside down awaits. Give\
    \ it your all, seize the one chance to overturn the social upheaval amidst the\
    \ chaos, and set everything right."
Fail:
  Name: Failure
  TrackName: Failure
  Original: The Venerable Ancient Battlefield ~ Suwa Foughten Field/Player's Score
Victory:
  Name: Victory
  TrackName: Victory
  Original: Gensokyo Millennium ~ History of the Moon
VictoryLong:
  Name: Victory (Extended)
  Original: Gensokyo Millennium ~ History of the Moon
  TrackName: Victory (Extended)
MainMenu:
  Name: Main Menu
  Original: Gensokyo Millennium ~ History of the Moon
  TrackName: The Nineteenth Form of Fantasy
  Comment: "An experimental electronic music inspired by \"Gensokyo Millennium\".\
    \ The composition emphasizes the contrast between the intro and the chorus, revealing\
    \ the game's nature of being both lighthearted and action-packed.\nRegarding the\
    \ description of \"The Nineteenth Form\": This is our nineteenth piece of \"Gensokyo\
    \ Millennium\", and we are still exploring the various possibilities of this composition."
Shop:
  Name: Takane's Shop
  Original: Banditry Technology
  TrackName: A Break in the Woods
  Comment: "This is a song that captures the relaxed vibe of a holiday.\nStop fighting\
    \ with each other—let's sit this one out together!"
Adventure3:
  Name: Event 3
  Original: Girls' Secret Sealing Club
  TrackName: Left Behind
  Comment: "This is a song written when the composer is being emotional.\nMaybe the\
    \ emoticon \"ORZ\" captures the mood best?"
Aya:
  Name: Aya Shameimaru
  Original: Youkai Mountain ~ Mysterious Mountain
  TrackName: A Hasty Story
  Comment: "This is the character-specific battle theme for Aya Shameimaru.\nWherever\
    \ the wind blows, the sound of cameras clicking follows. Truth and falsehood,\
    \ right and wrong, reality and fiction all find their way into the newspapers,\
    \ dispelling the boredom of the afternoon. But if you look closer, you’ll find\
    \ that most of it is nothing more than unverified rumors, which can’t help but\
    \ make one sigh, \"Typical journalism standards.\""
Nitori:
  Name: Nitori Kawashiro
  Original: Akutagawa Ryuunosuke's "Kappa" ~ Candid Friend
  TrackName: in the blue
  Comment: "This is the character-specific battle theme for Nitori Kawashiro.\nYou\
    \ may get away the first time, the second time, but it ends at the third time.\
    \ The next time you run into her, you'd better watch out. It starts with just\
    \ blowing bubbles, but before you realise, she'll turn the world upside down!"
Youmu:
  Name: Youmu Konpaku
  Original: Eastern Ghostly Dream ~ Ancient Temple/Hiroari Shoots a Strange Bird ~
    Till When?
  TrackName: Swing the Blade
  Comment: "This is the character-specific battle theme for Youmu Konpaku.\nEvery\
    \ note is a sharp blade, cleaving through heaven, earth, and everything else.\
    \ Once the form of sword appears, there is no escape. Perhaps, this could be the\
    \ symphony for drawing swords. (laugh)"
Doremy:
  Name: Doremy
  Original: Eternal Spring Dream
  TrackName: Close eyes
  Comment: "This is the character-specific battle theme for Doremy Sweet.\nClose your\
    \ eyes, drift into a dream, and lose yourself in it, unwilling to wake. In the\
    \ dream, filth is cleansed, order is established, and life fades away."
Alice:
  Name: Alice
  Original: Doll Judgement ~ The Girl Who Played with People's Shapes
  TrackName: Form of Dolls
  Comment: "This is the character-specific battle theme for Alice.\nTo her, the moment\
    \ dolls controlled by magical strings descend from the sky and surround the enemy,\
    \ victory is assured. Her enemy only got to resist because she hasn't exerted\
    \ her full strength. The only way to defeat her is to decipher this chaotic, tangled\
    \ web of threads. Find the right clues and track down the magician who pulls all\
    \ the strings."
Yuyuko:
  Name: Yuyuko Saigyouji
  Original: Bloom Nobly, Ink-Black Cherry Blossom ~ Border of Life
  TrackName: Form of Butterfly Dance
  Comment: "This is the character-specific battle theme for Yuyuko Saigyouji.\nAn\
    \ elegant, classical melody fills the air, drawing ghosts and butterflies to circle\
    \ around. Should you seek to peer through the gates of the Netherworld, be careful\
    \ not to stray into the realm of the dead. The Form of Butterfly Dance is quietly\
    \ set, the upheaval comes to an abrupt halt, leaving only cherry blossoms in full\
    \ blossom and the departed gone."
