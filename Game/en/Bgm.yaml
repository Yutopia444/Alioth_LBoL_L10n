Stage1:
  Name: 'Act 1: Bamboo Forest of the Lost'
  Original: Retribution for the Eternal Night ~ Imperishable Night
  TrackName: Night Chasers
  Comment: "The theme of Bamboo Forest of the Lost, the first stage theme.\nThis piece\
    \ is filled with the excitement of battle, quickly getting the player to be ready\
    \ for the upcoming battles.\nIt also incorporates sounds reminiscent of birdsing\
    \ to enhance the night-time atmosphere of the track."
Stage2:
  Original: Fall of Fall ~ Autumnal Waterfall
  Name: 'Act 2: Genbu Ravine'
  TrackName: Discovery & Discoverer
  Comment: "The theme of Genbu Ravine, the second stage theme.\nThis piece gives off\
    \ a heavy feeling of mystery and unknown adventure. It features extensive use\
    \ of ethnic percussion, letting the player feel that they are in an unknown place."
Stage3:
  Name: "Act 3: Wind God's Lake"
  Original: The Primal Scene of Japan the Girl Saw
  TrackName: Hermit Sought on Wind
  Comment: "The theme of Wind God's Lake, the third stage theme.\nThis piece feels\
    \ like cruising along the winds. Does it feel like the danmaku is right ahead?\
    \ Let's dance in the upcoming battles alongside the theme!"
Gap:
  Name: Inside a Gap
  Original: Necrofantasia
  TrackName: Nightfall Melody
  Comment: "This is an European-styled song.\nWith the elegant harpsichord and serene\
    \ glockenspiel, it makes one feel very relaxed and especially want to take a break."
Adventure1:
  Name: Event 1
  Original: Gensokyo Millennium ~ History of the Moon
  TrackName: Set Out
  Comment: "This is a cheerful, narrative-driven song.\nIt features the Irish whistle,\
    \ marimba, and a variety of percussion instruments playing in unison. The intertwining\
    \ melodies evoke the sense of wonder felt by an adventurer preparing to set out\
    \ into the world."
Adventure2:
  Name: Event 2
  Original: The Gensokyo the Gods Loved
  TrackName: Playing in the Woods
  Comment: "This is a song that conveys a sense of lightheartedness and positivity.\n\
    The introduction's piano evokes the quiet atmosphere of a forest, with the cheerful\
    \ violin serving as the main melody, creating a vivid image of carefree play in\
    \ the woods."
Elite1:
  Name: Elite 1
  Original: Eternal Transient Reign
  TrackName: Do Not Underestimate
  Comment: "This is the song that plays when an elite appears.\nThe intense rhythm\
    \ serves as a reminder that a major battle is about to begin. Are they confident\
    \ in their victory?"
Elite2:
  Original: Bell of Avīci ~ Infinite Nightmare
  Name: Elite 2
  TrackName: Standoff
  Comment: "This is the song that plays when an elite appears.\nThe intense rhythm\
    \ captures the tension and excitement of battle—if the player doesn’t give it\
    \ their all, they’ll be defeated in no time!"
Sanyue:
  Original: The Refrain of the Lovely Great War/Great Fairy Wars ~ Fairy Wars
  Name: Three Fairies of Light
  TrackName: Curious & Alert & Mischievous
  Comment: "This is the character-specific battle theme for the Three Fairies of Light.\n\
    1v1 battles are long outdated; 3v1 is the true definition of friendship. Sneak\
    \ up silently, leaving but a faint trace behind. Getting impatient? You sure are!\
    \ Now we can finally kick off a full-scale war with pride!"
