# This file contains generated content from config data

MainMenu:
  Name: 主菜单
  TrackName: 幻想的第十九形态
  Original: 千年幻想乡 ～ History of the Moon
  Comment: |-
    基于千年幻想乡创作出的实验性电声音乐。强调前奏和副歌的反差性，从而体现出游戏既轻松又需要战斗的特征。
    关于“第十九形态”的描述，这是在我们手中诞生的第十九个千年幻想乡作品，仍在不断探索这首乐曲的各种可能性。

Stage1:
  Name: 第一幕：迷途竹林
  TrackName: 逐夜者
  Original: 永夜的报应 ～ Imperishable Night
  Comment: |-
    迷途竹林的主题曲，第一首关卡场景乐曲。
    整首乐曲充满了战斗的兴奋感，足以让玩家迅速进入即将面对战斗的状态。
    同时使用听感像鸟鸣的音色，来增加乐曲中对夜晚氛围的描述。

Stage2:
  Name: 第二幕：玄武涧
  TrackName: Discovery & Discoverer
  Original: Fall of Fall ～ 秋意渐浓之瀑
  Comment: |-
    玄武涧的主题曲，第二首关卡场景音乐。
    这是一首着重体现神秘与未知的探险类音乐，在设计上使用了大量民族打击乐，让玩家有身处未知境地的临场感。

Stage3:
  Name: 第三幕：风神之湖
  TrackName: 乘风寻仙
  Original: 少女曾见的日本原风景
  Comment: |-
    风神之湖的主题曲，第三首关卡场景音乐。
    创作了一首像是在随风巡游的乐曲，有没有弹幕就在前方不远处的感觉呢？就让接下来的战斗随着音乐在空中起舞吧！

Shop:
  Name: 商店界面
  TrackName: 林中小憩
  Original: Banditry Technology
  Comment: |-
    这是一首表现放假氛围的乐曲。
    你们不要再打来打去啦，一起结伴去摸鱼吧！

Gap:
  Name: 隙间房间
  TrackName: 入夜曲
  Original: Necro-Fantasia
  Comment: |-
    这是一首欧式风格的乐曲。
    优雅的羽管键琴和宁静的钟琴一起演奏，让人感觉十分安逸，特别想好好地休息一下。

Adventure1:
  Name: 冒险事件1
  TrackName: 启程
  Original: 千年幻想乡 ～ History of the Moon
  Comment: |-
    这是一首让人感到开心的叙事型乐曲。
    使用爱尔兰哨笛，马林巴和多种打击乐器同时演奏，旋律线不断交织，营造冒险者准备下山闯荡世界的新奇感。

Adventure2:
  Name: 冒险事件2
  TrackName: 林中玩耍
  Original: 众神眷恋的幻想乡
  Comment: |-
    这是一首表现轻松与积极的乐曲。
    前奏用钢琴来营造森林寂静的感觉，使用小提琴作为主旋律演奏欢快的音符，构成在林中轻松玩耍的画面感。

Adventure3:
  Name: 冒险事件3
  TrackName: 遗落
  Original: 少女秘封俱乐部
  Comment: |-
    这是一首在曲师EMO的时候写的乐曲。
    可能用“OTZ”的颜文字来表达比较确切？

Elite1:
  Name: 强敌1
  TrackName: 不可轻敌
  Original: 永远的三日天下
  Comment: |-
    这是配合游戏精英敌人出场的乐曲。
    激烈的节奏感提醒玩家即将面对一场大战，是否做好了十足的把握呢？

Elite2:
  Name: 强敌2
  TrackName: 对峙
  Original: 无间之钟
  Comment: |-
    这是配合游戏精英敌人出场的乐曲。
    激烈的节奏感来表现战斗的紧张与刺激，玩家如果不全力以赴，很容易落败哦！

Sanyue:
  Name: 三月精
  TrackName: 好奇·灵敏·恶作剧
  Original: 赌上性命去恶作剧
  Comment: |-
    这是光之三妖精的角色专属战斗曲。
    1V1早已成为过时的战法，3V1才最符合友情的定义。悄无声息的靠近，留下一点点痕迹。急了没？急了！接下来就可以堂堂正正地开始大战争了！

Aya:
  Name: 射命丸文
  TrackName: 疾行Story
  Original: 妖怪の山　～ Mysterious Mountain
  Comment: |-
    这是射命丸文的角色专属战斗曲。
    哪里有风，哪里就有拍摄的声音。是非真假、正反虚实，尽数落在报纸上，消解着午后的无趣。但若要深究，只会发现大多都是没有经过证实的传言，不禁令人感叹：“学新闻学的。”

Rin:
  Name: 火焰猫燐
  TrackName: 通灵者
  Original: 尸体旅行 ～ Be of good cheer!
  Comment: |-
    这是火焰猫燐的角色专属战斗曲。
    不被欢迎的妖怪在暗处伺机而动，被盯上的话可就要当心了。当来自地下的怨灵围拢过来，那就只能硬着头皮一战。不过，地狱的轮祸岂是浪得虚名？

Nitori:
  Name: 河城荷取
  TrackName: in the blue
  Original: 芥川龙之介的河童 ～ Candid Friend
  Comment: |-
    这是河城荷取的角色专属战斗曲。
    第一次可能会逃，第二次可能会逃，但凡事不过三。再遇到她的时候，最好要当心。一开始只是简单的吹泡泡，接下来就要翻江倒海了！

Youmu:
  Name: 魂魄妖梦
  TrackName: 此刻挥刃
  Original: 东方妖妖梦 ～ Ancient Temple
  Comment: |-
    这是魂魄妖梦的角色专属战斗曲。
    每个音符都是一把利刃，斩天地，斩万物。剑阵一旦出现，再无逃脱可能。或许，这也算一种拔剑神曲（笑）。

Kokoro:
  Name: 秦心
  TrackName: Ǝmotioɲ
  Original: 亡失的情感
  Comment: |-
    这是秦心的角色专属战斗曲。
    面具后的脸是哭是笑？千丝万绪带来千万种表情，有些令人安心，有些隐藏危机。透过伪装，找到真正的情感，可能就是战胜她的关键。

Clownpiece:
  Name: 克劳恩皮丝
  TrackName: Chaotic paradise
  Original: 星条旗的小丑
  Comment: |-
    这是克劳恩皮丝的角色专属战斗曲。
    来自地狱的混乱，便是她带给人类的礼物，把月都改建成混沌的乐园也是当下最重要的事。直面可怕异变之前，还有点时间可以逃跑。3，2，1…，Time Up！

Siji:
  Name: 四季映姬
  TrackName: THe last judgment
  Original: 第六十年的东方审判 ～ Fate of Sixty Years
  Comment: |-
    这是四季映姬·亚玛萨那度的角色专属战斗曲。
    最后的审判即将开始，在判官面前请忏悔自己的罪孽，然后，请给予每个人一次反抗的机会，用战斗获得自由，或者去地狱悔过吧。

Doremy:
  Name: 哆来咪
  TrackName: Close eyes
  Original: 永远的春梦
  Comment: |-
    这是哆来咪·苏伊特的角色专属战斗曲。
    闭眼，然后入梦，并沉浸在其中，不愿醒来。污秽将在梦中被洗刷，秩序将在梦中被建立，生命将在梦中消亡。

Reimu:
  Name: 博丽灵梦
  TrackName: 灵封之阵
  Original: 少女绮想曲 ～ Dream Battle
  Comment: |-
    这是博丽灵梦的角色专属Boss曲。
    在冒险的起点，仍是熟悉的她在等着对手的挑战。永恒的“灵封之阵”，永恒的规则与秩序，共同组成这道无法突破的结界。通过这场考验，获得她的认可，才有资格继续前进。

Marisa:
  Name: 雾雨魔理沙
  TrackName: 魔导之阵
  Original: 恋色Master spark
  Comment: |-
    这是雾雨魔理沙的角色专属Boss曲。
    大名鼎鼎的魔法师莅临，即将绽放绚丽华彩。届时，漫天星动，伴随魔力炮的启动，与火花一同点燃寂静的夜空。构成声光交汇的刹那美景。

Sakuya:
  Name: 十六夜咲夜
  TrackName: 时停之阵
  Original: Flowering Night
  Comment: |-
    这是十六夜咲夜的角色专属Boss曲。
    此刻，静止！游离在时间之外的空间，一切流动只由空间主人的操控。将利刃有序排放，刀尖向敌，而后打个响指吧！迎来时空轮转，将一切颠覆。

Cirno:
  Name: 琪露诺
  TrackName: 寒冰之阵
  Original: 活泼的纯情小姑娘
  Comment: |-
    这是琪露诺的角色专属Boss曲。
    无关季节，不论日夜，寒冷是永远的主题。不要因为是小孩子而忽略她，小孩子的恶作剧会让你应接不暇。不当心的话，陷入寒冰困境，命运便不再受自己掌控，而危险便会紧随其后。

Koishi:
  Name: 古明地恋
  TrackName: 随心
  Original: Last Remote
  Comment: |-
    这是古明地恋角色专属Boss曲。
    随心但不随性，只把最真实的情绪反馈给别人，还有伴随情绪的未知梦境扑面而来。只有最强大的人，才能直面自己的内心，不会让她趁虚而入！

Alice:
  Name: 爱丽丝
  TrackName: 人偶之阵
  Original: 人偶裁判 ～ 玩弄人形的少女
  Comment: |-
    这是爱丽丝角色专属战斗曲。
    在她看来，当魔法丝线控制下的人偶从天而降，将对手团团包围之时，胜局已定。对手的反抗只是因为她尚未用尽全力。如何解读这幅纵横交错纷杂无序的图画，才是战胜她的唯一方法。找到正确的线索，追寻到这位操纵一切的魔法使吧。

Long:
  Name: 饭纲丸龙
  TrackName: 星落之阵
  Original: 天魔之山漫天星
  Comment: |-
    这是饭纲丸龙的角色专属Boss曲。
    星火燎原，却瞬间变成指向对手的利器。倘若迷失在这天马行空的“星落之阵”当中，危险将会如影随形。星光稍纵即逝，转危为安的机会也是。在这虹彩陆离的景色中，找到唯一的出口吧！

Tianzi:
  Name: 比那名居天子
  TrackName: 剑光之阵
  Original: 幼小的有顶天
  Comment: |-
    这是比那名居天子的角色专属Boss曲。
    天子下凡，剑气降至。开天辟地的气势，石破天惊的回响。“剑光之阵”布好的一刻，对手的弱点便无所遁形。伴随着大地的震颤，这位大小姐将横扫一切不敬之人。

Yuyuko:
  Name: 西行寺幽幽子
  TrackName: 蝶舞之阵
  Original: 幽雅地绽放吧，墨染的樱花 ～ Border of Life
  Comment: |-
    这是西行寺幽幽子的角色专属Boss曲。
    幽雅经典的旋律响起，引来亡灵与蝶在身边围绕。若想窥伺冥界之门，还要当心误入黄泉。“蝶舞之阵”悄然布下，天地异变戛然而止，只剩樱花满开，故人消逝。

Remilia:
  Name: 蕾米莉亚
  TrackName: 绯红之阵
  Original: 献给已逝公主的七重奏
  Comment: |-
    这是蕾米莉亚·斯卡蕾特的角色专属Boss曲。
    坐下来喝一杯茶吧，来自红魔馆主的招待。
    当然，只有激烈的节奏感才与漫天飞舞的绯红色相配，但要千万小心，否则不经意间便会被“绯红之阵”而吞没。

Sanae:
  Name: 东风谷早苗
  TrackName: 风祝之阵
  Original: 信仰是为了虚幻之人
  Comment: |-
    这是东风谷早苗的角色专属Boss曲。
    唤风！然后战斗！在电音营造的旋律中起舞，不觉间，“风祝之阵”已然形成。幻想乡的人啊，牢记你们的信仰，并等待风神大人再次引发奇迹。

Junko:
  Name: 纯狐
  TrackName: 杀意之阵
  Original: Pure Furies ～ 心之所在
  Comment: |-
    这是纯狐的角色专属Boss曲。
    怨恨转化成对战力的无限盲从，誓将一切对手吞噬殆尽。陷入到“杀意之阵”当中，暴躁的音乐会把这场战斗推向失控边缘。胜，或者败，一念之间。

Stage4:
  Name: 最终幕：风神之湖上空
  TrackName: 通向圆心的路
  Original: 针小棒大的天守阁
  Comment: |-
    这是最终幕的场景曲。
    最强大的对手，站在世界的圆心。所有的道路，皆通向世界的圆心。那曾是不可被打扰之地，而现在……

Seija:
  Name: 鬼人正邪
  TrackName: 下克上与最后对视
  Original: 浪漫逃飞行
  Comment: |-
    这是鬼人正邪的角色专属Boss曲。
    踏上最终之战的道路，前方是颠倒翻转的世界。全力以赴，在混沌中抓住下克上的唯一机会，纠正一切。

