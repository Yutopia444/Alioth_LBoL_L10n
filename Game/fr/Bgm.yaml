MainMenu:
  TrackName: La 19e forme de fantaisie
  Name: Menu Principal
  Original: Gensokyo Millennium ~ History of the Moon
  Comment: "Une musique électronique expérimentale inspirée de « Gensokyo Millennium\
    \ ». La composition met l'accent sur le contraste entre l'introduction et le refrain,\
    \ révélant la nature à la fois légère et intense du jeu.\nÀ propos de la description\
    \ de « La 19e Forme » : Il s'agit de notre 19e morceau inspiré de « Gensokyo Millennium\
    \ », et nous explorons encore les différentes possibilités de cette composition."
Stage1:
  Name: 'Acte 1 : La Forêt de Bambous des Disparus'
  TrackName: Chasseur de nuit
  Original: Châtiment de la Nuit Éternelle ~ Imperishable Night
  Comment: "Le thème principal de La Forêt de Bambous des Disparus, musique de fond\
    \ des niveaux de l'Acte 1.\nCe morceau est imprégné de l'excitation des combats,\
    \ permettant au joueur de se préparer immédiatement à l'affrontement à venir.\n\
    Il intègre également des sons évoquant le chant des oiseaux, renforçant ainsi\
    \ l'atmosphère nocturne du morceau."
Stage2:
  Original: Chute d'automne ~ Cascade automnale
  Name: 'Acte 2 : Ravin Genbu'
  TrackName: Discovery & Discoverer
  Comment: "Le thème principal du Ravin Genbu, musique de fond des niveaux de l'Acte\
    \ 2.\nCe morceau d'aventure met l'accent sur le mystère et l'inconnu. Il fait\
    \ un usage intensif de percussions ethniques, plongeant le joueur dans un univers\
    \ dépaysant."
Stage3:
  Name: 'Acte 3 : Le Lac du Dieu du Vent'
  TrackName: Chevauchant le vent, en quête des ermites
  Original: Le Paysage Japonais Originel que la Jeune Fille a Vu
  Comment: "Le thème principal du Lac du Dieu du Vent, musique de fond des niveaux\
    \ de l'Acte 3. \nCe morceau évoque un voyage au gré du vent ; n'a-t-on pas l'impression\
    \ que des combats épiques nous attendent ? Laissons-nous emporter par le rythme\
    \ de cette musique et plongeons-nous dans les batailles à venir !"
Shop:
  Name: La Boutique de Takane
  TrackName: Éclaircie dans les bois
  Original: Technologie du Banditisme
  Comment: "Cette musique capture parfaitement l'ambiance détendue des vacances.\n\
    Arrêtez de vous disputer, passons ce moment ensemble !"
Gap:
  Name: À l'Intérieur d'une Faille
  TrackName: Nocturne
  Original: Necrofantasia
  Comment: "C'est un morceau de style européen.\nAvec son clavecin élégant et son\
    \ glockenspiel serein, il crée une atmosphère profondément apaisante qui invite\
    \ à un bon repos."
Adventure1:
  Name: Événement 1
  TrackName: Départ
  Original: Gensokyo Millennium ~ Histoire de la Lune
  Comment: "C'est une chanson joyeuse et narrative.\nMettant en valeur le sifflet\
    \ irlandais, le marimba et divers instruments de percussion jouant à l'unisson,\
    \ les mélodies entrelacées évoquent l'émerveillement d'un aventurier s'apprêtant\
    \ à partir à la découverte du monde."
Adventure2:
  Name: Événement 2
  TrackName: Jouer dans les bois
  Original: Gensokyo, Aimée des Dieux
  Comment: "Cette chanson transmet un sentiment de légèreté et d'optimisme.\nL'introduction\
    \ au piano évoque l'atmosphère paisible d'une forêt, tandis que le violon joyeux\
    \ en constitue la mélodie principale, créant une image vivante de jeux insouciants\
    \ dans les bois."
Adventure3:
  Name: Événement 3
  Original: Club Secret des Filles
  TrackName: Laissé pour compte
  Comment: "Une chanson écrite sous l'effet de l'émotion.\nL'émoticône « OTZ » en\
    \ est peut-être la meilleure illustration ?"
Elite1:
  Name: Élite 1
  Original: Éternel Règne Éphémère
  TrackName: Il n'y a pas de petit ennemi
  Comment: "Voici la musique qui retentit à l'apparition d'une unité d'élite.\nSon\
    \ rythme intense annonce une bataille majeure imminente : êtes-vous prêt ?"
Elite2:
  Name: Élite 2
  TrackName: Affrontement
  Original: Cloche d'Avīci ~ Cauchemar Infini
  Comment: "Voici la musique qui retentit à l'apparition d'un ennemi d'élite.\nSon\
    \ rythme intense traduit la tension et l'excitation du combat : si le joueur ne\
    \ se donne pas à fond, la défaite sera rapide !"
Sanyue:
  Name: Trois Fées de Lumière
  TrackName: Curieuse · Alerte · Malicieuse
  Original: Risquer sa Vie pour Faire une Blague
  Comment: "Voici le thème de combat spécifique aux Trois Fées de Lumière.\nLes duels\
    \ sont dépassés ; le 3 contre 1 incarne la véritable amitié. Approchez-vous en\
    \ silence, sans laisser de traces. Vous commencez à trépigner d'impatience ? C'est\
    \ bien le cas ! Nous pouvons enfin déclencher une guerre totale avec fierté !"
Aya:
  Name: Shameimaru Aya
  TrackName: Histoire rapide
  Original: Montagne des Yōkais ~ Mysterious Mountain
  Comment: "Voici le thème de combat spécifique au personnage d'Aya Shameimaru.\n\
    Partout où le vent souffle, le cliquetis des appareils photo résonne. Vérité et\
    \ mensonge, bien et mal, réalité et fiction : tout se retrouve dans les journaux,\
    \ dissipant l'ennui de l'après-midi. Mais à y regarder de plus près, on s'aperçoit\
    \ que la plupart de ces informations ne sont que des rumeurs non vérifiées, ce\
    \ qui ne peut que susciter un soupir : « Typique du journalisme ! »"
Rin:
  Name: Kaenbyou Rin
  TrackName: Médium
  Original: Voyage du Cadavre ~ Be of good cheer !
  Comment: "Voici le thème de combat exclusif de Rin Kaenbyou.\nDes monstres indésirables\
    \ rôdent dans l'ombre, guettant leur heure. Soyez prudent si vous êtes pris pour\
    \ cible. Lorsque des esprits vengeurs des enfers se rassemblent, vous n'aurez\
    \ d'autre choix que de les affronter de front. Mais ne sous-estimez pas les calamités\
    \ infernales."
Nitori:
  Name: Kawashiro Nitori
  TrackName: in the blue
  Original: Le "Kappa" d'Akutagawa Ryuunosuke ~ Candid Friend
  Comment: "Voici le thème de combat spécifique à Nitori Kawashiro.\nVous pouvez fuir\
    \ la première fois, vous pouvez fuir la deuxième, mais il y a une limite au nombre\
    \ de fois où vous pouvez le faire. Lorsque vous la rencontrerez à nouveau, vous\
    \ feriez mieux d'être prudent. Au début, ce ne sont que de simples bulles, mais\
    \ ensuite, ce sera un véritable chaos !"
Youmu:
  Name: Konpaku Youmu
  TrackName: Le moment où l'épée est tirée
  Original: Rêve fantomatique oriental ~ Ancient Temple / Hiroari Tire sur un Oiseau
    Étrange ~ Jusqu'à Quand ?
  Comment: "Voici le thème de combat propre à Youmu Konpaku.\nChaque note est une\
    \ lame acérée, capable de fendre ciel et terre, de tout anéantir. Une fois que\
    \ le cercle de lames se forme, il n'y a plus aucune chance de s'échapper. Peut-être\
    \ s'agit-il là d'une sorte de « symphonie de l'épée » (rires)."
Kokoro:
  Name: Hata no Kokoro
  TrackName: Ǝmotioɲ
  Original: L'Émotion Perdue
  Comment: "Voici le thème de combat propre à Hata no Kokoro.\nLe visage dissimulé\
    \ derrière le masque exprime-t-il des larmes ou un rire ? Une multitude d'émotions\
    \ se reflètent dans ses innombrables expressions, certaines rassurantes, d'autres\
    \ menaçantes. Découvrir ses véritables sentiments à travers son déguisement sera\
    \ peut-être la clé de sa défaite."
Clownpiece:
  Name: Clownpiece
  TrackName: Chaotic paradise
  Original: Pierrot de la Bannière Étoilée
  Comment: "Voici le thème de combat emblématique de Clownpiece.\nLe chaos infernal\
    \ est son cadeau à l'humanité, et transformer la capitale lunaire en un paradis\
    \ chaotique est désormais sa priorité absolue. Avant d'affronter cette terrifiante\
    \ anomalie, il vous reste encore du temps pour vous échapper. 3, 2, 1… C'est terminé\
    \ !"
Siji:
  TrackName: THe last judgment
  Name: Shiki Eiki
  Original: "Le Jugement de l'Orient : Soixantième Année ~ Fate of Sixty Years"
  Comment: "Voici le thème de combat spécifique au personnage Shiki Eiki, Yamaxanadu.\n\
    Le jugement dernier est sur le point de commencer. Confessez vos péchés devant\
    \ le juge, puis accordez à chacun une chance de se rebeller : gagnez votre liberté\
    \ au combat, ou partez en enfer pour vous repentir."
Doremy:
  Name: Doremy
  TrackName: Close eyes
  Original: Rêve de Printemps Éternel
  Comment: "Voici le thème de combat emblématique de Doremi Sweet.\nFermez les yeux,\
    \ puis plongez dans le rêve et laissez-vous emporter, sans vouloir vous réveiller.\
    \ Les impuretés seront purifiées dans le rêve, l'ordre y sera instauré et la vie\
    \ y périra."
Reimu:
  Name: Hakurei Reimu
  TrackName: Cercle de scellement spirituel
  Original: Le Caprice de la Jeune Fille ~ Dream Battle
  Comment: "Voici le thème musical emblématique de Reimu Hakurei.\nAu début de l'aventure,\
    \ la familière Reimu attend son adversaire. L'éternel « Cercle de Scellement Spirituel\
    \ », les règles et l'ordre immuables, forment ensemble une barrière infranchissable.\
    \ Ce n'est qu'après avoir surmonté cette épreuve et obtenu sa reconnaissance que\
    \ l'on aura le droit de poursuivre son chemin."
Marisa:
  Name: Kirisame Marisa
  TrackName: Cercle magique
  Original: Master Spark aux Couleurs de l'Amour
  Comment: "Voici le thème musical exclusif du boss Marisa Kirisame.\nLa célèbre magicienne\
    \ fait son entrée et s'apprête à briller de mille feux. À ce moment-là, les étoiles\
    \ scintilleront dans le ciel, et à l'activation de son mini-Hakkero, des étincelles\
    \ embraseront le ciel nocturne silencieux, créant un moment son et lumière à couper\
    \ le souffle."
Sakuya:
  Name: Izayoi Sakuya
  TrackName: Cercle de l'arrêt du temps
  Original: Nuit florissante
  Comment: "Voici le thème de boss exclusif de Sakuya Izayoi.\nÀ cet instant, le silence\
    \ règne ! Dans un lieu hors du temps, tout est contrôlé par la maîtresse de cet\
    \ espace. Disposez les lames, pointes vers l'ennemi, puis claquez des doigts !\
    \ Relancez le cours du temps, et bouleversez tout."
Cirno:
  Name: Cirno
  TrackName: Cercle de glace
  Original: Garçon Manqué Amoureuse
  Comment: "Voici le thème musical exclusif de Cirno.\nQuelle que soit la saison,\
    \ de jour comme de nuit, le froid est omniprésent. Ne la sous-estimez pas sous\
    \ prétexte qu'elle est une enfant ; ses farces espiègles vous donneront du fil\
    \ à retordre. Si vous n'y prenez garde, vous risquez de vous retrouver pris au\
    \ piège dans les glaces, votre destin vous échappera et le danger vous guettera."
Koishi:
  Name: Komeiji Koishi
  TrackName: Suis ton cœur
  Original: Last Remote
  Comment: "Voici le thème musical exclusif du boss Koishi Komeiji.\nSpontanée sans\
    \ être capricieuse, elle ne laisse transparaître que ses émotions les plus authentiques,\
    \ tandis que des rêves mystérieux, porteurs de ces sentiments, déferlent sur elle.\
    \ Seuls les plus forts sont capables d'affronter leur for intérieur sans se laisser\
    \ envahir par leurs faiblesses !"
Alice:
  TrackName: Cercle des marionnettes
  Name: Alice
  Original: Le Jugement des Poupées ~ La Fille qui Joue avec des Formes Humaines
  Comment: "Voici le thème de combat emblématique d'Alice.\nÀ ses yeux, lorsque les\
    \ marionnettes contrôlées par ses fils magiques descendent du ciel pour encercler\
    \ ses adversaires, la victoire est déjà acquise. Si ses adversaires résistent,\
    \ c'est uniquement parce qu'elle n'a pas encore donné toute sa mesure. La seule\
    \ façon de la vaincre est de déchiffrer la scène chaotique et désordonnée. Trouvez\
    \ les bons indices et traquez cette magicienne qui tire les ficelles."
Long:
  Name: Iizunamaru Megumu
  Original: Montagne Étoilée de Tenma
  TrackName: Réseau d'étoiles filantes
  Comment: "Voici le thème de boss exclusif du personnage de Megumu Iizunamaru.\n\
    Une étincelle peut déclencher un incendie de prairie, se transformant instantanément\
    \ en une arme mortelle pointée sur votre adversaire. Si vous vous perdez dans\
    \ ce fantastique « Réseau d'étoiles filantes », le danger sera votre compagnon\
    \ constant. La lumière des étoiles est éphémère, tout comme l'opportunité d'échapper\
    \ au danger. Au milieu de ce paysage aux couleurs chatoyantes, trouvez la seule\
    \ issue possible !"
Tianzi:
  Name: Hinanawi Tenshi
  TrackName: Cercle de lumières d'épée
  Original: Bhavaagra Vu à Travers l'Esprit d'un Enfant
  Comment: "Voici le thème de boss exclusif de Tenshi Hinanawi.\nLa céleste descend\
    \ sur terre, et l'énergie de son épée s'abat. Une puissance capable de fendre\
    \ le ciel et la terre, un écho retentissant qui fait trembler les cieux. Dès que\
    \ le « Cercle de Lumières d'Épée » est déployée, les points faibles de l'adversaire\
    \ sont mis à nu. Accompagnée des secousses de la terre, cette demoiselle va balayer\
    \ tous ceux qui lui manquent de respect."
Yuyuko:
  Name: Saigyouji Yuyuko
  Original: Éclosion Noble, Fleur de Cerisier Noire Comme l'Encre ~ Border of Life
  TrackName: Cercle de la danse des papillons
  Comment: "Voici le thème exclusif du boss Yuyuko Saigyouji.\nUne mélodie élégante\
    \ et classique retentit, attirant âmes des défunts et papillons autour d'elle.\
    \ Si vous souhaitez entrevoir les portes de l'au-delà, prenez garde à ne pas vous\
    \ égarer dans le royaume des morts. Le « Cercle de la danse des papillons » se\
    \ met silencieusement en place, les changements qui agitent le monde cessent brusquement,\
    \ ne laissant derrière eux que les cerisiers en fleurs et les âmes des défunts."
Remilia:
  Name: Remilia
  TrackName: Cercle écarlate
  Original: Septuor Dédié à la Princesse Défunte
  Comment: "Voici le thème emblématique de Remilia Scarlet.\nAsseyez-vous et prenez\
    \ une tasse de thé, une invitation de la maîtresse du Manoir du Démon Écarlate.\n\
    Bien sûr, seul un rythme endiablé est à la hauteur de cette tempête de rouge écarlate,\
    \ mais soyez sur vos gardes, sinon vous risquez d'être englouti par le « Cercle\
    \ écarlate » avant même de vous en rendre compte."
Sanae:
  Name: Kochiya Sanae
  TrackName: Cercle de la prêtresse du vent
  Original: La Foi est pour les Gens qui se Font des Illusions
  Comment: "Voici le thème musical exclusif du boss Sanae Kochiya.\nInvoquez le vent\
    \ ! Puis combattez ! Dansez au rythme de cette mélodie électro, et sans même vous\
    \ en rendre compte, le « Cercle de la Prêtresse du Vent » se sera déjà formé.\
    \ Ô habitants de Gensokyo, gardez votre foi à l'esprit et attendez que le Dieu\
    \ du Vent accomplisse à nouveau un miracle."
Junko:
  Name: Junko
  Original: Pure Furies ~ Là où Réside le Cœur
  TrackName: Cercle de la mort
  Comment: "Voici le thème musical exclusif de Junko.\nLe ressentiment se mue en obéissance\
    \ aveugle au pouvoir, avec la ferme intention d'anéantir tous ses adversaires.\
    \ Plongée dans le « Cercle de la mort », cette musique endiablée pousse le combat\
    \ au bord du chaos. La victoire ou la défaite ne tiennent qu'à un cheveu."
Stage4:
  Name: 'Acte final : Les Cieux Au-dessus du Lac du Dieu du Vent'
  TrackName: Chemin vers le centre
  Original: Le Donjon Exagéré
  Comment: "Voici la musique d'ambiance du dernier acte.\nL'adversaire le plus redoutable\
    \ se tient au centre du monde. Tous les chemins y mènent. Jadis un lieu paisible,\
    \ mais aujourd'hui…"
Seija:
  Name: Kijin Seija
  TrackName: Renverser son supérieur et Contact visuel final
  Original: Vol d'Évasion Romantique
  Comment: "Il s'agit du thème musical exclusif du boss Seija Kijin.\nEn t'engageant\
    \ sur la voie de la bataille finale, tu te retrouves face à un monde sens dessus\
    \ dessous. Donne tout ce que tu as, saisis cette unique occasion de renverser\
    \ l'ordre établi au milieu du chaos, et remets les choses en ordre."
Fail:
  Name: Échec
  TrackName: Échec
  Original: Le Vénérable Champ de Bataille Antique ~ Suwa Foughten Field / Score du
    Joueur
Victory:
  Name: Victoire
  TrackName: Victoire
  Original: Gensokyo Millennium ~ History of the Moon
VictoryLong:
  Name: Victoire (version longue)
  TrackName: Victoire (version longue)
  Original: Gensokyo Millennium ~ History of the Moon
