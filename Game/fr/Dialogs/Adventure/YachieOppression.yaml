line:0f9238b: '"Puissante demoiselle {0}, cela vous dérangerait-il de rendre service
  à la matriarche de la famille Kiketsu ?"'
line:037c786: '"Les esprits des loutres ont senti la présence de drones qui ont échappé
  au contrôle des kappa. Pour le bien de la terre, veuillez régler le problème dès
  que vous le pouvez ~"'
line:07acb62: '[Combattre] Combattez une phalange de drones et obtenez une merveille
  rare aléatoire.'
line:098663c: "\"Hein ? Euh, bien sûr.\"\n(Pourquoi ai-je accepté sans savoir quelle\
  \ puissance a l'ennemi...)"
line:0970713: '"Comme prévu de {0} ! En remerciement, veuillez accepter ce cadeau
  que j''ai soigneusement préparé !"'
line:0e2d8d9: '[Accepter] Obtenir la merveille |{0}|.'
line:08457aa: "\"Oui, madame ! N'hésitez pas à m'appeler si jamais vous avez encore\
  \ besoin de moi ~\""
line:01fd35f: '[Refuser] Rien ne se passe.'
line:04ee4ff: "\"Pas besoin, moi {0} ne demande jamais de récompenses lorsque j'aide\
  \ les autres.\""
line:09e89c0: '[Refuser] Malheur : |{0}|.'
line:0e300a9: '"Est-ce que les combattre me serait bénéfique de quelque manière que
  ce soit ?"'
line:0f208e0: '"Les gens de la surface comptent sur vous. Est-il vraiment sage de
  les abandonner pour votre propre égoïsme ?"'
line:0abbfc7: "\"Je ne peux pas le nier...\"\n(Habituellement, j'aurais réfuté, mais\
  \ pour une raison inconnue, je...)"
line:04cc621: '"Oh ? Je vais m''en charger."

  (Mince, pourquoi ai-je accepté de le faire gratuitement ? )'
line:0911804: "\"Ce sera fait.\"\n(Pourquoi ai-je accepté de servir quelqu'un d'autre\
  \ que milady ?)"
line:050c89c: "\"J'apprécie le geste, merci. N'hésitez pas à me contacter si vous\
  \ avez encore besoin de mes services.\""
line:01ca64d: '"Chacun ses problèmes, ne comptez pas sur moi."'
line:0a086f8: "\"Merci. N'hésitez pas à me prévenir si ça se reproduit ~\""
line:02d74da: "\"C'est comme si c'était fait !\"\n(Euh… Pourquoi je suis si confiante,\
  \ en fait ?)"
line:0f6ccc8: "\"Ah ? oui… bien sûr…\"\n(Bizarre, j'ai accepté presque inconsciemment…\
  \ je dois me contrôler.)"
line:01068af: "\"Héhé, ce n'était pas grand chose, mais merci quand même.\""
line:049ddf2: "\"Merci, j'en prendrai grand soin.\""
line:08ccde1: '"Une récompense ? Merci beaucoup ! "'
line:0533f5a: '"Les combattre ne me rapportera rien."'
line:0e52f82: "\"J'ai pas envie, les combattre semble être trop fatiguant.\""
line:0a79aa7: '"En quoi les combattre serait bénéfique à ma maîtresse ?"'
line:03892bb: '"Les combattre ne me semble pas assez amusant, je refuse !"'
line:0a5e40f: "\"Ah ? Facile. Je m'en occupe !\"\n(J'ai accepté un peu rapidement…\
  \ Bah, sûrement parce que je suis très forte !)"
