line:008fa52: "\"Allez, soutenons Kaguya-chan ensemble ! \""
line:0678716: "[Accepter les vêtements] Obtenir |T-shirt d'Idole|"
line:00d22b0: '[Partir] Rien ne se passe'
line:0670be2: "\"N'oubliez pas de le porter sur vous lorsque vous sortez !\""
line:0fc2c16: "\"{Censor:select false=\\\"Beurk, pauvre Kaguya-chan, c'est quoi ce\
  \ comportement digne d'un manga ? C'est dégoûtant.\\\" true=\\\"Pff, tes anciens\
  \ vêtements étaient déjà assez bizarres comme ça, laisse tomber.\\\"}\""
line:063a72b: "\"Après quelques recherches, j'ai découvert que Kaguya-Chan est hospitalière\
  \ et différente des autres gens de la lune.\""
line:0ba9037: '"Gratuit ? Alors prenons-en un."'
line:01566ec: "[Échange de Vêtements] Gagnez la merveille : |T-shirt d'Idole (Large)|."
line:059fbd3: '"Gratuit ? Alors prenons-en un. En grande taille."'
line:0ba87b6: "\"N'oubliez pas de le porter sur vous lorsque vous sortez !\""
line:055f5d6: "\"Même l'utiliser comme chiffon ne semble pas très pratique.\""
line:00a6aad: "\"Ouah ! Ça, c'est pas mignon du tout ! \""
line:062b5d5: "\"C'est gratuit ? Ça veut dire qu'on l'emprunte sans avoir à le rendre,\
  \ c'est bien ça ?\""
line:022c403: "\"C'est gratuit ? Ça fera un cadeau plutôt original pour ma jeune maîtresse.\""
line:00d286e: "\"Ça ne coûte rien ? Je laisserai ma grande sœur le porter demain soir\
  \ pour qu'elle s'amuse.\""
line:0a28c4c: '"Superbe opportunité, donnez-moi la plus grande taille !"'
line:0f24388: '"Ce qui est destiné aux plus forts devrait toujours être gratuit."'
line:0bd1ffa: '"Si je portes du noir, ça fera fondre ma glace."'
line:0c1968a: '"Je le donnerai à Meiling en souvenir ; donnez-moi juste le plus grand."'
line:0e45c03: '"Bien sûr, nous devrions prendre le plus grand !"'
line:0a99c1c: "\"Alors je prends celui-ci, le super grand ! Il m'a l'air sympa !\""
