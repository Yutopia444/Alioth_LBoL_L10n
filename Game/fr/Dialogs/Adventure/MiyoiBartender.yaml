line:0c9cdfa: tard dans la nuit, {0} entre par erreur dans le |Sanshoku Geidontei|.
  Une forte odeur d'alcool imprègne les lieux…
line:0c66585: "\"Mademoiselle {0} ! Entrez ! Qu'aimeriez-vous aujourd'hui ?\""
line:0868bad: (Geidontei... Si je me souviens bien, il s'ouvre aux yōkai pendant la
  nuit.)
line:061da42: '[Une Lampée] Obtenez la merveille |{0}|, retirez une carte de la bibliothèque.'
line:096d262: "\"Ce vin spécial qu'Aya a bu la dernière fois, donne-m'en aussi !\""
line:0da2517: "\"Attendez, Est-ce que Miss {0} tiens bien l'alcool ?\""
line:05ad143: '"Argh... Autant ? ! Mais tout le monde me regarde, je ne peux pas faire
  demi-tour maintenant !"'
line:0c7c734: ({0} termine enfin le |Souffle de la Baleine|, mais à cause du vin,
  elle oublie l'addition et quelque chose d'important.)
line:0269654: Ai-je oublié quelque chose... ? Choisissez une carte à supprimer.
line:018cd9a: '[Concours de Boisson] Obtenez {0} <sprite="Point" name="Gold"> et deux
  cartes Malheur : |{1}|.'
line:0c77879: "\"Qu'est-ce qui ne va pas, Suika ? Tu me lances ce regard suffisant\
  \ depuis que je suis entrée.\""
line:0b95170: "\"Qu'est-ce qu'il y a, {0} ? Miss blackout-en-un-verre me lance un\
  \ défi ?\""
line:00d22c7: Les yōkais autour commencent à applaudir, certains font même des paris
  sur qui sortira victorieux.
line:0bdfac4: "\"Tu en gardes de côté pour élever une baleine de compagnie ? Dégonflée\
  \ !\""
line:0064f30: '"Voici mon attaque ultime, Bombe Sous-marine !"'
line:0c29c84: "Débordant de détermination, {0} sort victorieuse et remporte le prix.\n\
  Cela en valait-il la peine ?"
line:0bea743: "[Une Gorgée] Combattez un groupe aléatoire d'ennemis et obtenez une\
  \ merveille rare aléatoire."
line:05203c5: "\"Oui oui, je vais prendre comme d'habitude. Mettez-le sur ma note,\
  \ d'accord ?\""
line:0862f2d: '"Hé, tu ne me dois pas déjà la facture du mois dernier ?"'
line:015f1aa: '"Zut, pourquoi je me sens si endormi après juste un... verre..."'
line:024e390: (Dans son sommeil, {0} sent une présence suspecte !)
line:0e46351: "\"Quelles illusions puissantes... t'aurais pas ajouté quelque chose\
  \ au vin ?!\""
line:0b0300d: "\"Ouah ! S'il te plaît, ne dis rien et prends ça en échange.\""
line:0b3a02b: '[Accepter] Obtenir la merveille |{0}|.'
line:0bd13e0: "\"C'est ce qu'on appelle faire des affaires. A la prochaine fois~\""
line:0d8166c: '[Refuser] Rien ne se passe.'
line:01b5a50: '"Sans façons, je ne me laisse plus avoir."'
line:0ea1dc5: '[Invalide] Toutes les merveilles éligibles ont été acquises.'
line:079518c: "\"Espèce d'ivrogne, t'as plus que de l'alcool dans la tête, hein ?\""
line:09fc586: '"Hé ! Ne crois pas que tu peux me provoquer juste parce que je suis
  la plus forte."'
line:08fdecb: "\"Mademoiselle Oni, vous ne me fixeriez pas du regard depuis tout à\
  \ l'heure ?\""
line:0a9ad13: '"Ne dis pas de bêtises… ! Apporte-moi quelque chose de plus fort !"'
line:0ad4f5f: "\"Les degrés, ça m'importe peu !\""
line:025d5c2: "\"Ne me sous-estime pas ! Je peux même rassembler toutes les fées pour\
  \ qu'elles viennent boire avec toi !\""
line:05e7e3f: '"Oh oh oh~ Le monde tourne~~ Ça commence à devenir amusant !"'
line:0bc049a: "\"Oh, je vais juste payer à crédit, comme d'habitude, ça ira, non ?\""
line:00dd0ad: "\"Je te paierai la prochaine fois que je viendrai, mais d'ici là, attends-moi\
  \ un petit moment.\""
line:06ae762: '"Est-ce que ça peut passer sur le compte de notre gardienne ?"'
line:0187bf6: "\"De l'argent ?! J'en ai pas ! \""
line:0ceddc8: "\"C'est tout pour le moment, au revoir~\""
line:0d1602b: "\"Je commence à avoir des hallucinations… Mais quel alcool tu m'as\
  \ fait boire, au juste ?!\""
line:0ce111a: "\"C'est vraiment un sacré trip… Tu n'aurais pas mis quelque chose dans\
  \ le verre ?\""
line:0516764: "\"Quelle hallucination saisissante… Est-ce que n'importe quel alcool\
  \ peut provoquer ça ?\""
line:0fcf6e4: '"Beurk… Je me sens mal… On dirait qu’on a mis quelque chose de louche
  dans cette boisson !"'
line:00d591a: "\"Hmm… j'ai l'impression que cette boisson contenait quelque chose\
  \ d'étrange…\""
line:09556a4: '"Il y a pas mal de choses à faire ici, je reviendrai souvent."'
line:0457b1b: "\"Tu t'y connais plutôt bien, n'est-ce pas ? Je compte sur toi la prochaine\
  \ fois aussi.\""
line:0365d92: "\"C'est vraiment généreux, je reviendrai sans hésiter.\""
line:0c15665: "\"Oh, tu me l'offres ?! Tu es vraiment gentille !\""
line:0b5dc3f: '"Je reviendrai la prochaine fois ~"'
line:05290b5: "\"Allez, épargne-moi, je m'en vais pour aujourd'hui.\""
line:09e6032: '"Désolé, je dois y aller !"'
line:0c520a6: '"Je ne reviendrai pas~"'
line:09bf9df: "\"Qu'est-ce qui ne va pas, Suika ? Tu me lances ce regard suffisant\
  \ depuis que je suis entrée.\""
line:07f78ec: "\"Oh là, je sens des regards posés sur moi depuis que je suis entrée\
  \ dans ce bar. Qu'est-ce qui se passe ?\""
line:0682132: "\"Ne sous-estime pas la résistance d'une prêtresse à l'alcool, je suis\
  \ une professionnelle dans ce domaine.\""
