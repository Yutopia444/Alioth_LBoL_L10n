line:05fa0d3: "\"Tes champignons n'ont pas un goût très frais, choisis tes ingrédients\
  \ avec plus de soin la prochaine fois.\""
line:0bf0f77: "\"C'est une petite entreprise mais je la gère avec intégrité...!\""
line:0c3600a: '[Pas de Collation de Fin de Soirée] Rien ne se passe.'
line:0c34697: "\"J'ai entendu dire que manger et faire de l'exercice la nuit était\
  \ mauvais pour la santé.\""
line:0b5dafc: '"Manger pour se faire plaisir de temps en temps ne peut pas faire de
  mal...!"'
line:02fe6e4: '"Ça a un goût un peu bizarre, les champignons seraient pas un peu avariés
  ?"'
line:0159576: "\"Une assiette de lamproies grillées, j'en ai l'eau à la bouche !\""
line:002e6b4: "\"Une portion de lamproies grillées, s'il vous plaît.\""
line:0024284: "\"Une portion de lamproies grillées, je n'en mange pas souvent.\""
line:001e989: "\"Notre agent de sécurité vient souvent ici, n'est-ce pas ? Je lui\
  \ dirai de payer la prochaine fois qu'il viendra.\""
line:01d3662: "\"Il ne s'agit pas de manger gratuitement, hein ? Je vais juste faire\
  \ une petite promenade digestive.\""
line:0cbb734: "\"C'était délicieux ! Merci pour le repas !\""
line:05b6084: "\"C'était délicieux ! À plus tard !\""
line:0b2075c: '"Hé, ces champignons sont vraiment frais ? Ceux de la Forêt Magique
  sont bien meilleurs."'
line:0adc673: '"Ces champignons ne seraient pas périmés, par hasard ?"'
line:0bab6c3: '"J’ai l’impression que ça a moisi !"'
