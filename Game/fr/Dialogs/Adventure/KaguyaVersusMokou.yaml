line:04ceb26: "\"{Censor:select false=\\\"'Game Girl Advance' est la meilleure console\
  \ portable ! Je ne te laisserai pas dire du mal de 'Nentendo' !\\\" true=\\\"Tu\
  \ oses te prétendre une joueuse alors que tu n'as jamais possédé une seule cartouche\
  \ de jeu ? Je ne laisserai pas un rat de bibliothèque comme toi ternir notre réputation\
  \ !\\\"}\""
line:06b80ce: "\"{Censor:select false=\\\"Une entreprise qui ne peut même pas comprendre\
  \ le concept du 'Métavers' ? C'est aussi moche que ton exposition !\\\" true=\\\"\
  Qui, de nos jours, stockerait chez lui des produits non ignifugés ? Je dirais que,\
  \ tout comme toi, ton exposition est complètement déconnectée de la réalité !\\\"\
  }\""
line:0848d98: "\"{Censor:select false=\\\"Ne vous battez plus ! 'Ultimate Mariso :\
  \ Galaxy' de Nentendo est vraiment amusant à jouer !\\\" true=\\\"Arrêtez de vous\
  \ disputer ! Je ne peux pas emprunter de jeu à quelqu'un d'autre s'il n'est disponible\
  \ qu'en version numérique !\\\"}\""
line:093aa03: "\"{Censor:select false=\\\"Arrêtez ça, s'il vous plaît ! Milady aime\
  \ aussi jouer à « Scarletvania : Symphony of the Devil » sur cette console !\\\"\
  \ true=\\\"Arrêtez, s'il vous plaît ! Si vous jouez avec Milady, vous aurez une\
  \ chance de gagner une cartouche de jeu !\\\"}\""
line:0f73a43: "\"{Censor:select false=\\\"Arrêtez de vous battre ! J'ai entendu dire\
  \ que la technologie 'Moneyverse' peut apporter beaucoup de richesse !\\\" true=\\\
  \"Arrêtez de vous disputer ! Même Rinnosuke n'a pas autant de cartouches de jeu\
  \ !\\\"}\""
line:0c1db12: '"Il semble que {0} le pense aussi. Au nom de mon peuple, je vous offre
  ce souvenir en guise de remerciement."'
line:0a72879: "\"Je suis juste venu voir si ton exposition est aussi bonne que tu\
  \ le prétends ! Il s'avère qu'elle est aussi mauvaise que je l'imaginais !\""
line:0bc6368: (Je n'ai aucune idée de ce pour quoi elles se battent, mais si elles
  continuent, le voleur pourrait profiter du chaos pour s'enfuir.)
line:008a9a4: '[Aider Kaguya] Perdez {0} points de vie, gagnez la merveille : |{1}|.'
line:02e8c97: "\"{Censor:select false=\\\"Arrêtez de vous battre ! J'ai entendu dire\
  \ que 'Nentendo' a un jeu de stratégie qui parle de feu !\\\" true=\\\"Arrêtez de\
  \ vous battre ! Les petites entreprises locales comme Kourindou seront confrontées\
  \ à une crise économique si plus personne n'achète d'exemplaires physiques !\\\"\
  }\""
line:07ab6fd: '{0} tente de les séparer par la force - après avoir bloqué quelques
  coups de poing de Mokou, Kaguya prend peu à peu le dessus.'
line:0921fbf: '"Tch, arrête de faire ta curieuse, {0}"'
line:0219773: "\"Mademoiselle {0}, veuillez accepter ceci en gage de ma reconnaissance\
  \ ! Je compte sur vous pour résoudre l'incident.\""
line:09d8d02: '[Continuer]'
line:0d3703c: '[Aidez Mokou] Perdez {0} points de vie, gagnez la merveille : |{1}|'
line:0e1beb9: "\"{Censor:select false=\\\"Ne vous battez plus ! J'ai entendu dire\
  \ que tout était irremplaçable dans le 'Moneyverse' !\\\" true=\\\"Arrêtez de vous\
  \ disputer ! J'ai entendu dire que s'inscrire à la newsletter permet d'accéder au\
  \ jeu en avant-première !\\\"}\""
line:0500ae3: "\"{Censor:select false=\\\"Arrêtez ça, s'il vous plaît ! J'ai entendu\
  \ dire que le 'Moneyverse' pouvait dynamiser l'exposition !\\\" true=\\\"Arrêtez,\
  \ s'il vous plaît ! Ranger des cartouches de jeu éparpillées partout, c'est vraiment\
