line:04fec24: '{0} essaie de les séparer avec force - dans le désordre, Mokou prend
  peu à peu le dessus.'
line:015db7a: "\"Pfff, je ne m'avoue pas vaincu !\""
line:0460217: '[Continuer]'
line:0db14e0: '[Ignorer] Rien ne se passe.'
line:0677c42: "\"{Censor:select false=\\\"Tu dis ça, mais alors pourquoi tu m'as demandé\
