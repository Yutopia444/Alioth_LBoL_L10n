line:03b4cbd: Patchouli semble étudier ces joyaux magiques.
line:06ad387: '"Hum, je vois..."'
line:0b23fed: "\"Quelle coïncidence, {0}. Je peux t'aider à régler ton affinité avec\
  \ ces joyaux.\n(Voilà un bon cobaye.)"
line:07acb35: Choisissez un mana de base coloré et convertissez-le en mana multicolore.
line:01cdad3: '[Accepter] {0}'
line:013e396: '"Alors, le joyau de mana que tu aimerais modifier est ?"'
line:0fb491d: "{0} sent en effet qu'elle peut canaliser un puissant flux de mana."
line:0e78dc7: "\"Merci beaucoup. Veux-tu que je t'achète du thé sur le chemin du retour\
  \ ?\""
line:0725f8e: "\"Un peu de Earl Grey serait parfait, s'il te plaît. Merci ~\""
line:04eeb1a: '[Refuser] Rien ne se passe.'
line:01c44c8: '"Pas besoin, je pourrai la régler autant que je veux quand je serai
  rentrée à la maison."'
line:044f4bc: "\"Dire que j'ai fait tout le chemin jusqu'ici...\""
line:04b1f03: '"Pas besoin, je suis en parfaite condition."'
line:071a8e9: "\"Merci, Patchouli. Je ne m'attendais pas à ce que tu sois si gentille\
  \ ~\""
line:0cbf9f4: "\"Qu'est-ce que tu racontes ?\""
line:035363d: '"Ceux qui habitent dans le Manoir Écarlate ont vraiment du talent."'
line:0bc2af5: "\"Une idiote m'a fait un compliment…\""
line:066cc93: "\"J'ai toujours l'impression que tu vas en profiter pour me réclamer\
  \ ce que je te dois.\""
line:0cfade6: '"Je ne veux plus être utilisée pour faire des boissons glacées."'
line:0874548: '"Je ne comprends pas trop ce que tu veux dire en parlant de ça tout
  à coup."'
line:04fba63: '"Laisse tomber, si tu veux faire des recherches, reviens me voir plus
  tard."'
line:0f3e81b: '"Alors, tu ferais mieux de me rendre ce que tu me dois…"'
line:0465dee: "\"Ce n'est pas encore l'heure des boissons fraîches…\""
line:092f7e3: "\"Je n'arrive pas à lui expliquer clairement, tant pis…\""
line:07939f8: "\"C'est parce que c'est une occasion rare de gagner de l'argent ? Ah…\
  \ Elle est partie bien vite…\""
