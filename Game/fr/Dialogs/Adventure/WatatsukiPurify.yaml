line:05fe9e1: "\"Tiens donc, l'assistante de Maîtresse Eirin. Permettez-moi de vous\
  \ donner un coup de main.\""
line:0220408: '[Réciter une Prière] Perdez {0} points de vie maximum, gagnez deux
  |{1}|.'
line:050b98e: Avec la bénédiction des cloches kagura, {0} sent une petite quantité
  de son impureté se dissiper…
line:08e2a8a: "\"J'ai emprunté à Yorihime les cloches Kagura de |Idunome|, laissez-les\
  \ vous débarrasser de l'impureté.\""
line:022c54a: '"Merci !"'
line:015cd2b: '[Consommer Pêche] Augmentez la vie maximum de {0} , gagnez Malheur
  : |{1}|.'
line:07b8cb5: "\"Si ça ne te dérange pas, tu peux manger cette pêche que j'ai apporté.\
  \ Elle est plutôt sucrée.\""
line:005d895: Malgré un goût suspect d'additifs industriels, les pêches génétiquement
  modifiées de la Capitale Lunaire sont toujours délicieuses.
line:09c8a85: "\"C'est trop bon !\""
line:0c671d8: '[Refuser] Rien ne se passe.'
line:0b9590a: '"Pas besoin. Je peux résoudre un petit incident comme celui-ci les
  yeux fermés~"'
line:0c46a1e: '"Aucun problème, je suis principalement venue ici pour voir Maîtresse
  Eirin."'
line:0e687b1: "\"Waouh ! C'est délicieux ! Il y en a encore ?!\""
line:0b3c5dd: '"Tellement sucré et délicieux ! Ça me remonte vraiment le moral !"'
line:0c4ae27: '"Merci !"'
line:0eb127d: '"Merci !"'
line:00ebbaa: '"Merci !"'
line:0052cc6: '"Merci !"'
line:0b908c2: '"Merci !"'
line:0aeaa2e: '"C’est délicieux ! Je dois en prendre pour ma jeune maîtresse."'
line:07974a1: '"Inutile, vous avez déjà agi, à quoi bon faire appel à une experte
  en anomalies comme moi ?"'
line:0912025: '"Inutile, les choses qui semblent trop belles pour être vraies cachent
  généralement un piège."'
line:087180e: "\"Je suis la plus forte même sans ça ! Alors je n'en ai pas besoin\
  \ !\""
line:0ebbfcf: '"Il y a quelque chose de louche… Je n’en veux pas."'
line:07574a3: "\"C'est délicieux. Pourquoi tu ne m'as pas servi ça quand nous étions\
  \ sur la lune ?\""
line:0cc6dc5: "\"Mais c'est délicieux ! J'aurais tellement aimé pouvoir en manger\
  \ lors de mon dernier voyage sur la Lune !\""
