line:0c6dafc: "\"Si tu me le demandes, je serais plus qu'heureuse de te donner un\
  \ coup de main ~\""
line:0e73ca1: "\"Ce travail est plus délicat que prévu. N'oublie pas de me ramener\
  \ à la normale quand je rentrerai à la maison.\""
line:0ee5ddb: "\"Attends que je sois rentrée pour l'enfiler.\"\n(Pour le bon déroulement\
  \ de mon travail, je vais faire avec ses caprices pour l'instant.)"
line:0603ab0: "\"Tu cherches le coupable aussi, n'est-ce pas !\""
line:0855034: '[Invalide] Nécessite |{0}|.'
line:0b0f1b1: "[Demander] Remplacez les attaques de base par |Attaques du Démon| ,\
  \ Malheur：|{0}|."
line:0aa0a2f: "[Faire Affaire] Remplacez les attaques de base par |Attaques du Démon|,\
  \ perdez |{0}|."
line:0ce8472: "\"Oh ? Au final, tu as accepté, {0}. Ce n'était pourtant qu'une blague\
  \ de ma part, au départ ~\""
line:0325ae0: '{0} se sent fiévreuse et impulsive.'
line:00c808f: '"Utilise mon pouvoir inégalé à ta guise ~"'
line:0bdb099: '[Continuer]'
line:06f2511: '{0}'
line:09c5eaa: '"Bien, bien, {0} est vraiment attentionnée."'
line:061d426: "\"Comme c'est gentil de ta part ! C'est exactement ce que je cherchais.\""
line:0bd042a: '[Continuer]'
line:014dfb8: '[Partir] Rien ne se passe.'
line:0ab3c60: '"Arrêtez, milady. Vous devriez rentrer avant que le soleil ne se lève."'
line:0d8c336: '{0} ne veut pas être la servante du démon.'
line:0e5ffc6: '"Pfff !"'
line:0a5c6bd: "\"Une prêtresse vampire ? Je n'aime pas trop ce genre de combinaison.\""
line:0860fd7: '"Une sorcière vampire ? Ce mélange est un peu trop cliché."'
line:02764e6: "\"Une fée vampire ? C'est pas terrible si ça perd en puissance.\""
line:0538fce: "\"Un vampire ? Le sang n'a pas l'air très bon à boire.\""
