MainMenu:
  Name: 主菜單
  TrackName: 幻想的第十九形態
  Original: 千年幻想鄉 ～ History of the Moon
  Comment: "基於千年幻想鄉創作出的實驗性電聲音樂。強調前奏和副歌的反差性，從而體現出遊戲既輕鬆又需要戰鬥的特徵。\n關於“第十九形態”的描述，這是在我們手中誕生的第十九個千年幻想鄉作品，仍在不斷探索這首樂曲的各種可能性。"
Stage1:
  Name: 第一幕：迷途竹林
  TrackName: 逐夜者
  Original: 永夜的報應 ～ Imperishable Night
  Comment: "迷途竹林的主題曲，第一首關卡場景樂曲。\n整首樂曲充滿了戰鬥的興奮感，足以讓玩家迅速進入即將面對戰鬥的狀態。\n同時使用聽感像鳥鳴的音色，來增加樂曲中對夜晚氛圍的描述。"
Stage2:
  Name: 第二幕：玄武澗
  TrackName: Discovery & Discoverer
  Original: Fall of Fall ～ 秋意漸濃之瀑
  Comment: "玄武澗的主題曲，第二首關卡場景音樂。\n這是一首着重體現神祕與未知的探險類音樂，在設計上使用了大量民族打擊樂，讓玩家有身處未知境地的臨場感。"
Stage3:
  Name: 第三幕：風神之湖
  TrackName: 乘風尋仙
  Original: 少女曾見的日本原風景
  Comment: "風神之湖的主題曲，第三首關卡場景音樂。\n創作了一首像是在隨風巡遊的樂曲，有沒有彈幕就在前方不遠處的感覺呢？就讓接下來的戰鬥隨着音樂在空中起舞吧！"
Shop:
  Name: 商店界面
  TrackName: 林中小憩
  Original: Banditry Technology
  Comment: "這是一首表現放假氛圍的樂曲。\n你們不要再打來打去啦，一起結伴去摸魚吧！"
Gap:
  TrackName: 入夜曲
  Original: Necro-Fantasia
  Name: 隙間房間
  Comment: "這是一首歐式風格的樂曲。\n優雅的羽管鍵琴和寧靜的鐘琴一起演奏，讓人感覺十分安逸，特別想好好地休息一下。"
Adventure1:
  Name: 冒險事件1
  Original: 千年幻想鄉 ～ History of the Moon
  TrackName: 啟程
  Comment: "這是一首讓人感到開心的敘事型樂曲。\n使用愛爾蘭哨笛，馬林巴和多種打擊樂器同時演奏，旋律線不斷交織，營造冒險者準備下山闖蕩世界的新奇感。"
Adventure2:
  Name: 冒險事件2
  TrackName: 林中玩耍
  Original: 眾神眷戀的幻想鄉
  Comment: "這是一首表現輕鬆與積極的樂曲。\n前奏用鋼琴來營造森林寂靜的感覺，使用小提琴作為主旋律演奏歡快的音符，構成在林中輕鬆玩耍的畫面感。"
Adventure3:
  Name: 冒險事件3
  TrackName: 遺落
  Original: 少女祕封俱樂部
  Comment: "這是一首在曲師EMO的時候寫的樂曲。\n可能用“OTZ”的顏文字來表達比較確切？"
Elite1:
  Name: 強敵1
  TrackName: 不可輕敵
  Original: 永遠的三日天下
  Comment: "這是配合遊戲精英敵人出場的樂曲。\n激烈的節奏感提醒玩家即將面對一場大戰，是否做好了十足的把握呢？"
Elite2:
  Name: 強敵2
  TrackName: 對峙
  Original: 無間之鐘
  Comment: "這是配合遊戲精英敵人出場的樂曲。\n激烈的節奏感來表現戰鬥的緊張與刺激，玩家如果不全力以赴，很容易落敗哦！"
Sanyue:
  Name: 三月精
  TrackName: 好奇·靈敏·惡作劇
  Original: 賭上性命去惡作劇
  Comment: "這是光之三妖精的角色專屬戰鬥曲。\n1V1早已成為過時的戰法，3V1才最符合友情的定義。悄無聲息的靠近，留下一點點痕跡。急了沒？急了！接下來就可以堂堂正正地開始大戰爭了！"
Aya:
  Name: 射命丸文
  TrackName: 疾行Story
  Comment: "這是射命丸文的角色專屬戰鬥曲。\n哪裏有風，哪裏就有拍攝的聲音。是非真假、正反虛實，盡數落在報紙上，消解着午後的無趣。但若要深究，只會發現大多都是沒有經過證實的傳言，不禁令人感嘆：“學新聞學的。”"
Rin:
  Name: 火焰貓燐
  TrackName: 通灵者
  Original: 屍體旅行 ～ Be of good cheer!
  Comment: "這是火焰貓燐的角色專屬戰鬥曲。\n不被歡迎的妖怪在暗處伺機而動，被盯上的話可就要當心了。當來自地下的怨靈圍攏過來，那就只能硬着頭皮一戰。不過，地獄的輪禍豈是浪得虛名？"
Nitori:
  Name: 河城荷取
  TrackName: in the blue
  Original: 芥川龍之介的河童 ～ Candid Friend
  Comment: "這是河城荷取的角色專屬戰鬥曲。\n第一次可能會逃，第二次可能會逃，但凡事不過三。再遇到她的時候，最好要當心。一開始只是簡單的吹泡泡，接下來就要翻江倒海了！"
Youmu:
  Name: 魂魄妖夢
  TrackName: 此刻揮刃
  Original: 東方妖妖夢 ～ Ancient Temple
  Comment: "這是魂魄妖夢的角色專屬戰鬥曲。\n每個音符都是一把利刃，斬天地，斬萬物。劍陣一旦出現，再無逃脫可能。或許，這也算一種拔劍神曲（笑）。"
Kokoro:
  Name: 秦心
  TrackName: Ǝmotioɲ
  Original: 亡失的情感
  Comment: "這是秦心的角色專屬戰鬥曲。\n面具後的臉是哭是笑？千絲萬緒帶來千萬種表情，有些令人安心，有些隱藏危機。透過偽裝，找到真正的情感，可能就是戰勝她的關鍵。"
Clownpiece:
  Name: 克勞恩皮絲
  TrackName: Chaotic paradise
  Original: 星條旗的小丑
  Comment: "這是克勞恩皮絲的角色專屬戰鬥曲。\n來自地獄的混亂，便是她帶給人類的禮物，把月都改建成混沌的樂園也是當下最重要的事。直面可怕異變之前，還有點時間可以逃跑。3，2，1…，Time\
    \ Up！"
Siji:
  Name: 四季映姬
  TrackName: THe last judgment
  Original: 第六十年的東方審判 ～ Fate of Sixty Years
  Comment: "這是四季映姬·亞瑪薩那度的角色專屬戰鬥曲。\n最後的審判即將開始，在判官面前請懺悔自己的罪孽，然後，請給予每個人一次反抗的機會，用戰鬥獲得自由，或者去地獄悔過吧。"
Doremy:
  Name: 哆來咪
  TrackName: Close eyes
  Original: 永遠的春夢
  Comment: "這是哆來咪·蘇伊特的角色專屬戰鬥曲。\n閉眼，然後入夢，並沉浸在其中，不願醒來。污穢將在夢中被洗刷，秩序將在夢中被建立，生命將在夢中消亡。"
Reimu:
  Name: 博麗靈夢
  TrackName: 靈封之陣
  Original: 少女綺想曲 ～ Dream Battle
  Comment: "這是博麗靈夢的角色專屬Boss曲。\n在冒險的起點，仍是熟悉的她在等着對手的挑戰。永恆的“靈封之陣”，永恆的規則與秩序，共同組成這道無法突破的結界。通過這場考驗，獲得她的認可，才有資格繼續前進。"
Marisa:
  Name: 霧雨魔理沙
  TrackName: 魔導之陣
  Original: 戀色Master spark
  Comment: "這是霧雨魔理沙的角色專屬Boss曲。\n大名鼎鼎的魔法師蒞臨，即將綻放絢麗華彩。屆時，漫天星動，伴隨魔力炮的啟動，與火花一同點燃寂靜的夜空。構成聲光交匯的剎那美景。"
Sakuya:
  Name: 十六夜咲夜
  TrackName: 時停之陣
  Original: Flowering Night
  Comment: "這是十六夜咲夜的角色專屬Boss曲。\n此刻，靜止！游離在時間之外的空間，一切流動只由空間主人的操控。將利刃有序排放，刀尖向敵，而後打個響指吧！迎來時空輪轉，將一切顛覆。"
Cirno:
  Name: 琪露諾
  TrackName: 寒冰之陣
  Original: 活潑的純情小姑娘
  Comment: "這是琪露諾的角色專屬Boss曲。\n無關季節，不論日夜，寒冷是永遠的主題。不要因為是小孩子而忽略她，小孩子的惡作劇會讓你應接不暇。不當心的話，陷入寒冰困境，命運便不再受自己掌控，而危險便會緊隨其後。"
Koishi:
  Name: 古明地戀
  TrackName: 隨心
  Original: Last Remote
  Comment: "這是古明地戀角色專屬Boss曲。\n隨心但不隨性，只把最真實的情緒反饋給別人，還有伴隨情緒的未知夢境撲面而來。只有最強大的人，才能直面自己的內心，不會讓她趁虛而入！"
Alice:
  Name: 愛麗絲
  TrackName: 人偶之陣
  Original: 人偶裁判 ～ 玩弄人形的少女
  Comment: "这是爱丽丝角色专属战斗曲。\n在她看来，当魔法丝线控制下的人偶从天而降，将对手团团包围之时，胜局已定。对手的反抗只是因为她尚未用尽全力。如何解读这幅纵横交错纷杂无序的图画，才是战胜她的唯一方法。找到正确的线索，追寻到这位操纵一切的魔法使吧。"
Long:
  Name: 飯綱丸龍
  TrackName: 星落之陣
  Original: 天魔之山漫天星
  Comment: "這是飯綱丸龍的角色專屬Boss曲。\n星火燎原，卻瞬間變成指向對手的利器。倘若迷失在這天馬行空的“星落之陣”當中，危險將會如影隨形。星光稍縱即逝，轉危為安的機會也是。在這虹彩陸離的景色中，找到唯一的出口吧！"
Tianzi:
  Name: 比那名居天子
  TrackName: 劍光之陣
  Original: 幼小的有頂天
  Comment: "這是比那名居天子的角色專屬Boss曲。\n天子下凡，劍氣降至。開天闢地的氣勢，石破天驚的迴響。“劍光之陣”布好的一刻，對手的弱點便無所遁形。伴隨着大地的震顫，這位大小姐將橫掃一切不敬之人。"
Yuyuko:
  Name: 西行寺幽幽子
  TrackName: 蝶舞之陣
  Original: 幽雅地綻放吧，墨染的櫻花 ～ Border of Life
  Comment: "這是西行寺幽幽子的角色專屬Boss曲。\n幽雅經典的旋律響起，引來亡靈與蝶在身邊圍繞。若想窺伺冥界之門，還要當心誤入黃泉。“蝶舞之陣”悄然布下，天地異變戛然而止，只剩櫻花滿開，故人消逝。"
Remilia:
  Name: 蕾米莉亞
  TrackName: 緋紅之陣
  Original: 獻給已逝公主的七重奏
  Comment: "這是蕾米莉亞·斯卡蕾特的角色專屬Boss曲。\n坐下來喝一杯茶吧，來自紅魔館主的招待。\n當然，只有激烈的節奏感才與漫天飛舞的緋紅色相配，但要千萬小心，否則不經意間便會被“緋紅之陣”而吞沒。"
Sanae:
  Name: 東風谷早苗
  Original: 信仰是為了虛幻之人
  TrackName: 風祝之陣
  Comment: "這是東風谷早苗的角色專屬Boss曲。\n喚風！然後戰鬥！在電音營造的旋律中起舞，不覺間，“風祝之陣”已然形成。幻想鄉的人啊，牢記你們的信仰，並等待風神大人再次引發奇蹟。"
Junko:
  Name: 純狐
  TrackName: 殺意之陣
  Original: Pure Furies ～ 心之所在
  Comment: "這是純狐的角色專屬Boss曲。\n怨恨轉化成對戰力的無限盲從，誓將一切對手吞噬殆盡。陷入到“殺意之陣”當中，暴躁的音樂會把這場戰鬥推向失控邊緣。勝，或者敗，一念之間。"
Stage4:
  Name: 最終幕：風神之湖上空
  TrackName: 通向圓心的路
  Original: 針小棒大的天守閣
  Comment: "這是最終幕的場景曲。\n最強大的對手，站在世界的圓心。所有的道路，皆通向世界的圓心。那曾是不可被打擾之地，而現在……"
Seija:
  Name: 鬼人正邪
  TrackName: 下克上與最後對視
  Original: 浪漫逃飛行
  Comment: "這是鬼人正邪的角色專屬Boss曲。\n踏上最終之戰的道路，前方是顛倒翻轉的世界。全力以赴，在混沌中抓住下克上的唯一機會，糾正一切。"
Fail:
  Name: 遊戲失敗
  TrackName: 遊戲失敗
  Original: 神聖莊嚴的古戰場 ～ Suwa Foughten Field
Victory:
  Name: 遊戲勝利
  TrackName: 遊戲勝利
  Original: 千年幻想鄉 ～ History of the Moon
VictoryLong:
  Name: 遊戲勝利 加長版
  TrackName: 遊戲勝利 加長版
  Original: 千年幻想鄉 ～ History of the Moon
