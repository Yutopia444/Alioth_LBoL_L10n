line:0f9238b: 「強大なる{0}さん、鬼傑組組長たる私の頼みを聞いてくれませんか？」
line:037c786: 「カワウソ霊が、河童の支配を逃れて暴走したドローンの存在を嗅ぎつけました。地上の平和のために、退治をしていただけますか？」
line:07acb62: 【退治】ドローンの一隊と戦い、ランダムなレア展示品を得る
line:0e2d8d9: 【受け取る】展示品|{0}|を得る
line:08457aa: "「はい、組長！またこのようなことがあったらお任せください！」\n（うーん、我ながら何を言っているのかしら……）"
line:01fd35f: 【遠慮する】何も起こらない
line:09e89c0: 【拒否する】厄災：|{0}|
line:098663c: "「え？わ、わかったわ」\n（あれ？なんでこんな面倒そうなこと引き受けちゃったんだろう……）"
line:0970713: 「流石ですね{0}。こちらを用意したので受け取って下さい。」
line:04ee4ff: 「遠慮しておくわ、私は見返りのために善行をしている訳じゃないから」
line:0e300a9: 「そ、そいつらと戦って、私にメリットはあるの？」
line:0f208e0: 「地上の人々は貴方に大きな期待を寄せています、利益がないからといってそれを無下にしてよいのですか」
line:0abbfc7: "「う、そう言われると反論できない……」\n（いつもなら絶対反対するけど、なんだかおかしい……？）"
line:0911804: "「え？わ、わかったわ」\n（おかしいわね、なんでこんなことを引き受けてしまったのかしら……）"
line:0a5e40f: "「よーし！あたいに任せとけ！」\n（あれ？なんでこんな面倒そうなこと引き受けちゃったんだろう……）"
line:04cc621: "「え？わ、わかったわ」\n（あれ？なんでこんな面倒そうなこと引き受けちゃったのかしら……）"
line:02d74da: "「え？あぁ、わかった」\n（おかしいな、なんでこんな面倒そうなこと引き受けちまったんだ……）"
line:0f6ccc8: "「いいよ～」\n（あれ？なんでこんな面倒そうなこと引き受けちゃったんだろう……）"
