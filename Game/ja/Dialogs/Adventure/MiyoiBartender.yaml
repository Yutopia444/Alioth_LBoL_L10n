line:0c9cdfa: '{0}は深夜の鯢呑亭に迷い込んだ。酒の匂いが広がっている……'
line:0c66585: 「{0}さん、はやくあがって！今日は何にしますか？」
line:0868bad: （鯢呑亭って…確か夜にやっている妖怪向けの居酒屋だったっけ）
line:061da42: 【一升瓶を注文】展示品|{0}|を入手し、デッキからカード一枚を削除する
line:096d262: 「前回文が注文した例の酒、私にもひとつ！」
line:0da2517: 「ええ——{0}さん本当に大丈夫ですか？」
line:05ad143: 「ぐううう…こんなに多いなんて冗談でしょ！？でもみんながこっちを見ている、もう後戻りできない！」
line:0c7c734: （{0}はなんとか|鯨の息吹|を飲みきったが、酒のせいで勘定と何か重要なことを忘れてしまった）
line:0269654: 何か忘れたような…？（デッキからカード一枚を削除する）
line:018cd9a: 【飲み比べ勝負】{0}<sprite="Point" name="Gold">と厄災|{1}|2枚を得る
line:0b95170: 「おや？鬼の私に飲み比べで勝負するつもりかい？」
line:0c77879: 「ねぇ、萃香。私が店に入ったときから馬鹿にしたような目で見てたわよね？」
line:00d22c7: 周りの妖怪が騒ぎ始めた、中にはどちらが勝つか賭けている妖怪の姿もある
line:0bdfac4: 「ほら、全然飲み残しがあるじゃないか。まだまだだね！」
line:0064f30: 「私に度数なんて関係ないわ！」
line:0c29c84: "今までにない闘志が湧き起こり、{0}は勝利と賞金を収めた。\nでも、そこまでやった価値があっただろうか？"
line:05203c5: 「まあ、いつもの通りでお願い、金はまた今度払うわ」
line:0862f2d: 「ええ——でも先月のお会計もまだでしたよね？」
line:015f1aa: 「ぐっ…一杯飲んだだけなのになんだか…眠気が…」
line:024e390: 夢の中で、{0}は不審な存在を感じた。
line:0b0300d: 「うわっ！これをあげるのでどうかご内密にお願いします」
line:0b3a02b: 【許す】展示品|{0}|を得る
line:0bd13e0: 「分かってるじゃない。さすが鯢呑亭を商う看板娘ね」
line:0d8166c: 【断る】何も起こらない
line:01b5a50: 「結構よ、二度と騙されないから」
