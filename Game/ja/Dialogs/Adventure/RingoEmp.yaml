line:0e80e9a: 「あ、{0}だ～河童のドローンと交戦したんだってね」
line:05575e9: 【権利保護に協力する】道具カード：|{0}|を得る
line:0ddd7b7: 【続く】
line:0b93b5a: 【協力を拒否する】ランダムな三枚の道具カードを得る、厄災：|{0}|
line:0a26145: 「月の兎に指図されるなんて……身の程を知らせてやろうか？」
line:080f7f2: 鈴瑚は謎の棒状の道具を取り出して{0}の前で振り、沢山落とし物をして逃げて行った。
line:06797b6: 「……あれ？月の兎が地上で団子を買っているなんて、変なの」
line:0c1abfc: 「あっ！なんでこんな所に道具が落ちてるんだろう……」
line:095a793: 【関係ない】何も起こらない
line:0bfddbe: 「四季映姫が得意そうな話だし、あいつに聞いてきたらいいんじゃないか」
line:00a9945: 「あれは私達の技術を盗んだ模造品だから、月の都の権利を守るために協力してくれない？」
line:09ee960: 「知的財産ってやつ？まあ鬱陶しいドローンは排除しておくかぁ」
line:0deca08: "「ありがとう！月の都が開発した最新の対抗装備はきっと役に立つよ」\n（ついでに面倒な試験運用もやってもらおっと）"
line:0b3160d: 「ああ、やめやめ！私のことは忘れて、団子を買いに行った兎と出会ったってだけだから」
line:065ee92: 「閻魔が著作権の問題を扱えるなら、月の兎の労働争議も担当してもらえそうね」
line:082e36e: 「ドローン掃除ね、ついでに引き受けておくわ」
line:0250688: 「あれってドローンって言うんだ、壊しておくね」
line:0659c8a: 「あいつら凍らないから嫌い！全部壊してやる！」
line:0966360: 「細かい文字なんて無い……よね？」
line:014c651: 「返す言葉もない……」
line:00f11f7: 「うーん、命令されてるみたいでなんかムカつく」
line:06e4380: 「なんか怪しいなぁ。お姉ちゃんに見てもらった方がいいかな～」
line:01cf70f: 「細かい文字までよく読んでからでないと契約書にはサインしないと決めておりますので」
line:057628f: 「文字がいっぱい……目が回る……」
line:010ac9a: 「妖精には無理があったかな……」
line:0d19c44: 「話が分かるのが何人かいればいいだけなのに……現場営業って大変ね……」
line:0e52736: 「月の話になると厄介事ばっかり。私を巻き込むのはやめてほしいわ」
line:00f79ea: 「貴方、もしかしてあの詐欺兎の同類？……退治した方がいいかしら？」
line:0ed06df: 「知的財産がどうとか、興味もないし知りたくもないかなぁ」
