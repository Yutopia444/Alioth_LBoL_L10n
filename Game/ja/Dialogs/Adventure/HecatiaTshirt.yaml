line:008fa52: 「あなたもかぐやちゃんのファンになりましょ！」
line:0678716: 【服を受け取る】|変なオタクTシャツ|を手に入れる
line:063a72b: 「知ってる？かぐやちゃんは他の月の民とは違って、とっても情熱的で親切なのよ！」
line:0ba9037: 「無料？それなら1つおねがい」
line:0670be2: 「ぜひ着てみてね！」
line:00d22b0: 【遠慮する】何も起こらない
line:0fc2c16: "{Censor:select false='「うわ、”かぐやちゃん”なんてオタクっぽくて気持ち悪い…」' true='うわ、何その変なTシャツ'}"
line:059fbd3: 「無料？それなら1つお願い、大きいのね」
line:0ba87b6: 「ぜひ着てみてね！」
line:01566ec: 【服を受け取る】|変なオタクTシャツ(L)|を手に入れる
line:0e45c03: 「当然さいきょーにデカいのをもらうに決まってるだろ！」
line:00a6aad: 「うわー、変な柄のTシャツー！ ぜんぜん可愛くなーい」
line:022c403: 「あらそう？お嬢様のお土産にしようかしら」
line:0a28c4c: 「もちろんだ、大きいのをくれ！」
line:0c1968a: 「あらそう？美鈴のお土産にしようかしら、一応大きいのを頂戴」
line:0a99c1c: 「じゃあねー、このすっごく大きいやつ！ これがいいなー！」
line:0bd1ffa: 「げーっ、 こんな変なTシャツ、あたいのカッコいい羽が隠れちゃうから絶対いらないぞ！」
line:0f24388: 「タダならあたいに寄越すのが当然よね！」
line:00d286e: 「お金いらないの？ じゃあもらっちゃおーっと！」
line:062b5d5: 「タダなら返さなくてもいいよな？もらっておくぜ」
line:055f5d6: 「あら、随分と変なデザインね…雑巾にするにしても生地が悪そうだし、いらないわ」
