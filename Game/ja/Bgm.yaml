MainMenu:
  Name: メインメニュー
  TrackName: 幻想 ～ 其十九
  Original: 千年幻想郷 ～ History of the Moon
  Comment: |-
    「千年幻想郷」を基に制作された実験的な楽曲。前奏とサビのコントラストを強調し、ゲームの持つリラックスした雰囲気と戦闘の両面性を表現しています。
    副題はこの楽曲が私たちの手で生まれた十九番目の「千年幻想郷」アレンジ作品であり、この楽曲の様々な可能性を今も模索し続けていることを示しています。

Stage1:
  Name: 第一章：迷いの竹林
  TrackName: 夜を追う者
  Original: 永夜の報い ～ Imperishable Night
  Comment: |-
    迷いの竹林のテーマ曲、第一章のステージBGM。
    楽曲全体が戦闘への高揚感に満ちており、プレイヤーを臨戦態勢へと導きます。
    同時に、鳥のさえずりのような音色を用いることで、楽曲に夜の情景描写を添えています。

Stage2:
  Name: 第二章：玄武の沢
  TrackName: Discovery & Discoverer
  Original: フォールオブフォール ～ 秋めく滝
  Comment: |-
    玄武の沢のテーマ曲、第二章のステージBGM。
    神秘と未知への探検心を重視した楽曲です。編曲には民族打楽器を多用し、プレイヤーに未知の境地に立つ臨場感を与えます。

Stage3:
  Name: 第三章：風神の湖
  TrackName: 風に乗り仙を尋ねて
  Original: 少女が見た日本の原風景
  Comment: |-
    風神の湖のテーマ曲、第三章のステージBGM。
    まるで風に乗って巡遊するような楽曲に仕上げました。すぐそこに弾幕が待ち受けているような感覚、ありませんか？ この後の戦いも音楽に乗せて空中で舞い踊らせましょう！

Shop:
  Name: ショップ
  TrackName: 林間の小憩
  Original: バンデットリィテクノロジー
  Comment: |-
    休日気分を表現した楽曲。
    喧嘩は止めて、一緒にサボろう！

Gap:
  Name: スキマ
  TrackName: 入夜曲
  Original: ネクロファンタジア
  Comment: |-
    欧風の楽曲。
    優雅なチェンバロと静かな鐘の音が共鳴し、休息を取りたくなるゆったりと安らかな気分にさせてくれます。

Adventure1:
  Name: 冒険イベント1
  TrackName: 旅立ち
  Original: 千年幻想郷 ～ History of the Moon
  Comment: |-
    心が弾むような、物語性のある楽曲。
    アイリッシュホイッスル、マリンバ、多彩な打楽器が同時に奏でられ、旋律線が絶え間なく交錯することで、冒険者が山を下り世の中へと飛び出していく新鮮な感覚を醸成します。

Adventure2:
  Name: 冒険イベント2
  TrackName: 林の戯れ
  Original: 神々が恋した幻想郷
  Comment: |-
    軽やかで前向きな気持ちを表現した楽曲。
    前奏はピアノで林の静けさを表現し、メロディーはヴァイオリンを主旋律に用いて楽しい音符を奏で、林の中で気軽に遊ぶ情景を描き出します。

Adventure3:
  Name: 冒険イベント3
  TrackName: 失くしもの
  Original: 少女秘封倶楽部
  Comment: |-
    作曲者がエモな時に書いた楽曲。
    使われるシーンを簡潔に表現するなら「orz」と言えるかもしれませんね？

Elite1:
  Name: 強敵1
  TrackName: 油断大敵
  Original: 永遠の三日天下
  Comment: |-
    ゲーム内のエリート敵出現時用の楽曲。
    激しいリズム感がプレイヤーに決戦の時が迫っていることを知らせ、準備は万全かと問いかけます。

Elite2:
  Name: 強敵2
  TrackName: 対峙
  Original: 無間の鐘　～ Infinite Nightmare
  Comment: |-
    ゲーム内のエリート敵出現時用の楽曲その2。
    激しいリズム感で戦闘の緊張と刺激を表現し、全力を尽くさなければ容易に敗れてしまうことを示唆します。

Sanyue:
  Name: 三妖精
  TrackName: 好奇・俊敏・悪戯
  Original: いたずらに命をかけて
  Comment: |-
    光の三妖精のキャラクター専用戦闘曲。
    1対1はもはや時代遅れ、3対1こそが友情の証。音もなく近づき、ほんの少しの痕跡を残す。怒った？ 怒ったね！ さあ、今こそ大戦争の時！

Aya:
  Name: 射命丸文
  TrackName: 疾走Story
  Original: 妖怪の山 ～ Mysterious Mountain
  Comment: |-
    射命丸文のキャラクター専用戦闘曲。
    風が吹くところ、シャッター音あり。嘘か真か、正か邪か、その全てが紙面に載り、午後の退屈を紛らわせる。しかし、一度調べればその大半が未検証の風説であることに気づき、「ジャーナリズムとはそういうものだ。」と嘆息せざるをえない。

Rin:
  Name: 火焔猫燐
  TrackName: 霊媒師
  Original: 死体旅行 ～ Be of good cheer!
  Comment: |-
    火焔猫燐のキャラクター専用戦闘曲。
    暗がりで機を窺う忌み嫌われた妖怪に気をつけろ。地底の怨霊に囲まれたら、戦いの覚悟を決めなければならない。しかし、地獄の輪禍の名がお飾りとは思わないで下さいね？

Nitori:
  Name: 河城にとり
  TrackName: in the blue
  Original: 芥川龍之介の河童 ～ Candid Friend
  Comment: |-
    河城にとりのキャラクター専用戦闘曲。
    一度目は逃げるかも、二度目も逃げるかも。しかし、三度目はない。次に出会った時は用心したほうがいい。最初はただのシャボン玉遊びだが、次に起こるのは大波だ！

Youmu:
  Name: 魂魄妖夢
  TrackName: 瞬刻瞬閃
  Original: 東方妖々夢 ～ Ancient Temple
  Comment: |-
    魂魄妖夢のキャラクター専用戦闘曲。
    一つ一つの音符が刃と化し、天地を斬り、万物を斬る。剣陣が一度現れれば、もはや逃れられない。ある意味、これも抜剣神曲ってヤツですかね（笑）。

Kokoro:
  Name: 秦こころ
  TrackName: Ǝmotioɲ
  Original: 亡失のエモーション
  Comment: |-
    秦こころのキャラクター専用戦闘曲。
    仮面の下の顔は泣いているのか笑っているのか？千の想いが無数の表情を生み出す。ある表情は安らぎを与え、ある表情には危険が潜む。ポーカーフェイスの向こう側、本当の感情を見抜くことが、彼女に勝つ鍵かもしれない。

Clownpiece:
  Name: クラウンピース
  TrackName: Chaotic paradise
  Original: 星条旗のピエロ
  Comment: |-
    クラウンピースのキャラクター専用戦闘曲。
    地獄から来た混沌、それが彼女が人間に贈る贈り物。月の都を混沌の楽園に作り変えるのが目下の最重要課題。恐るべき異変に直面する前に、逃げるなら今しかない。3、2、1…、タイムアップ！

Siji:
  Name: 四季映姫
  TrackName: ラストジャッジメント
  Original: 六十年目の東方裁判 ～ Fate of Sixty Years
  Comment: |-
    四季映姫・ヤマザナドゥのキャラクター専用戦闘曲。
    最後の審判が今始まろうとしている。裁判官の前で自らの罪を悔いよ。そして、全ての人に一度だけ反抗の機会を与えよう。戦いによって自由を得るか、さもなくば地獄で悔いるがいい。

Doremy:
  Name: ドレミー
  TrackName: Close eyes
  Original: 永遠の春夢
  Comment: |-
    ドレミー・スイートのキャラクター専用戦闘曲。
    目を閉じれば、そこは夢の世界。一度浸れば、もう目醒めたくなくなる。穢れは夢の中で洗い流され、秩序は夢の中で築かれ、命は夢の中で消えゆく。

Reimu:
  Name: 博麗霊夢
  TrackName: 霊封の陣
  Original: 少女綺想曲 ～ Dream Battle
  Comment: |-
    博麗霊夢のキャラクター専用ボス曲。
    冒険の始まり、そこには今もなお見慣れた彼女が挑戦者を待っている。永遠なる「霊封の陣」、永遠なる規則と秩序、それらが共にこの破ること能わざる結界を形作る。この試練を乗り越え、彼女の認可を得てこそ、進み続ける資格を得るのだ。

Marisa:
  Name: 霧雨魔理沙
  TrackName: 魔導の陣
  Original: 恋色マスタースパーク
  Comment: |-
    霧雨魔理沙のキャラクター専用ボス曲。
    名高き魔法使いが登場し、今まさに華麗なる彩りを咲き誇らせんとしている。やがて満天の星が動き出し、魔力砲の始動と共に火花が静まり返った夜空を焦がす。音と光が交錯する刹那の美景を構成する。

Sakuya:
  Name: 十六夜咲夜
  TrackName: 時停の陣
  Original: フラワリングナイト
  Comment: |-
    十六夜咲夜のキャラクター専用ボス曲。
    時よ、止まれ！ 時間軸から切り離された空間、その中の一切の流れは空間の主の掌の内。整然と並んだ刃を敵に向け、指を鳴らせ！ 時空の輪廻を迎え、全てを覆すのだ。

Cirno:
  Name: チルノ
  TrackName: 寒氷の陣
  Original: おてんば恋娘
  Comment: |-
    チルノのキャラクター専用ボス曲。
    季節を問わず、日夜を問わず、寒冷は永遠のテーマ。子供だからといって侮るなかれ、子供のいたずらは手に負えないものだ。注意を怠れば、寒氷の困境に陥り、命運はもはや自らの手中に非ず、危険がすぐそこに迫る。

Koishi:
  Name: 古明地こいし
  TrackName: 気の向くままに
  Original: ラストリモート
  Comment: |-
    古明地こいしのキャラクター専用ボス曲。
    気まぐれではなく、思うがまま。真っすぐな気持ちだけを伝えれば、その心に合わせて未知なる夢が押し寄せる。最も強き者だけが、己の内面と向き合い、彼女に付け入る隙を与えないのだ！

Alice:
  Name: アリス・マーガトロイド
  TrackName: 人形の陣
  Original: 人形裁判 ～ 人の形弄びし少女
  Comment: |-
    アリスのキャラクター専用戦闘曲。
    彼女の目には、魔法の糸に操られた人形が天から降り立ち、敵を包囲したその瞬間に、勝負は決したも同然。敵の反抗は、彼女が未だ全力を尽くしていない証拠に過ぎない。この縦横に入り組み、入り乱れて無秩序な絵図を如何に解読するかこそが、彼女に打ち勝つ唯一の方法である。正しい手がかりを見つけ出し、全てを操るこの魔法使いを追い詰めよ。

Long:
  Name: 飯綱丸龍
  TrackName: 星落の陣
  Original: 星降る天魔の山
  Comment: |-
    飯綱丸龍のキャラクター専用ボス曲。
    微かな星の光は瞬く間に広がり、敵を狙う恐ろしい武器と化す。もしこの天衣無縫なる「星落の陣」の中に迷い込めば、危険は影の如く付き纏う。星の光は儚く消えるもので、危機を転機に変えるチャンスもまた儚い。この虹色に彩られ、変幻極まりない景色の中に、唯一の出口を見つけ出せ！

Tianzi:
  Name: 比那名居天子
  TrackName: 剣光の陣
  Original: 幼心地の有頂天
  Comment: |-
    比那名居天子のキャラクター専用ボス曲。
    天子降臨、剣気解放。その力は天地を切り開き、反響は天地を揺るがす。「剣光の陣」が敷かれた瞬間、敵の弱点は逃れようもなく露わになる。大地の震動と共に、この御令嬢は不敬なる者たちをことごとく薙ぎ払うであろう。

Yuyuko:
  Name: 西行寺幽々子
  TrackName: 蝶舞の陣
  Original: 幽雅に咲かせ、墨染の桜 ～ Border of Life
  Comment: |-
    西行寺幽々子のキャラクター専用ボス曲。
    幽雅でクラシカルな旋律が響き渡り、幽霊と蝶が辺りを舞う。冥界の門を覗こうとするなら、黄泉へ迷い込まぬよう用心せよ。「蝶舞の陣」が静かに敷かれた時、天変地異は収まり、満開の桜と消えゆく故人のみが残される。

Remilia:
  Name: レミリア
  TrackName: 紅の陣
  Original: 亡き王女の為のセプテット
  Comment: |-
    レミリア・スカーレットのキャラクター専用ボス曲。
    お茶はいかが？ 紅魔館の主からのおもてなしだ。
    無論、激しいリズム感こそが、舞い散る真紅と相応しい。だが、細心の注意を払え、さもなくば不意に「紅の陣」に飲み込まれてしまうぞ。

Sanae:
  Name: 東風谷早苗
  TrackName: 風祝の陣
  Original: 信仰は儚き人間の為に
  Comment: |-
    東風谷早苗のキャラクター専用ボス曲。
    風を喚べ！ そして戦え！ 電子音が紡ぐ旋律の中で舞い踊れば、いつの間にか「風祝の陣」は完成している。幻想郷の人々よ、己が信仰を胸に刻み、風の神が再び奇跡を起こすのを待つのだ。

Junko:
  Name: 純狐
  TrackName: 殺意の陣
  Original: ピュアヒューリーズ ～ 心の在処
  Comment: |-
    純狐のキャラクター専用ボス曲。
    怨恨は力への盲目的な信奉へと転じ、全ての敵を貪り尽くさんとする誓いへと昇華する。「殺意の陣」の中に陥れば、暴力的な音楽がこの戦いを制御不能の縁へと押しやる。勝つか、敗れるか、それは一瞬の決断。

Stage4:
  Name: 最終章：風神の湖上空
  TrackName: 円心へと至る道
  Original: 針小棒大の天守閣
  Comment: |-
    最終章のステージBGM。
    最強の敵は世界の中心に立つ。全ての道は世界の中心へと通ずる。かつてそこは、決して侵してはならぬ場所だった… そして今…

Seija:
  Name: 鬼人正邪
  TrackName: 下克上と最後の対視
  Original: ロマンチック逃飛行
  Comment: |-
    鬼人正邪のキャラクター専用ボス曲。
    最終決戦への道を進めば、そこは逆転した世界。全力を尽くし、混沌の中で下克上の唯一のチャンスを掴み取り、全てを正せ。

