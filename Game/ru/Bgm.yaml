Stage1:
  Name: 'Акт 1: Пропащий бамбуковый лес'
  Original: Retribution for the Eternal Night ~ Imperishable Night
  TrackName: Ночная погоня
  Comment: "Главная тема Пропащего бамбукового леса, первой локации игры.\nВсю композицию\
    \ пронизывает волнение битвы, настраивая игрока на боевой лад.\nВ то же время,\
    \ мелодия усиливает ночную атмосферу за счёт мотивов, напоминающих пение птиц."
Stage2:
  Name: 'Акт 2: Долина Гэмбу'
  Original: Fall of Fall ~ Autumnal Waterfall
  TrackName: Discovery & Discoverer
  Comment: "Главная тема Долины Гэмбу, второй локации игры.\nЭто приключенческая мелодия,\
    \ посвящённая тайнам и неизведанному. Ритм задаётся этническими ударными инструментами,\
    \ призванными создать ощущение путешествия в неизвестную область."
Stage3:
  Name: 'Акт 3: Озеро бога ветра'
  TrackName: По ветру, по следам бессмертных
  Original: The Primal Scene of Japan the Girl Saw
  Comment: "Главная тема Озера бога ветра, третьей локации игры.\nМелодия подобна\
    \ танцующему на ветру листу, создавая ощущение встречи с противником лицом к лицу.\n\
    Давайте устроим воздушную дуэль под эту музыку!"
Shop:
  Name: Лавка Таканэ
  TrackName: Привал в лесу
  Original: Banditry Technology
  Comment: "Музыкальная композиция, передающая атмосферу фестиваля.\nХватит ссориться!\
    \ Давайте повеселимся, все вместе!"
Gap:
  Name: В Разрыве
  TrackName: Ноктюрн
  Original: Necrofantasia
  Comment: "Музыкальная композиция в европейском стиле.\nКомбинация изящного клавесина\
    \ и сдержанного глокеншпиля создаёт очень умиротворяющую атмосферу, располагающую\
    \ к отдыху и расслаблению."
Adventure1:
  Name: Событие 1
  TrackName: Отправление
  Original: Gensokyo Millennium ~ History of the Moon
  Comment: "Жизнерадостная композиция.\nМелодия, исполняемая ирландскими свистками,\
    \ маримбой и рядом ударных инструментов, за счёт разнообразия звуков создаёт ощущение\
    \ приключения - подобное желанию путешественника спуститься с горы и исследовать\
    \ увиденный им сверху мир."
Adventure2:
  Name: Событие 2
  TrackName: Лесная забава
  Original: The Gensokyo the Gods Loved
  Comment: "Композиция, олицетворяющая расслабленное и позитивное состояние.\nВ прелюдии\
    \ фортепиано создаёт ощущение спокойствия в лесу, тогда как скрипка формирует\
    \ основную, бодрую мелодию, создавая картину беззаботной игры в чаще леса."
Adventure3:
  Original: Girls' Secret Sealing Club
  Name: Событие 3
  TrackName: Потерянная
  Comment: "Это музыкальное произведение я написал в сотрудничестве с композитором\
    \ EMO.\nНаверное, наиболее простым и точным способом описать его будет эмотикон\
    \ OTZ (стою на коленях)?"
MainMenu:
  Name: Главное меню
  TrackName: Девятнадцатая форма фантазии
  Original: Gensokyo Millennium ~ History of the Moon
  Comment: "Экспериментальный электронный трек на основе темы Gensokyo Millenium ~\
    \ History of the Moon. Его вступление и припев контрастируют между собой, отражая\
    \ двойственную природу игры - одновременно беззаботную и динамичную.\nНазвание\
    \ \"Девятнадцатая форма\" ссылается на то, что это девятнадцатый ремикс мелодии\
    \ Gensokyo Millenium от композитора, и он продолжает исследовать всевозможную\
    \ глубину данной музыкальной композиции."
Elite1:
  Name: Элита 1
  TrackName: Не стоит недооценивать врага
  Original: Eternal Transient Reign
  Comment: "Трек, сопровождающий появление элитного противника.\nНапряжённый ритм\
    \ напоминает, что битва будет тяжёлой. Вы точно к ней подготовились?"
Elite2:
  Name: Элита 2
  TrackName: Противостояние
  Original: Bell of Avīci ~ Infinite Nightmare
  Comment: "Трек, сопровождающий появление элитного противника.\nНапряжённый ритм\
    \ передаёт накал и азарт схватки - если игрок не готов, то его легко уничтожат!"
Sanyue:
  Name: Три феи Света
  TrackName: Любопытство, чувствительность, озорство.
  Original: The Refrain of the Lovely Great War/Great Fairy Wars ~ Fairy Wars
  Comment: "Особая тема битвы против Трёх фей Света.\nБитвы один на один больше не\
    \ в моде - нападение втроём на одного показывает силу дружбы. Подкрасться сзади,\
    \ почти не оставляя следов. Мы куда-то спешим? Да, конечно же! Теперь мы можем\
    \ достойно начать большую войну!"
Koishi:
  Name: Койси Комейдзи
  TrackName: Кругосветка сердца
  Original: Last Remote
  Comment: "Особая тема битвы против любопытного ёкая.\nСлучайно или нет, но лишь\
    \ самые искренние эмоции передаются другим, и вместе с ними - неосознанные, подсознательные\
    \ мечты. Только самый сильный человек может взглянуть в её сердце и не стать игрушкой\
    \ в её руках!"
Aya:
  TrackName: Поспешная Story
  Name: Ая Сямэймару
  Original: Youkai Mountain ~ Mysterious Mountain
  Comment: "Особая тема битвы против настырной журналистки.\nЕсли где-то слышно ветер,\
    \ то скоро там слышно щёлканье камеры. Истина и ложь, правда и враньё, реальность\
    \ и фикция - все они находят свой путь в газеты, развеивая скуку послеобеденной\
    \ поры. Но если копнуть поглубже, то всё это - лишь неподтверждённые слухи, которые\
    \ заставляют тяжело вздыхать, думая о \"типичных уловках журналистики\"."
Rin:
  Name: Рин Каэмбё
  TrackName: Медиум
  Original: Corpse Voyage ~ Be of good cheer!
  Comment: "Особая тема битвы против адской кошки.\nЖуткие монстры выжидают удобного\
    \ момента в темноте, поэтому вам следует быть осторожными и готовыми к их нападению.\
    \ Ведь когда вы окружены призраками - приходится лишь стискивать зубы и сражаться...\
    \ Но не являются ли блефом их смертельные проклятия?"
Nitori:
  TrackName: in the blue
  Name: Нитори Кавасиро
  Original: Akutagawa Ryuunosuke's "Kappa" ~ Candid Friend
  Comment: "Особая тема битвы против речной мастерицы.\nСбежать можно один раз, может,\
    \ два, но Бог любит троицу. Лучше хорошенько подготовиться, прежде чем она встретится\
    \ вам снова. Сначала это было похоже на выдувание мыльных пузырей, но теперь вас\
    \ может смыть потоком могучей широкой реки!"
Youmu:
  Name: Ёму Компаку
  TrackName: Момент взмаха лезвия
  Original: Eastern Ghostly Dream ~ Ancient Temple/Hiroari Shoots a Strange Bird ~
    Till When?
  Comment: "Особая тема битвы против полу-человека, полу-призрака.\nКаждая музыкальная\
    \ нота - острое лезвие, режущее как небо, так и землю. Как только ноты окружают\
    \ вас - спасения больше нет. Возможно, стоило назвать это \"Симфонией клинков\"\
    \ (ха-ха)."
Kokoro:
  Name: Хата-но Кокоро
  TrackName: Ǝmotioɲ
  Original: The Lost Emotion
  Comment: "Особая тема битвы против ёкая-менрейки.\nЛицо за маской - оно плачет или\
    \ смеётся? Множество эмоций отражается в его бесчисленных выражениях, одни - обнадёживающие,\
    \ другие - угрожающие. Раскрытие истинных чувств через срывание маски может стать\
    \ ключом к победе."
Clownpiece:
  Name: Клаунпис
  TrackName: Chaotic paradise
  Original: Pierrot of The Star-Spangled Banner
  Comment: "Особая тема битв против безумного клоуна.\nХаос на Земле - это её будущий\
    \ дар человечеству, а пока что она занята погружением в хаос Луны. У вас ещё есть\
    \ шанс спастись, прежде, чем вы сойдёте с ума. 3, 2, 1... Время истекло!"
Siji:
  Name: Эйки Сики
  TrackName: THe last judgment
  Original: Eastern Judgement in the Sixtieth Year ~ Fate of Sixty Years
  Comment: "Особая тема битвы против Ямаксанаду.\nПоследний суд в вашей жизни вот-вот\
    \ начнётся. Пожалуйста, покайтесь во всех своих грехах перед судьёй. А затем приготовьтесь\
    \ сопротивляться, если вы не хотите отправиться в Ад здесь и сейчас."
Doremy:
  TrackName: Close eyes
  Original: Eternal Spring Dream
  Name: Дореми
  Comment: "Особая тема битвы против ёкая снов.\nЗакройте глаза и погрузитесь в сон,\
    \ только чтобы никогда не захотеть проснуться. Во сне вы очиститесь, найдёте покой\
    \ и мирно умрёте."
Marisa:
  Name: Мариса Кирисамэ
  Original: Love-Colored Master Spark
  TrackName: Магический пентакль
  Comment: "Особая тема битвы против ведьмы-коллекционерши.\nИзвестная волшебница\
    \ здесь, и она вот-вот раскрасит ночь пышным цветом. Звёзды засияют от её разрушительного\
    \ заклинания, а тихое ночное небо покроется искрами. Прекрасный момент, когда\
    \ звук и свет работают сообща."
Reimu:
  TrackName: Круг печатей фантазии
  Name: Рэйму Хакурэй
  Original: Maiden's Capriccio ~ Dream Battle
  Comment: "Особая тема битвы против жрицы храма Хакурэй.\nВ начале расследования\
    \ она ещё не разогрелась, и готова принять вызов от любого соперника. Вам придётся\
    \ испытать круг печатей фантазии, древние традиции и законы, формирующие непреодолимый\
    \ барьер. Лишь преодолевшие это испытание получат право продолжить свой путь."
Sakuya:
  Name: Сакуя Идзаёй
  Original: Flowering Night
  TrackName: Остановившийся циферблат
  Comment: "Особая тема битвы против горничной дьяволицы.\nВ момент воцаряется тишина.\
    \ Всё пространство вокруг оказывается в её власти. Осталось лишь расставить клинки\
    \ острыми лезвиями к врагу и щёлкнуть пальцами! Время повернётся вспять, а ситуация\
    \ перевернётся с ног на голову."
Cirno:
  Name: Чирно
  Original: Tomboyish Girl in Love
  TrackName: Ледяной купол
  Comment: "Особая тема битвы против самой сильной феи.\nНезависимо от времени года,\
    \ дня или ночи, холод - вечный враг. Не игнорируйте его аватар, даже если она\
    \ выглядит как ребёнок - иначе детские шалости обернутся смертельной опасностью.\
    \ Постарайтесь не попасть в безвыходное положение, когда ваша судьба вам не принадлежит,\
    \ а опасность буквально висит в воздухе."
Alice:
  Name: Алиса
  TrackName: Круг кукол-подруг
  Original: Doll Judgement ~ The Girl Who Played with People's Shapes
  Comment: "Особая тема битвы против кукольницы.\nПо её собственному мнению, когда\
    \ куклы, управляемые волшебными шёлковыми нитями, спустились с неба и окружили\
    \ соперницу - победа была предрешена. Оставшееся сопротивление объяснялось лишь\
    \ тем, что противнице хотелось потратить все свои силы. Только правильная интерпретация\
    \ этой противоречивой сцены позволит вам найти выход и победить волшебницу, которой\
    \ подконтрольно почти всё."
Long:
  Name: Мэгуму Иидзунамару
  Original: Starry Mountain of Tenma
  TrackName: Небосвод падающих звёзд
  Comment: "Особая тема битвы против дайтенгу.\nИскра вызывает пожар и мгновенно набрасывается\
    \ на противника. Если вы увлечётесь красотой падающих звёзд в небе, то вам несдобровать.\
    \ Их свет мимолётен и смертельно опасен. Из этого радужного пейзажа есть лишь\
    \ один безопасный выход!"
Tianzi:
  TrackName: Круговой взмах меча
  Original: Bhavaagra As Seen Through a Child's Mind
  Name: Тэнси Хинанави
  Comment: "Особая тема битвы против небожительницы.\nДочь Неба спустилась на Землю,\
    \ и свет её меча упал на поверхность. В тот момент, когда разверзлись небо и земля,\
    \ началось смятение. Пока этот меч не будет познан вами, слабость противника будет\
    \ скрыта от глаз. Содроганием земли эта юная леди надеется смести всех немилых\
    \ ей людей."
Yuyuko:
  Name: Ююко Сайгёдзи
  TrackName: Хоровод танцующих бабочек
  Original: Bloom Nobly, Ink-Black Cherry Blossom ~ Border of Life
  Comment: "Особая тема битвы против принцессы-призрака.\nЭлегантная, классическая\
    \ мелодия привлекла нежить и насекомых. Если вы хотите понаблюдать за их дикими\
    \ танцами, то не увлекитесь, и не попадите в Хакугёкуро. Когда закончится хоровод\
    \ бабочек, мир застынет, а вы исчезнете, и лишь сакура зацветёт ярче обычного."
Remilia:
  Name: Ремилия
  TrackName: Алый пентакль
  Original: Septette for a Dead Princess
  Comment: "Особая тема битвы против Алой дьяволицы.\nПрисядьте и выпейте чашечку\
    \ чая у гостеприимной владелицы особняка.\nКонечно, при этом вам придётся уворачиваться\
    \ от малинового цвета, летящего по всему небу - не наступите ненароком внутрь\
    \ алого пентакля."
Sanae:
  Name: Санаэ Котия
  TrackName: Круговорот жрицы ветра
  Original: Faith Is for the Transient People
  Comment: "Особая тема битвы против жрицы ветра.\nВетер здесь! Пора сражаться! Танцуя\
    \ под электронную мелодию, осознайте, что вы попали в круговорот жрицы ветра.\
    \ О, жители Гэнсокё - не теряйте веры в то, что Бог ветра когда-нибудь вновь совершит\
    \ чудо."
Junko:
  Name: Дзюнко
  TrackName: Цикл смертей
  Original: Pure Furies ~ Whereabouts of the Heart
  Comment: "Особая тема битвы против непорочной лисицы.\nНенависть обратилась в чистую\
    \ боевую мощь, готовую сокрушить всех противников. Превратившись в цикл смертей,\
    \ эта безумная музыка ясно передаёт хаос битвы. Победа или поражение - ваши жизни\
    \ висят на волоске."
Stage4:
  Name: 'Финал: Небеса над Озером бога ветра'
  TrackName: Путь к центру
  Original: The Exaggerated Castle Keep
  Comment: "Тема финального акта.\nСамый могущественный противник поджидает в центре\
    \ мира. Все дороги ведут к нему, как радиусы круга. Раньше это место было нетронутым,\
    \ но теперь…"
Seija:
  Name: Сэйдзя Кидзин
  TrackName: Последний переворот точки зрения
  Original: Romantic Escape Flight
  Comment: "Особая тема битвы против человека и демона хорошего и плохого.\nНачав\
    \ финальную битву, вы увидите, что весь мир перевернулся с ног на голову. Это\
    \ - ваша последняя возможность спасти его от погружения в хаос."
Fail:
  Name: Неудача
  TrackName: Неудача
  Original: The Venerable Ancient Battlefield ~ Suwa Foughten Field/Player's Score
Victory:
  Name: Успех
  TrackName: Успех
  Original: Gensokyo Millennium ~ History of the Moon
VictoryLong:
  Name: Успех (Длинная версия)
  TrackName: Успех (Длинная версия)
  Original: Gensokyo Millennium ~ History of the Moon
