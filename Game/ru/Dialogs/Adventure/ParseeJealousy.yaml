line:0f2d695: '[Недоступно] Отсутствуют экспонаты.'
line:028b07c: '"Я проклинаю тебя! Сегодня ты будешь находить только плохие экспонаты!"'
line:0d7d127: '{0}'
line:094a004: '"Почему ты такая щедрая? Твоя щедрость заставляет меня завидовать!"'
line:0d0c814: '"Ты отдаёшь мне этот проклятый экспонат |{0}|? Считай, что ты прощена."'
line:0d2e77f: '"Фух, хорошо. Но разве твои глаза не слишком зелёные?"'
line:03c49f5: '[Ничего не давать] Получить Несчастье: |{0}|.'
line:0dc3dde: Подозрительные звуки доносятся из бамбукового леса…
line:0f9fdb8: '{0}'
line:0340a4c: '{0} видит плавающий в воде экспонат. Выудить его?'
line:0557dad: '[Выудить] Получить случайный экспонат.'
line:0eea103: '"Подожди, |{0}| мне не пригодится. Давай я просто отдам его тебе."'
line:09c940c: '"Боже, ты такая раздражающая."'
line:0155b90: '"Это - моё! И тебе я ничего не отдам!"'
line:0003aa9: '"Подожди минутку - у меня есть ещё |{0}|. Не стесняйся взять с собой."'
line:0f52646: '"Что, ты хочешь |{0}|? Я в хорошем настроении, так что вот."'
line:00dc681: '"Что же... |{0}| меня не интересует. Можешь забрать."'
line:06c46e2: '"Атмосфера не та? А мне уже пора."'
line:0a0da16: '"Жаль, но это уже стало частью моей коллекции."'
line:0257156: '"Ну же~ Попробуй выудить что-нибудь самостоятельно?"'
line:0640b79: '"Ох, тебя интересует |{0}|? Ты можешь забрать это."'
line:0eab3e1: '"В конце концов, я сильнейшая. Только естественно - прощать меня."'
line:0ed1f87: '"Иногда приятно просто не думать ни о чём~"'
line:07cb2be: '"Ты опоздала. В конце концов, я уверена в своей скорости."'
