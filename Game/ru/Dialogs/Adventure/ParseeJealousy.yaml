  завидно!"'
line:0b15c0b: '"Кто нашёл, тот и взял."'
line:092a6ef: '"Такое бесстыдство заставляет меня завидовать... только дождись глубокой
  ночи!"'
line:0bbc877: '[Отдать] Потерять экспонат |{0}|.'
line:0eb1ea2: '[Недоступно] Отсутствуют экспонаты.'
