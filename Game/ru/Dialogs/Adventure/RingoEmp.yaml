line:09ee960: '"Что такое интеллектуальная собственность? Всё, что я знаю, так это
  то, что эти дроны раздражают."'
line:0deca08: "\"Очень признательна! Это новое оружие противодействия, разработанное\
  \ Лунной столицей, поможет тебе.\"\n(Теперь мне не нужно бегать по поручениям и\
  \ проводить испытания~)"
line:0e80e9a: '"О, привет, {0} - ты же встречала дронов капп, верно?"'
line:05575e9: '[Помочь] Получить карту-Предмет: |{0}|.'
line:00a9945: '"Это плагиат нашего патента из Лунной Столицы. Мы надеемся, что ты
  поможешь нам защитить нашу интеллектуальную собственность."'
line:0ddd7b7: '[Продолжить]'
line:0b93b5a: '[Отказаться] Получить три случайные карты Предметов и Несчастье: |{0}|.'
line:0a26145: '"Лунный кролик смеет мною командовать? Мне преподать тебе урок?"'
line:0b3160d: '"Нет, нет, нет, я и думать не смела! Знаешь, просто забудь обо мне
  - ты лишь встретила кролика, идущего купить парочку данго."'
line:080f7f2: 'Ринго достаёт странное устройство в форме палочки и размахивает им
  перед лицом {0:g}, роняя кучу вещей в попытке сбежать.'
line:06797b6: '"...Что? Лунный кролик, покупающий данго на Земле. Как это странно."'
line:0c1abfc: '"Вау! Кто же здесь оставил все эти приборы?.."'
line:095a793: '[Не моё дело] Ничего не произойдёт.'
line:0bfddbe: '"Это похоже на то, с чем могла бы справиться Эйки - иди и спроси её."'
line:065ee92: "\"Если яма сможет уладить дело с авторскими правами, то, возможно,\
  \ она сможет уладить и трудовые проблемы лунных кроликов.\""
line:082e36e: '"Уничтожать дроны легко и просто."'
line:0250688: '"Так эти штуки называются дронами... Тогда я без колебаний уничтожу
  их".'
line:00f11f7: '"Я - сильнейшая. Если не веришь, то могу и заморозить."'
line:06e4380: '"Выглядит подозрительно. Может, попросить сестру посмотреть?"'
line:0966360: '"Здесь нет мелкого шрифта... Давай я посмотрю позже?"'
line:0d19c44: '"Клиентов бы попроще. Прямое взаимодействие с покупателями - та ещё
  мука..."'
line:0659c8a: '"Дроны не замерзают... Ненавижу такое, уничтожить-уничтожить-уничтожить!"'
line:00f79ea: '"Ты случайно не заодно с теми телекоммуникационными мошенниками? Может,
  мне стоит арестовать тебя прямо сейчас?"'
line:01cf70f: '"Я не подписываю контракты, не прочитав внимательно весь этот мелкий
  шрифт. Мне пора, бывай."'
line:057628f: '"Уф, у меня от этой стены текста голова закружилась."'
line:010ac9a: '"Это слишком требовательно по отношению к фее, не правда ли?.."'
line:0ed06df: '"Я ничего не понимаю в интеллектуальной собственности, и не хочу в
  этом разбираться."'
line:0e52736: '"Бизнес с лунянами - сплошная морока. Тебе лучше не втягивать меня
  в подобное."'
line:014c651: '"Хороший аргумент, ты меня убедила..."'
