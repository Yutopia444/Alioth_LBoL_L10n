line:096d262: '"Фирменное вино, которое Ая пила в прошлый раз - налей мне такого же!"'
line:0c7c734: ({0} в конце концов допивает |Дыхание Кита|, но из-за него она забывает
  расплатиться и ещё что-то очень важное.)
line:0c77879: '"Что-то не так, Суйка? Всё это время ты смотрела на меня с надменным
  выражением лица."'
line:00d22c7: Окружающие ёкаи начинают аплодировать, некоторые даже делают ставки
  на то, кто выйдет победителем.
line:0bea743: '[Глоточек] Сразиться с группой случайных врагов и получить случайный
  Редкий экспонат.'
line:05203c5: '"Да, да, мне как обычно. Запишешь на мой счёт, хорошо?"'
line:0e46351: '"Какие сильные галлюцинации... Ты добавила что-то в вино?!"'
line:0bd13e0: '"Вот как нужно вести дела. Увидимся в следующий раз."'
line:0064f30: '"Узрите мой величайший навык, ''Одним залпом''!"'
line:0c29c84: "В порыве небывалого боевого духа, {0} выигрывает дуэль и получает приз.\n\
  Но стоило ли оно того?"
line:0c66585: '"{0}, проходи! Что бы ты хотела заказать на этот раз?"'
line:0c9cdfa: "{0} по ошибке входит в бар 'Гэйдонтэй' в нерабочее время. Сильный запах\
  \ алкоголя доносится отовсюду…"
line:0868bad: ('Гэйдонтэй'... Если я правильно помню, ночью он открывается для ёкаев.)
line:061da42: '[Глоток] Получить экспонат |{0}|. Удалить карту из колоды.'
line:0ea1dc5: '[Недоступно] Все подходящие экспонаты уже были получены.'
line:0da2517: '"Подожди, ты уверена что справишься, {0}?"'
line:05ad143: '"А-а... так много? Однако все смотрят на меня - пути назад нет!"'
line:0269654: Я что-то забыла?.. Удалите выбранную карту.
line:018cd9a: '[Соревнование по выпивке] Получить {0} <sprite="Point" name="Gold">
  и два Несчастья |{1}|.'
line:0b95170: '"В чём дело, {0}? Мисс ''одна-кружка-и-в-стельку'' хочет бросить мне
  вызов?"'
line:0bdfac4: '"Пытаешься вырастить кита в кружке? Этого недостаточно!"'
line:0862f2d: '"Эй, ты разве не должна мне ещё за прошлый месяц?"'
line:015f1aa: '"Ух, почему я так хочу спать всего лишь после одного... бокала..."'
line:024e390: (Во сне {0} ощущает подозрительное присутствие!)
line:0b0300d: '"Ах! Пожалуйста, давай сохраним это в секрете."'
line:0b3a02b: '[Принять] Получить экспонат |{0}|.'
line:0d8166c: '[Отказаться] Ничего не произойдёт.'
line:01b5a50: '"Хватит, тебе больше не удастся одурачить меня."'
line:07f78ec: '"Ох, я ощущаю на себе взгляд с момента захода сюда. Что происходит?"'
line:0682132: '"Не недооценивайте питейные способности жрицы - в этом я тоже профи."'
line:0a9ad13: '"Не говори глупостей!.. И принеси мне самое крепкое, что есть!"'
line:0ad4f5f: '"Мне плевать, какое там содержание алкоголя!"'
line:025d5c2: '"Не недооценивай меня! Я могу созвать на вашу попойку всех других фей!"'
line:00dd0ad: '"Я заплачу в следующий раз. Пожалуйста, жди меня~"'
line:06ae762: '"Можешь записать это на счёт привратницы?"'
line:0187bf6: '"Деньги?! У меня их нет!"'
line:0ceddc8: '"Что же, пока-пока~"'
line:0516764: '"Какая странная иллюзия... Разве после сакэ всегда так?"'
line:0fcf6e4: '"Уф... Отвратительно... Мне кажется, кто-то добавил что-то в сакэ!"'
line:09556a4: '"Это важно. Я буду почаще посещать тебя."'
line:0457b1b: '"Отлично! Понадеюсь на тебя и в следующий раз."'
line:0365d92: '"Как же щедро! Я обязательно посещу тебя и в другой раз!"'
line:0b5dc3f: '"Я потом ещё заскочу~"'
line:09e6032: '"Я возвращаюсь к себе сейчас же!"'
line:0c520a6: '"Я больше сюда не зайду, понимаешь~"'
line:09bf9df: '"Суйка, что происходит? С самого начала ты смотрела на меня свысока."'
line:079518c: '"Эй, пьяная они, в твоей голове сейчас нет ничего, кроме алкоголя."'
line:09fc586: '"Эй! Просто потому что ты знаешь, что я сильнейшая, не стоит пытаться
  провоцировать меня!"'
line:08fdecb: '"Мисс они, это вы следили за мной всё это время?"'
line:05e7e3f: '"О-о-ох... Мир кружится~ Мне становится всё веселее!"'
line:0bc049a: '"Что же, пожалуй, мне как обычно."'
line:0d1602b: '"Я вижу галлюцинации... Насколько крепкое сакэ ты мне дала?!"'
line:0ce111a: '"Галлюцинации были сильными... Ты ведь ничего в сакэ не добавляла,
  верно?"'
line:00d591a: '"Хм-м... Это сакэ... Кажется, в нём был загадочный ингредиент..."'
line:0c15665: '"Ты даёшь это мне?! Какая же ты добрая!"'
line:05290b5: '"Эй, дай мне передохнуть. Денёк сегодня и так не задался."'
