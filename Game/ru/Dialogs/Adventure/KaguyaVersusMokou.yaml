  консоль?"'' true=''"Вот ты говоришь так, но почему ты пришла ко мне и спросила о
  том, интересны ли картинки на упаковках свежих дисков?"''}'
line:0bc6368: (Я не понимаю из-за чего они дерутся, но если позволить им продолжать
