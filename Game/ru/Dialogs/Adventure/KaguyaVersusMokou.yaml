line:0219773: '"{0} - прими это, пожалуйста, в качестве моей благодарности! Я рассчитываю
  на тебя в разрешении этого инцидента."'
line:0500ae3: '{Censor:select false=''"Пожалуйста, остановитесь, вы обе! Я читала,
