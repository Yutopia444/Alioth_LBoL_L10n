line:06ad387: '"Хм, ясно..."'
line:0b23fed: "\"Какое совпадение, {0}. Я могу помочь тебе настроить совместимость\
  \ с этими самоцветами.\"\n(Более, чем подходящий подопытный.)"
line:0fb491d: '{0} действительно чувствует, что она может легко направлять мощный
  поток маны.'
line:01c44c8: '"Не надо, у меня будет достаточно времени, чтобы настроить её, когда
  я вернусь домой."'
line:03b4cbd: Похоже, Пачули изучает какие-то магические самоцветы.
line:07acb35: Выберите одноцветную базовую ману и превратите её в мерцающую ману
line:01cdad3: '[Принять] {0}.'
line:013e396: '"Итак, какой самоцвет маны ты хочешь использовать как материал?"'
line:0e78dc7: '"Большое спасибо. Хочешь, я куплю тебе чай на обратном пути?"'
line:0725f8e: "\"Эрл Грей бы мне сегодня не помешал - заранее спасибо.\""
line:04eeb1a: '[Отказаться] Ничего не произойдёт.'
line:04b1f03: '"Не надо, я в прекрасном состоянии."'
line:044f4bc: '"Подумать только, а я ведь ради этого даже вышла на улицу..."'
line:071a8e9: '"Спасибо тебе, Пачули. Я даже не ожидала, что ты будешь так добра ко
  мне~"'
line:0cbf9f4: '"О чём это ты?.."'
line:0bc2af5: '"Меня похвалила идиотка..."'
line:0cfade6: '"Я больше не хочу охлаждать для кого-либо напитки!"'
line:092f7e3: '"Не думаю, что смогу объяснить ей это, так что просто промолчу..."'
line:035363d: '"В алом особняке есть жизнь? Неплохо."'
line:066cc93: '"Всегда готовлюсь к тому, что ты воспользуешься возможностью вернуть
  то, что я тебе должна."'
line:0f3e81b: '"Что же, тебе лучше вернуть то, что ты мне должна."'
line:0465dee: '"Ещё не время для охлаждающих напитков, не правда ли..."'
line:0874548: '"Я не очень понимаю, почему ты вспоминаешь про это в такой ситуации."'
line:04fba63: '"Забудь. Если захочешь провести новые исследования, найди меня в другой
  раз."'
line:07939f8: '"Просто потому, что это редкий шанс заработать больше денег, стоило
  ли улетать настолько быстро..."'
