line:008fa52: '"Ну же, давай поддержим Кагую-чан!"'
line:00d22b0: '[Уйти] Ничего не произойдёт.'
line:0fc2c16: "\"{Censor:select false=\\\"Э-э-э, 'Кагуя-чан'? Какая же мерзость.\\\
  \" true=\\\"Ух, твой внешний вид и так был странен — давай забудем про это.\\\"\
  }\""
line:0670be2: '"Носи её почаще! Все должны видеть!"'
line:063a72b: '"Я провела расследование и выяснила, что Кагуя-чан особенная. Она очень
  гостеприимна и сильно отличается от других лунян."'
line:0ba9037: '"Бесплатно? Тогда давай"'
line:0678716: '[Взять одежду] Получить экспонат: |Айдол футболка|.'
line:01566ec: '[Взять размер побольше] Получить экспонат: |Айдол футболка (XL)|.'
line:059fbd3: '"Бесплатно? Тогда давай. И размер побольше."'
line:0ba87b6: '"Носи её почаще! Все должны видеть!"'
line:0bd1ffa: '"Лёд растает быстрее, если я буду носить чёрное..."'
line:00a6aad: '"Воу~ Как же~ это~ не мило!"'
line:062b5d5: '"Бесплатно? То есть, я могу одолжить это и не возвращать, верно?"'
line:022c403: '"Бесплатно, говоришь? Что же, в этот раз сувенир для Госпожи будет
  уникальным."'
line:00d286e: '"Бесплатно, значит? Что же, попробую одеть в это сестрёнку."'
line:0a28c4c: '"Прекрасная возможность - давай мне большую!"'
line:0e45c03: '"Конечно же, я возьму большую!"'
line:0f24388: '"Вещи, созданные для самых сильных, должны быть бесплатными."'
line:0c1968a: '"Я куплю это в качестве сувенира для Мэйлин. Тогда дайте мне, пожалуйста,
  большую."'
line:0a99c1c: '"Хорошо, я возьму большую! Выглядит замечательно!"'
line:055f5d6: '"Даже для тряпки выглядит довольно паршиво."'
