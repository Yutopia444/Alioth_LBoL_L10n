line:0d373d9: '"Сочные шашлычки! Подходите, покупайте~"'
line:0b7dfd2: '"Ну же, {0}. Возьми шашлычок, а то проголодаешься и не сможешь истреблять
  ёкаев!"'
line:026a5bc: '[Шашлычок с миногой] Восполнить {0} здоровья.'
line:03e0868: '[Заплатить] Потерять {0} <sprite="Point" name="Gold">.'
line:0eff719: '[Недоступно] Недостаточно <sprite="Point" name="Gold">.'
line:08ebd93: '"Почему бы и нет. Жареную миногу, пожалуйста."'
line:06bc591: '"Принято! Жареная минога обойдётся вам в {0} <sprite="Point" name="Gold">"'
line:05eb4e6: '{0}'
line:01150b0: '"Приходите снова~"'
line:0284c65: '[Поесть и смыться] Не платить за еду.'
line:01cb698: '"Ой, кажется, я забыла свой кошелёк дома. Просто запиши это на мой
  счёт!"'
line:065edde: '"Н-не убегай!!!"'
line:06598ae: '[Шашлычок с грибами] Получить {0} <sprite="Point" name="Power">.'
line:0554174: '[Заплатить] Потерять {0} <sprite="Point" name="Gold">.'
line:03e1937: '[Недоступно] Не хватает <sprite="Point" name="Gold">.'
line:0544220: '"Тот, что с жареными грибами, выглядит аппетитно. Мне один шампур."'
line:0f8955e: '"Принято! Шашлычок с жареными грибами будет стоить {0} <sprite="Point"
  name="Gold">."'
line:0602331: '{0}'
line:0a8caeb: '"Приходите снова~"'
line:0086f01: '[Поесть и смыться] Не платить за еду.'
line:05fa0d3: '"Твои грибы кислые. В следующий раз выбирай ингредиенты лучше."'
line:0bf0f77: '"Может, у меня и маленькая скромная закусочная, но я работаю честно!.."'
line:0c3600a: '[Сказать ''нет'' ночным закускам] Ничего не произойдёт.'
line:0c34697: '"Я слышала, что еда и интенсивные упражнения ночью вредны для здоровья."'
line:0b5dafc: '"Н-но ведь иногда же можно себе позволить маленький перекус!.."'
line:0159576: '"От одной мысли о миноге на гриле у меня слюнки текут."'
line:002e6b4: '"Жареную миногу мне, быстро!"'
line:0024284: '"Жареная минога - не то, что я ем каждый день."'
line:01d3662: '"Я не халявлю, ясно? Я просто сжигаю калории, оставшиеся после ужина."'
line:001e989: '"Наша привратница здесь бывает, не так ли? Я попрошу её заплатить за
  меня в следующий раз."'
line:0cbb734: '"Ням! Спасибо за еду!~"'
line:05b6084: '"Было вкусно! Пока!"'
line:0adc673: '"Эти грибы, что, испортились?"'
line:0bab6c3: '"Выглядят заплесневевшими!"'
line:0b2075c: '"Это правда свежие грибы? Да любой гриб в Магическом лесу будет лучше
  этого!"'
line:02fe6e4: '"Пахнет как-то странно. Что-то с грибами?"'
