line:0c7c734: ({0} finalmente termina el |Aliento de ballena|, pero debido a la alcohol
  se olvida de la cuenta y de algo importante.)
line:00d22c7: Los youkais que las rodean comienzan a animarlas. Algunos incluso hacen
  apuestas sobre quién saldrá victoriosa.
line:0c29c84: "Rebosante de determinación, {0} sale victoriosa y se lleva el gran\
  \ premio.\n¿Aunque valió la pena?"
line:024e390: (¡Durante su sueño, {0} siente una presencia sospechosa!)
line:0bd13e0: '"Así es como se hacen negocios. ¡Hasta la próxima!"'
line:0c9cdfa: '{0} entra por error a altas horas de la noche en el |Sanshoku Geidontei|.
  Un fuerte olor a alcohol impregna el lugar…'
line:0c66585: '"¡Señorita {0}! ¡Pase! ¿Qué le gustaría hoy?"'
line:0868bad: (Geidontei... Si mal no recuerdo, se abre a los youkais durante la noche).
line:061da42: '[Un trago] Gana la exhibición: |{0}|. Remueve una carta de la biblioteca.'
line:096d262: '"¡Dame un poco de ese sake especial que Aya bebió la última vez!"'
line:0da2517: '"Espera ¿ESE sake? ¿Estás segura de que puedes con eso, señorita {0}?"'
line:05ad143: '"Agh... ¡¿es así de grande?! ¡Pero todos me están mirando, ahora no
  puedo dar marcha atrás!"'
line:0269654: ¿Olvidé algo...? Elige una carta para remover.
line:018cd9a: '[Concurso de bebidas] Gana {0} <sprite="Point" name="Gold"> y gana
  dos Desgracias: |{1}|.'
line:0c77879: '"¿Qué pasa, Suika? Me has estado dando esa mirada de engreída desde
  que entré."'
line:0b95170: '"¿Qué dices, {0}? ¿La señorita me des-ma-yo con un vaso me está desafiando?"'
line:0bdfac4: '"¿Estás tratando de criar una ballena como mascota? ¡Eso no es suficiente!"'
line:0064f30: '"¡Aquí está mi último ataque, Beberlo de un solo golpe!"'
line:0bea743: '[Un sorbo] Lucha contra un grupo aleatorio de enemigos y obtén una
  exhibición rara aleatoria.'
line:05203c5: '"Sí sí, tendré lo de siempre. Pónmelo en mi cuenta, ¿de acuerdo?"'
line:0862f2d: '"Oye, ¿no me debes ya la factura del mes pasado?"'
line:015f1aa: '"Ugh, por que tengo tanto sueño después de solo tomar un... vaso..."'
line:0e46351: '"Qué ilusiones tan poderosas... ¿le agregaste algo al sake?"'
line:0b0300d: '"¡Wah! ¡Por favor, toma esto y mantenla en secreto!"'
line:0b3a02b: '[Aceptar] Gana la exhibición |{0}|.'
line:0d8166c: '[Rechazar] No sucede nada.'
line:01b5a50: '"No gracias, ya no voy a caer en tus trucos."'
line:0ea1dc5: '[Invalido] Todas las exhibiciones elegibles han sido adquiridas.'
line:06ae762: '"¿Puedes poner esto a la cuenta de nuestra portera?"'
line:0ceddc8: '"¡Bueno, entonces, hasta luego~!"'
line:09bf9df: Suika, ¿Qué te pasa? Llevas todo el rato mirándome con desdén desde
  que empezamos.
line:079518c: '"Oye, oni borracha, tienes la cabeza llena de puro alcohol."'
line:07f78ec: '"Vaya, he sentido miradas sobre mí desde que entré. ¿Qué está pasando?"'
line:09fc586: '"¡Oye! Solo porque pienses que soy la más fuerte no puedes ir por ahí
  provocándome."'
line:08fdecb: '"Señorita oni, ¿me has estado mirando fijamente todo este tiempo?"'
line:0682132: '"No subestimes la capacidad de una miko para beber, soy toda una profesional."'
line:0a9ad13: '"¡No digas tonterías...! ¡Tráiganme lo más fuerte que tengan!"'
line:025d5c2: '"¡No me subestimes! ¡Incluso puedo traer a todas las hadas para que
  beban contigo!"'
line:05e7e3f: '"¡Oooooh~ El mundo está girando~~ ¡Esto empieza a ponerse divertido!"'
line:0ad4f5f: '"¡No me importa que tipo de contenido de alcohol tenga ni nada por
  el estilo!"'
line:0bc049a: '"Oh, supongo que lo dejo a cuenta como siempre."'
line:00dd0ad: '"Lo pagaré la próxima vez que venga. Mientras tanto, dame un poco de
  tiempo~"'
line:0187bf6: '"¡¿Dinero?! ¡Yo no tengo nada de eso!"'
line:00d591a: '"Mmm... Ese sake de antes... me dio la sensación de que le habían añadido
  algo raro..."'
line:09556a4: '"Tienes bastante cosa entre manos... Pasaré por aquí más a menudo."'
line:0457b1b: '"¡Genial! ¡Contare contigo la próxima vez también!"'
line:0c15665: '"¿¡Eh!? ¿¡De verdad me lo das!? ¡Eres una persona muy amable!"'
line:0b5dc3f: '"Volveré la próxima vez~"'
line:05290b5: '"Oye, oye, baja el ritmo—yo ya doy por terminado el día."'
line:0516764: '"Estas alucinaciones son bastante intensas... ¿es habitual que el sake
  común tenga este efecto?"'
line:09e6032: '"¡Me voy de vuelta por donde vine!"'
line:0c520a6: '"No voy a volver, ¿sabes~?"'
line:0365d92: '"¡Qué generoso! Sin duda volveré a pasar por aquí."'
line:0fcf6e4: '"Ugh... me siento horrible... ¡Seguro que alguien le agrego algo sospechoso
  a este sake!"'
line:0d1602b: '"Creo que estoy alucinando... ¡¿qué tan fuerte era ese sake que me
  diste?!"'
line:0ce111a: '"Eso sí que son alucinaciones de verdad... ¿No le habrás metido nada
  raro al sake, verdad?"'
