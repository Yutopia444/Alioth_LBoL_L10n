line:008fa52: '"¡Vamos, apoyemos juntas a Kaguya-chan!"'
line:0678716: '[Recibir ropa] Gana la exhibición: |Camiseta de ídolo|.'
line:0670be2: '"¡Recuerda usarlo para que todos lo vean!"'
line:00d22b0: '[Irse] No sucede nada.'
line:0fc2c16: '"{Censor:select false=\"Ugh, en serio no te da vergüenza llamarla ''Kaguya-chan''.\"
  true=\"Ugh, ya eres suficientemente rara con tu ropa... olvídalo.\"}"'
line:063a72b: '"Según lo que investigué, me di cuenta de que Kaguya-chan es amable
  y simpática, no como las demás lunarianas."'
line:0ba9037: '"¿Gratis? Me llevo uno entonces."'
line:0ba87b6: '"¡Recuerda usarlo para que todos lo vean!"'
line:01566ec: '[Comerciar ropa] Gana la exhibición: |Camiseta de ídolo (Talla L)|.'
line:059fbd3: '"¿Gratis? Me llevo uno entonces y que sea grande."'
line:0a28c4c: '"¡Que gran oportunidad, dame la grande!"'
line:0e45c03: '"¡Por supuesto que me llevo el más grande!"'
line:0a99c1c: '"¡Entonces me llevo el grande! ¡Se ve genial!"'
line:062b5d5: '"¿Gratis? Significa que puedo tomarlo prestado sin tener que devolverlo,
  ¿verdad?"'
line:022c403: '"¿Gratis, dices? El regalo que le traeré a mi señora esta vez es bastante...
  singular."'
line:0bd1ffa: '"El hielo se va a derretir si me visto de color negro…"'
line:00a6aad: '"¡Wow~ Esto~ no es para nada~ lindo!"'
line:0f24388: '"Las cosas destinadas para la más fuerte deberían ser gratis."'
line:00d286e: '"¿Es gratis? Entonces voy a ponerle esto a mi hermana esta noche."'
line:0c1968a: '"Me llevaré esto como un regalo para Meiling. Por ahora, dame la de
  talla grande."'
line:055f5d6: '"No parece que pueda servir ni siquiera como un trapo."'
