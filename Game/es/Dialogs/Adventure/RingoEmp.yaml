line:0a26145: '"¿Para qué me da órdenes una coneja lunar? ¿Tengo que darte una lección?"'
line:080f7f2: Ringo saca un extraño instrumento con forma de palo y lo agita frente
  a {0}, huyendo y dejando caer un montón de cosas.
line:0e80e9a: '"¡Oh, hola {0}! Has encontrado los drones de los kappas, ¿no es así?"'
line:00a9945: '"Esas son imitaciones de nuestra patente de la capital lunar, espero
  que nos ayudes a defender nuestra propiedad intelectual."'
line:05575e9: '[Ayudar] Obtener carta: |{0}|.'
line:09ee960: '"¿Qué es una propiedad intelectual? Todo lo que sé es que esos drones
  son molestos."'
line:0deca08: "\"¡Qué amable! Esta nueva arma de contramedida desarrollada por la\
  \ capital lunar será de ayuda.\"\n(¡Genial, ahora no necesito hacer recados y pruebas!)"
line:0ddd7b7: '[Continuar]'
line:0b93b5a: '[Rechazar] Consigue tres cartas herramientas aleatorias y gana la desgracia:
  |{0}|.'
line:0b3160d: '"¡No-no- no, no me atrevería! Olvídate de mí, acabas de encontrarte
  con una coneja que pasaba a comprar dango."'
line:06797b6: '"¿Eh...? ¿Un conejo lunar comprando dango en la tierra? Que extraño."'
line:0c1abfc: '"¡Wow! ¿Quién dejó todos estos aparatos aquí...?"'
line:095a793: '[No es asunto mío] No sucede nada.'
line:0bfddbe: '"Esto suena algo como que Eiki podría manejar, ve a preguntarle."'
line:065ee92: '"Si un yama puede manejar una disputa de derechos de autor, quizás
  también pueda encargarse de nuestras disputas laborales en la luna."'
line:082e36e: '"Exterminar drones será una tarea sencilla."'
line:00f79ea: '"No estarás implicado con esos estafadores de telecomunicaciones, ¿verdad?
  ¿Debería eliminarte ahora mismo?"'
line:057628f: '"Ugh, este montón de texto me está mareando."'
line:010ac9a: '"Creo que esto era pedirle demasiado a una hada..."'
line:0e52736: '"Los negocios de los lunarianos solo traen problemas. Mejor no me metas
  en esto."'
line:0ed06df: '"Realmente no entiendo lo de la propiedad intelectual y esas cosas...
  y no me interesa entenderlas."'
line:014c651: '"Tienes toda la razón, me has convencido..."'
line:0659c8a: '"¡Los drones no se congelan, los odio, los voy a destruir a todos!"'
line:0250688: '"Así que eso se llama dron~ entonces no dudaré en destruirlo."'
line:00f11f7: '"Soy la más fuerte. Y si no me crees te congelaré ahora mismo."'
line:06e4380: '"Sospechoso~ ¿quizá debería pedirle a mi hermana que lo revise?"'
line:01cf70f: '"No voy a firmar ningún contrato sin leer atentamente la letra pequeña.
  Hasta luego."'
line:0966360: '"Pero aquí no hay ninguna letra pequeña... Tendré revisarlo de nuevo."'
line:0d19c44: '"Ojalá vinieran algunos clientes fáciles... ser vendedora de primera
  línea es agotador...."'
