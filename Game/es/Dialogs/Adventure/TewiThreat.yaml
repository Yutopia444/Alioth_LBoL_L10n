line:05ef949: '{0} ve una bolsa grande de dinero al costado de la carretera.'
line:051369f: '[Tomarlo] Gana {0} <sprite="Point" name="Gold">.'
line:0d9547c: '{0} recoge el dinero y lo cuenta.'
line:0373789: '"Wow, qué suerte tienes hoy, señorita {0}"'
line:0f3adf4: "\"Si quieres que tu suerte se quede, te costará un poco.\"\n*Frotándose\
  \ los dedos*"
line:05a79f6: '[Dar todo] Pierde {0} <sprite="Point" name="Gold">, consigue |Pata
  de conejo de la suerte|.'
line:0ef480f: '"Suena bastante razonable."'
line:0592bad: '"¡Oooh! No esperaba que fueras tan amable. ¡Te deseo todo lo mejor
