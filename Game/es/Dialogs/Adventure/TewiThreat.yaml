line:0c8a7ad: '[Continuar]'
line:083edbe: '[Dar algo] Pierde {0} <sprite="Point" name="Gold">.'
line:0e5f78f: '"Bastante justo, vamos a compartirlo."'
line:0e34837: '"De todos modos, no me pertenecía."'
line:0522823: '[Rechazar] Gana la Desgracia: |{0}|.'
line:0d42531: '"¿En serio estás tratando de chantajearme? Si lo quieres, ven y tómalo
