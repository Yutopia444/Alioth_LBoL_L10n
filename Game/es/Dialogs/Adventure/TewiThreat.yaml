line:088af67: '[Continuar]'
line:050bd26: '[Ignorar] No sucede nada.'
line:031751c: '{0} piensa que eso es sospechoso y decide ser cautelosa.'
line:0cbfa12: '"¿Me estás amenazando?"'
line:057e043: '"¿Eso es una amenaza? Se lo voy a contar a mi hermana."'
line:052379f: '"¿¡Te atreves a amenazarme a mí, a la más fuerte!? ¡Tienes mucho valor!"'
