line:03b4cbd: Parece que Patchouli está estudiando estas gemas mágicas.
line:06ad387: '"Hmm, ya veo..."'
line:0b23fed: "\"Qué coincidencia, {0}. Puedo ayudarte a sintonizar tu afinidad con\
  \ estas gemas.\n(Un sujeto de prueba más que suficiente.)"
line:07acb35: Elige un maná base de color y conviértelo en un maná filosofal.
line:01cdad3: '[Aceptar] {0}.'
line:013e396: '"Entonces, ¿Cuál es la gema de maná que te gustaría usarlo?"'
line:0fb491d: '{0} siente que puede canalizar una poderosa corriente de maná fácilmente.'
line:0e78dc7: '"Muchas gracias. ¿Quieres que te compre un poco de té de camino a casa?"'
line:0725f8e: '"Un poco de earl grey sería perfecto, por favor y gracias."'
line:04eeb1a: '[Rechazar] No sucede nada.'
line:01c44c8: '"Está bien, puedo sintonizarlo tanto como quiera cuando llegue a casa."'
line:044f4bc: '"Y pensar que vine hasta aquí..."'
line:04b1f03: '"No es necesario, estoy en perfectas condiciones."'
line:071a8e9: '"Gracias, Patchouli. ¡No sabía que podías ser tan amable!"'
line:0cbf9f4: '"¿De qué estás hablando?"'
line:0874548: '"No entiendo por qué sacas este tema de repente."'
line:0bc2af5: '"Me felicitó una idiota..."'
line:035363d: '"¿Eres la que vive en la mansión roja? Esto no está nada mal."'
line:0f3e81b: '"Bueno, entonces más te vale devolverme lo que tenia…"'
line:0cfade6: '"¡No quiero que me arrastren para ir a congelar bebidas!"'
line:0465dee: '"Todavía no es la epoca para las bebidas frías..."'
line:04fba63: '"Olvídalo. Ven a verme más tarde si quieres hacer alguna investigación."'
line:066cc93: '"Tengo la sensación de que te aprovecharás esta oportunidad para cobrar
  lo que te debo."'
line:092f7e3: '"No creo que pueda explicárselo bien, así que lo dejaré pasar..."'
line:07939f8: '"¿Será porque es una oportunidad rara de que ella gane algo de dinero?
  Se marcho con bastante prisa..."'
