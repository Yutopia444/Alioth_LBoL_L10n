line:05fe9e1: '"Ahí estás, la asistente de la maestra Eirin. Permíteme echarte una
  mano."'
line:0220408: '[Recitar oración] Pierde {0} de vida máxima, gana dos |{1}|.'
line:08e2a8a: '"Tomé prestada de Yorihime las campanas kagura de |Idunome|, deja que
  te libre de tus impurezas."'
line:050b98e: Con la bendición de la campana kagura, {0} siente que se disipa una
  pequeña cantidad de impurezas…
line:022c54a: '"¡Gracias!"'
line:015cd2b: '[Consumir melocotón] Aumenta la vida máxima en {0}, gana la desgracia:
  |{1}|.'
line:07b8cb5: '"Si no te importa, puedes comer este melocotón que traje. Está bien
  dulce."'
line:005d895: A pesar de oler a aditivos industriales sospechosos, los melocotones
  modificados genéticamente de la capital lunar siguen siendo muy deliciosos.
line:09c8a85: '"¡Sabe muy rico!"'
line:0c671d8: '[Rechazar] No sucede nada.'
line:0b9590a: '"¡Podría resolver un pequeño incidente como este con los ojos cerrados!"'
line:0c46a1e: '"No te preocupes. De todas formas, solo vine a ver cómo está la maestra
  Eirin."'
line:00ebbaa: '"¡Gracias!"'
line:0c4ae27: '"¡Gracias!"'
line:0eb127d: '"¡Gracias!"'
line:0052cc6: '"¡Gracias!"'
line:0b908c2: '"¡Gracias!"'
line:07574a3: '"Esto está delicioso. ¿Por qué no me serviste esto cuando estaba en
  la luna?"'
line:0aeaa2e: '"¡Esto está exquisito! Tendré que llevarle un poco a mi señora."'
line:0e687b1: '"¡¿Wow?! ¡Está delicioso! ¡¿Tienes más?!"'
line:07974a1: '"No hace falta. Si te vas a meterte, ¿para qué sirve una experta en
  resolver incidentes como yo?"'
line:0912025: '"No gracias. Las ofertas demasiado perfectas suelen venir con una condición."'
line:087180e: '"¡Ya soy la más fuerte incluso sin eso! ¡No la necesito!"'
line:0ebbfcf: '"Me parece un poco sospechoso~ mejor paso."'
line:0b3c5dd: '"Tan dulce y delicioso~ me siento mucho mas animada."'
line:0cc6dc5: '"¡Esto estaba buenísimo! Ojalá hubiera podido comer esto cuando fui
  a la luna la última vez."'
