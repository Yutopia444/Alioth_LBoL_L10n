line:0d2e77f: '"Uf, está bien. ¿Pero tus ojos no son verdes?"'
line:0340a4c: '{0} ve una Exhibición flotando en el agua. ¿Quieres pescarlo?'
line:0557dad: '[Tomarlo] Gana una exhibición aleatoria.'
line:0dc3dde: Un sonido sospechoso llega desde el bosque de bambú…
line:0c4a8da: '[Ignorar] No sucede nada.'
line:0b63278: '"¿Por qué siento que estoy siendo observada...?"'
line:0eb1ea2: '[Invalido] Exhibiciones insuficientes'
line:0bbc877: '[Darle aquella exhibición] Pierde la exhibición: |{0}|.'
line:0724a11: '[Darle esa exhibición] Pierde la exhibición: |{0}|.'
line:0f2d695: '[Invalido] Exhibiciones insuficientes'
line:00e3d78: '"¿Por qué todos encuentran las exhibiciones tan fácilmente? Eso realmente
  me pone celosa."'
line:028b07c: '"¡Te lanzaré una maldición! ¡Esta noche solo encontrarás solo malas
  exhibiciones!"'
line:0f9fdb8: '{0}'
line:0eea103: '"Espera, ya no necesito: |{0}|, puedes quedártelo."'
line:094a004: “¡¿Cómo puedes ser tan caritativa?! ¡Tu generosidad me pone realmente
  celosa!"
line:0d7d127: '{0}'
line:0d0c814: '"¿Me darías eso que esta maldecido? ¡Perfecto, considérate perdonada!"'
line:03c49f5: '[No Dar Nada] Gana la Desgracia: |{0}|.'
line:0b15c0b: '"La que la encuentra, se lo queda."'
line:092a6ef: '"¡Tal descaro me pone realmente celosa... solo espera hasta las altas
  horas de la medianoche!"'
line:0003aa9: '"Por favor, espere un momento, dispongo de uno adicional. Si lo necesita,
  puedes tomarlo.'
line:0640b79: '"¿Eh? ¿|{0}|? ¿Lo necesitas? Tómalo, es tuyo."'
line:0f52646: '"¿Que? ¿Quieres |{0}|? Como estoy de buen humor, te lo voy a dar."'
line:00dc681: '"Mmm… en realidad no lo quería. Tómalo, es tuyo~"'
line:06c46e2: '"¿El ambiente está raro? Mejor me voy."'
line:09c940c: '"Vaya, qué irritable estas."'
line:0ed1f87: '"A veces es agradable no pensar en nada de vez en cuando~"'
line:0a0da16: '"Qué lástima, ya forma parte de mi colección."'
line:07cb2be: '"Fuiste demasiado lenta. Después de todo, confío en mi velocidad."'
line:0155b90: '"¡Esto es mío! ¡No pienso dártelo!"'
line:0257156: '"Naaah~ ¿por qué no intentas pescar uno tú misma?"'
line:0eab3e1: '"Después de todo, soy la mas fuerte. Es normal que me perdonen."'
