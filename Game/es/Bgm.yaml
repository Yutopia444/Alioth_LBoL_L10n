MainMenu:
  Name: Menú Principal
  TrackName: La decimonovena forma de fantasía
  Original: Gensokyo Millennium ~ History of the Moon
  Comment: "Una pieza de música electrónica experimental inspirada en \"Gensokyo Millennium\"\
    . La composición enfatiza el contraste entre la introducción y el estribillo,\
    \ reflejando la naturaleza de este juego: es alegre y lleno de acción a la vez.\n\
    Con respecto a la descripción de \"La decimonovena forma\": Esta es nuestra decimonovena\
    \ pieza basada en \"Gensokyo Millennium\" y aún estamos explorando las múltiples\
    \ posibilidades de esta composición."
Stage1:
  Name: 'Acto 1: Bosque de Bambú de los Perdidos'
  TrackName: Persiguiendo la noche
  Original: Retribution for the Eternal Night ~ Imperishable Night
  Comment: "El tema del bosque de bambú de los perdidos, la música del primer nivel.\n\
    Esta obra está llena de emoción por la batalla y rápidamente prepara al jugador\
    \ para los combates que se avecinan.\nAdemás, incorpora sonidos que evocan el\
    \ canto de las aves para reforzar la atmósfera nocturna de la pieza."
Stage2:
  Name: 'Acto 2: Barranco Genbu'
  Original: Fall of Fall ~ Autumnal Waterfall
  TrackName: Discovery & Discoverer
  Comment: "El tema del barranco Genbu, el música del segunda nivel.\nEsta obra transmite\
    \ una intensa sensación de misterio y aventura desconocida. Se caracteriza por\
    \ el uso extensivo de percusión étnica, lo que permite al intérprete sentir que\
    \ se encuentra en un lugar desconocido."
Gap:
  Original: Necrofantasía
  Name: Dentro de la Brecha
  TrackName: Melodía del anochecer
  Comment: "Esta es una canción de estilo europeo.\nCon el elegante clavicémbalo y\
    \ la serenidad glockenspiel, uno se siente muy relajado y, sobre todo, con ganas\
    \ de tomarse un descanso."
Adventure2:
  Name: Evento 2
  TrackName: Jugando en el bosque
  Original: The Gensokyo the Gods Loved
  Comment: "Esta es una canción que transmite una sensación ligera y optimista.\n\
    La introducción utiliza el piano para crear una sensación de tranquilidad en el\
    \ bosque mientras el violín, llevando la melodía principal, evoca una escena de\
    \ juego despreocupado entre los árboles."
Adventure3:
  Name: Evento 3
  TrackName: Dejado atrás
  Original: Girls' Secret Sealing Club
  Comment: "Esta es una canción escrita cuando el compositor estuvo emotivo.\n¿Quizás\
    \ el emoticono \"ORZ\" captura mejor ese estado de ánimo?"
Elite2:
  Name: Elite 2
  Original: Bell of Avīci ~ Infinite Nightmare
  TrackName: Punto muerto
  Comment: "Esta es la canción que suena cuando aparece un élite.\nEl ritmo intenso\
    \ captura la tensión y la emoción de la batalla ¡si el jugador no lo da todo,\
    \ será derrotado en un abrir y cerrar de ojos!"
Rin:
  Name: Rin Kaenbyou
  TrackName: Canalizadora de espíritus
  Original: Corpse Voyage ~ Be of good cheer!
  Comment: "Este es el tema de batalla específico del personaje Rin Kaenbyou.\nYoukai\
    \ indeseables acechan en las sombras, esperando su oportunidad, así que si vas\
    \ a ser su objetivo, más vale que tengas cuidado. Cuando los espíritus vengativos\
    \ del inframundo se acercan, no tendrás más remedio que enfrentarlos cara a cara.\
    \ Sin embargo, ¿es la reputación del accidente de tráfico del infierno solo un\
    \ título vacío?"
Nitori:
  Name: Nitori Kawashiro
  TrackName: in the blue
  Original: Akutagawa Ryuunosuke's "Kappa" ~ Candid Friend
  Comment: "Este es el tema de batalla específico del personaje Nitori Kawashiro.\n\
    Puede que te libres la primera vez, la segunda, pero a la tercera todo se acaba.\
    \ La próxima vez que te la encuentres, ¡cuidado! Empieza con solo hacer burbujas,\
    \ pero antes de que te des cuenta, ¡te pondrá tu mundo al revés!"
Youmu:
  Name: Youmu Konpaku
  Original: Eastern Ghostly Dream ~ Ancient Temple/Hiroari Shoots a Strange Bird ~
    Till When?
  TrackName: El momento en que se blande la espada
  Comment: "Este es el tema de batalla específico del personaje Youmu Konpaku.\nCada\
    \ nota es una hoja afilada que atraviesa el cielo, la tierra y todo lo demás.\
    \ Una vez que aparece la forma de la espada, no hay escapatoria. Quizás, esta\
    \ podría ser la sinfonía para desenvainar espadas. (risas)"
Clownpiece:
  Name: Clownpiece
  TrackName: Chaotic paradise
  Original: Pierrot of The Star-Spangled Banner
  Comment: "Este es el tema de batalla específico del personaje Clownpiece.\nEl caos\
    \ del infierno es un regalo que ella ha concedido a la humanidad y transformar\
    \ la capital lunar en un paraíso caótico es su misión más urgente. Aún tienes\
    \ tiempo para escapar antes de enfrentarte a este incidente. 3, 2, 1... ¡Se acabó\
    \ el tiempo!"
Doremy:
  Name: Doremy
  TrackName: Close eyes
  Original: Eternal Spring Dream
  Comment: "Este es el tema de batalla específico del personaje Doremy Sweet.\nCierra\
    \ los ojos, déjate llevar por los sueños y piérdete en ellos, sin querer despertar.\
    \ En los sueños, la suciedad se purifica, se restablece el orden y la vida se\
    \ desvanece."
Sakuya:
  Name: Sakuya Izayoi
  TrackName: La forma del tiempo detenido
  Original: Flowering Night
  Comment: "Este es el tema de batalla específico del personaje Sakuya Izayoi.\n¡Congela\
    \ el momento! En este reino más allá del tiempo, todo movimiento está al alcance\
    \ de su ama. Ella coloca los cuchillos en el orden perfecto, apuntando hacia el\
    \ enemigo, ¡y luego chasquea los dedos! Dando paso a un espacio-tiempo invertido,\
    \ poniendo todo patas arriba."
Cirno:
  Name: Cirno
  TrackName: La forma del hielo congelante
  Original: Tomboyish Girl in Love
  Comment: "Este es el tema de batalla específico del personaje Cirno.\nSin importar\
    \ la estación ni la hora del día, el frío es un tema recurrente. No la subestimes\
    \ solo porque sea una niña, sus travesuras pueden ponerte en aprietos. Si no tienes\
    \ cuidado y te encuentras atrapado en una situación gélida, el destino se te escapará\
    \ de las manos y el peligro no tardará en aparecer."
Koishi:
  Name: Koishi Komeiji
  TrackName: Impulsos sinceros
  Original: Last Remote
  Comment: "Este es el tema de batalla específico del personaje Koishi Komeiji.\n\
    Impulsos sinceros pero no imprudentes, compartiendo solo las emociones más genuinas,\
    \ con los sueños desconocidos que afloran junto a ellas. ¡Solo las personas más\
    \ fuertes pueden enfrentarse a su interior y evitar que se aproveche de sus vulnerabilidades!"
Alice:
  Name: Alice
  TrackName: La forma de las muñecas
  Original: Doll Judgement ~ The Girl Who Played with People's Shapes
  Comment: "Este es el tema de batalla específico del personaje Alice.\nPara ella,\
    \ en el instante en que las muñecas controladas por los hilos mágicos descienden\
    \ del cielo y rodean al enemigo, la victoria está asegurada. Su enemigo solo ha\
    \ podido resistir porque ella aún no ha desplegado todo su poder. La única forma\
    \ de derrotarla es descifrar esta caótica y enredada red de hilos. Encuentra las\
    \ pistas adecuadas y localiza a la maga que mueve todos los hilos."
Long:
  Name: Megumu Iizunamaru
  TrackName: La Forma de la estrella fugaz
  Original: Starry Mountain of Tenma
  Comment: "Este es el tema de batalla específico del personaje Megumu Lizunamaru.\n\
    Una chispa puede incendiar el campo, pero también convertirse en un arma letal\
    \ dirigida al enemigo. Si te pierdes en esta fantástica forma de la estrella fugaz,\
    \ el peligro te seguirá como una sombra. La luz de las estrellas es efímera, al\
    \ igual que tu oportunidad de convertir el peligro en seguridad. ¡Encuentra la\
    \ única salida en medio de este caleidoscopio de colores!"
Remilia:
  Name: Remilia
  TrackName: La forma del rojo escarlata
  Original: Septette for a Dead Princess
  Comment: "Este es el tema de batalla específico del personaje Remilia Scarlet.\n\
    Una invitación de la jefa de la Mansión Scarlet Devil, por favor, tome un asiento\
    \ y una taza de té.\nPor supuesto, es un ritmo feroz y vibrante puede estar a\
    \ la altura de la Scarlet que se arremolina en el aire, pero ten mucho cuidado,\
    \ podrías ser engullido por la forma del rojo escarlata antes de darte cuenta."
Sanae:
  Name: Sanae Kochiya
  Original: Faith Is for the Transient People
  TrackName: La forma de la sacerdotisa del viento
  Comment: "Este es el tema de batalla específico del personaje Sanae Kochiya.\n¡Invoca\
    \ el viento y entra en combate! Baila al ritmo de la música electrónica y, antes\
    \ de que te des cuenta, la forma de la sacerdotisa del viento habrá cobrado vida.\
    \ Gente de Gensokyo, manténganse firme vuestra fe y esperad a que la diosa del\
    \ viento obre un milagro."
Junko:
  Name: Junko
  Original: Pure Furies ~ Whereabouts of the Heart
  TrackName: La forma de la intención asesina
  Comment: "Este es el tema de batalla específico del personaje Junko.\nEl rencor\
    \ se transforma en una devoción ciega por el poder, con el juramento de devorar\
    \ a todos los enemigos sin piedad. Atrapada en la Forma de la Intención Asesina,\
    \ la música frenética lleva la batalla al borde del caos. La victoria o la derrota\
    \ de penden de un hilo."
Stage4:
  Name: 'Acto Final: Cielos sobre el lago de la diosa del viento'
  Original: The Exaggerated Castle Keep
  TrackName: El camino hacia el centro
  Comment: "Este es el tema para el acto final.\nEl enemigo más poderoso se encuentra\
    \ en el centro del mundo. Todos los caminos conducen al centro del mundo, un lugar\
    \ que antes era imperturbable, pero ahora…"
Stage3:
  Name: 'Acto 3: Lago de la diosa del viento'
  Original: The Primal Scene of Japan the Girl Saw
  TrackName: Surcando el viento para encontrar una ermitaña
  Comment: "El tema de la Diosa del lago del viento de los perdidos, la música del\
    \ primer nivel.\nEsta pieza transmite la sensación de dejarse llevar por el viento.\
    \ ¿Sientes que el danmaku está justo delante? ¡Bailemos las próximas batallas\
    \ al ritmo de la música!"
Shop:
  Name: Tienda de Takane
  TrackName: Un descanso en el bosque
  Original: Banditry Technology
  Comment: "Esta es una canción que captura el ambiente relajado de unas vacaciones.\n\
    ¡Dejen de pelearse entre ustedes, mejor pasemos el rato juntas!"
Adventure1:
  Name: Evento 1
  TrackName: Punto de partida
  Original: Gensokyo Millennium ~ History of the Moon
  Comment: "Esta es una canción de estilo narrativo con un tono alegre.\nUtiliza el\
    \ silbato irlandés, marimba y una variedad de instrumentos de precisión tocando\
    \ al unísono. Las melodías se entrelazan para evocar la emoción de un aventurero\
    \ que se prepara para explorar el mundo."
Elite1:
  Name: Elite 1
  Original: Eternal Transient Reign
  TrackName: No me subestimes
  Comment: "Esta es la canción que suena cuando aparece un élite.\nEl ritmo intenso\
    \ sirve como recordatorio de que una gran batalla está a punto de comenzar. ¿Confías\
    \ en la victoria?"
Aya:
  Name: Aya Shameimaru
  Original: Youkai Mountain ~ Mysterious Mountain
  TrackName: Una historia improvisada
  Comment: "Este es el tema de batalla específico del personaje Aya Shameimaru.\n\
    Dondequiera que sople el viento, el sonido de las cámara se escucha. Verdad y\
    \ mentira, bien y mal, realidad y ficción, todo encuentra su camino en los periódicos,\
    \ disipando el aburrimiento de la tarde. Pero si uno mira con atención, descubrirá\
    \ que la mayoría no son más que rumores sin verificar, lo que uno no puede dejar\
    \ de provocar un suspiro, \"Los estándares típicos del periodismo\"."
Kokoro:
  Name: Hata no Kokoro
  TrackName: Ǝmotioɲ
  Original: The Lost Emotion
  Comment: "Este es el tema de batalla específico del personaje Hata no Kokoro.\n\
    ¿Es una sonrisa o una llanto lo que se esconde tras la máscara? Mil emociones\
    \ dan lugar a mil expresiones, algunas tranquilizadoras, otras que ocultan peligro.\
    \ Si logras ver más allá del disfraz, quizás descubras sus verdaderas emociones,\
    \ posiblemente la clave para derrotarla."
Siji:
  Name: Eiki Shiki
  TrackName: THe last judgment
  Original: Eastern Judgement in the Sixtieth Year ~ Fate of Sixty Years
  Comment: "Este es el tema de batalla específico del personaje de Eiki Shiki.\nEl\
    \ juicio final está a punto de comenzar. Ante la jueza, confiesa tus pecados.\
    \ Entonces, se les concederá a todos la oportunidad de resistir y luchar por su\
    \ libertad o expiar sus pecados en el infierno."
Reimu:
  Name: Reimu Hakurei
  TrackName: La forma del sello espiritual
  Original: Maiden's Capriccio ~ Dream Battle
  Comment: "Este es el tema de batalla específico del personaje Reimu Hakurei.\nEn\
    \ el punto de partida de la aventura, ella se encuentra allí, como siempre, esperando\
    \ a sus rivales. El eterno forma del sello del espiritual, junto con sus reglas\
    \ y su orden atemporales, conforman esta barrera impenetrable. Solo si superas\
    \ esta prueba te ganarás su aprobación y serás digno de seguir adelante."
Marisa:
  Name: Marisa Kirisame
  Original: Love-Colored Master Spark
  TrackName: La forma de la Magia
  Comment: "Este es el tema de batalla específico del personaje Marisa Kirisame.\n\
    La renombrada maga está a punto de llegar, prometiendo un espectáculo deslumbrante.\
    \ El cielo cobrará vida con la luz de las estrellas cuando se active su cañón\
    \ mágico, iluminando el cielo con una lluvia de fuegos artificiales. Será un momento\
    \ impresionante donde la luz y el sonido converjan."
Tianzi:
  Name: Tenshi Hinanawi
  Original: Bhavaagra As Seen Through a Child's Mind
  TrackName: La Forma de la espada brillante
  Comment: "Este es el tema de batalla específico del personaje Tenshi Hinanawi.\n\
    Tenshi desciende, y el aura de su espada la sigue. Su ímpetu es capaz de partir\
    \ el cielo y la tierra, con ecos que sacuden el mundo entero. En el momento en\
    \ que se activa la Forma de la Espada Brillante, las debilidades del enemigo quedan\
    \ al descubierto. Mientras la tierra tiembla, esta joven arrasará con todo aquel\
    \ que se atreva a faltarle al respeto."
Yuyuko:
  Name: Yuyuko Saigyouji
  TrackName: La forma de la danza de la mariposa
  Original: Bloom Nobly, Ink-Black Cherry Blossom ~ Border of Life
  Comment: "Este es el tema de batalla específico del personaje Yuyuko Saigyouji.\n\
    Una elegante melodía clásica inunda el aire, atrayendo fantasmas y mariposas que\
    \ revolotean a su alrededor. Si intentas asomarte a las puertas del Inframundo,\
    \ ten cuidado de no adentrarte en el reino de los muertos. La forma de la danza\
    \ de la mariposa se desarrolla en silencio, la agitación cesa abruptamente, dejando\
    \ solo cerezos en plena floración y a los difuntos ya ausentes."
Seija:
  Name: Seija Kijin
  Original: Romantic Escape Flight
  TrackName: Revolución social y confrontación final
  Comment: "Este es el tema de batalla específico del personaje Seija Kijin.\nEmbárcate\
    \ al camino hacia la batalla final, donde te espera un mundo patas arriba. Da\
    \ lo mejor de ti, aprovecha esta única oportunidad para poner fin a la revolución\
    \ social en medio del caos y restablecer el orden."
Sanyue:
  Name: Tres hadas de la luz
  Original: The Refrain of the Lovely Great War/Great Fairy Wars ~ Fairy Wars
  TrackName: Curiosa, Alerta, Traviesa
  Comment: "Este es el tema de batalla específico del personaje de las tres hadas\
    \ de la luz.\nLos duelos de 1vs1 quedaron obsoletos, el 3vs1 es la verdadera definición\
    \ de la amistad. Acércate sigilosamente, sin dejar ningún rastro. ¿Te estás impacientando?\
    \ ¡Por supuesto! por que... ¡Por fin podemos dar inicio a una guerra a gran escala\
    \ con orgullo!"
Fail:
  TrackName: Fracaso
  Name: Fracaso
  Original: The Venerable Ancient Battlefield ~ Suwa Foughten Field/Player's Score
Victory:
  TrackName: Victoria
  Original: Gensokyo Millennium ~ History of the Moon
  Name: Victoria
VictoryLong:
  Name: Victoria (Extendido)
  Original: Gensokyo Millennium ~ History of the Moon
  TrackName: Victoria (Extendido)
