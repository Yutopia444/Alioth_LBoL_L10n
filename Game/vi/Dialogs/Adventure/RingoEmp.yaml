line:00a9945: '"Chúng là thứ đồ đạo nhái bằng sáng chế Nguyệt Đô, hi vọng cô giúp
  chúng tôi bảo vệ quyền sở hữu trí tuệ của mình."'
line:05575e9: '[Hỗ Trợ] Nhận: |{0}|'
line:09ee960: '"Quyền sở hữu trí tuệ là cái gì cơ? Dù sao, tôi cũng chắc chắn sẽ tiêu
  diệt hết đám máy bay không người lái phiền phức đó."'
line:0ddd7b7: '[Tiếp Tục]'
line:0b93b5a: '[Từ Chối] Nhận 3 lá Công Cụ ngẫu nhiên và nhận Vận Rủi: |{0}|'
line:0a26145: '"Chỉ một con thỏ ngọc bé tí giờ cũng muốn chỉ huy ta à, tin ta cho
  ngươi một trận không?"'
line:0b3160d: '"Á, bé đâu dám! Đừng để ý đến bé, bé chỉ là một con thỏ ngọc đang trên
  đường mua dango đi ngang qua mà thôi."'
line:06797b6: '"Hơ..? Một con thỏ ngọc đi mua dango ở Trái Đất? Nghe chẳng hợp lý
  gì cả."'
line:0c1abfc: '"A! Ai đã làm rơi những thứ này?"'
line:095a793: '[Không Quan Tâm] Không có chuyện gì xảy ra'
line:0bfddbe: '"Eiki rất giỏi phân xử, loại tranh chấp này tốt hơn hết là hãy đi hỏi
  cô ấy."'
line:0e80e9a: '"Này {0}, cô cũng thấy đống máy bay không người lái của đám hà đồng
  đó rồi chứ?"'
line:0deca08: '"Cô thật tốt bụng! Món vũ khí chuyên dụng do Nguyệt Đô phát triển này
  chắc chắn sẽ hữu ích với cô đấy."'
line:080f7f2: Ringo lấy ra một vật hình que bí ẩn và lắc lắc nó trước mặt {0}, làm
  rơi một đống đồ rồi chạy mất.
line:065ee92: '"Nếu diêm ma có thể giải quyết được tranh chấp bản quyền, chẳng phải
  tranh chấp lao động của thỏ ngọc chúng tôi cũng có thể được giải quyết rồi?"'
line:06e4380: '"Chuyện này thật đáng ngờ, mình có nên nhờ chị gái xem xét thử không?"'
line:01cf70f: '"Tôi không ký hợp đồng mà không đọc kỹ càng, chào nhé."'
line:0966360: '"Không có dòng chữ nào bị in nhỏ cả... để lát nữa tôi xem được không?"'
line:010ac9a: '"Với tiên nữ thì thế này vẫn là quá nhiều sao...."'
line:0ed06df: '"Tôi không hiểu mấy thứ như sở hữu trí tuệ lắm, và tôi cũng không muốn
  hiểu."'
line:0d19c44: '"Mình nên tìm khách hàng nào dễ giao tiếp hơn, công việc của nhân viên
  bán hàng tuyến đầu sao thật khó khăn..."'
line:0e52736: '"Mấy chuyện của đám người Mặt Trăng các người càng ngày càng rắc rối,
  đừng có mà lôi tôi vào."'
line:0659c8a: '"Máy bay không người lái, không đóng đá được, đáng ghét, phải phá hủy
  hết chúng!"'
line:00f11f7: '"Tôi là tiên nữ mạnh nhất, cô không tin tôi đóng băng cô luôn cho mà
  xem."'
line:057628f: '"Ôi, đống chữ này làm mình chóng mặt quá."'
line:014c651: '"Bạn nói thật phải, bạn đã hoàn toàn thuyết phục được tôi..."'
line:082e36e: '"Phá hủy máy bay không người lái à, chuyện nhỏ."'
line:0250688: '"Ra là thứ đó gọi là máy bay không người lái, vậy thì phải phá hủy
  chúng ngay thôi."'
line:00f79ea: '"Cô là đồng đảng với đám lừa đảo qua điện thoại kia đúng không, để
  tôi xử lý cô luôn."'
