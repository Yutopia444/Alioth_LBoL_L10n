line:0678716: '[Nhận Áo] Nhận |Áo phông thần tượng|'
line:0ba9037: '"Miễn phí hả? Thế thì tôi sẽ lấy một cái."'
line:00d22b0: '[Rời Đi] Không có chuyện gì xảy ra'
line:0fc2c16: '"{Censor:select false=''Ôi chao,「Kaguya-chan」cơ đấy, cử chỉ bắt chước
  theo anime gì thế này, thật kinh tởm.''true=''Trời ạ, bộ đồ bình thường cô mặc đã
  đủ kỳ quái rồi, bỏ đi bỏ đi.''}"'
line:063a72b: '"Sau khi nghiên cứu, tôi đã thấy rằng Kaguya-chan rất là tốt bụng và
  hiếu khách không giống với những người Mặt Trăng khác."'
line:008fa52: '"Nào, hãy cùng nhau ủng hộ Kaguya-chan!"'
line:0670be2: '"Nhớ mặc nó để mọi người cùng thấy nhé!"'
line:01566ec: '[Đổi Cỡ] Nhận: |Áo phông thần tượng (Cỡ lớn)|'
line:0ba87b6: '"Nhớ mặc nó để mọi người cùng thấy nhé!"'
line:059fbd3: '"Miễn phí hả? Thế thì tôi sẽ lấy một cái, cỡ lớn nhé."'
line:062b5d5: '"Miễn phí, tức là tôi không cần phải trả nó lại đúng không."'
line:022c403: '"Miễn phí à, món đồ tôi mang cho đại tiểu thư lần này có chút độc đáo."'
line:0e45c03: '"Đương nhiên là tôi lấy cái to nhất rồi!"'
line:00a6aad: '"Ôi~ cái này ~ hổng dễ thương tẹo nào!"'
line:0f24388: '"Những thứ dành cho người mạnh nhất thì đương nhiên phải miễn phí rồi."'
line:00d286e: '"Có miễn phí không? Tối mai tôi sẽ cho chị gái mặc nó."'
line:0a28c4c: '"Thời cơ tốt, cho tôi cái cỡ lớn!"'
line:0c1968a: '"Tôi sẽ tặng nó cho Meiling làm đồ lưu niệm, đưa tôi cái to nhất là
  được."'
line:0a99c1c: '"Vậy thì tôi sẽ lấy cái cỡ lớn này! Cũng ra gì đấy~!"'
line:055f5d6: '"Ngay cả việc dùng nó như giẻ lau cũng có vẻ không thiết thực lắm."'
line:0bd1ffa: '"Mặc đồ màu đen sẽ làm mình tan chảy mất."'
