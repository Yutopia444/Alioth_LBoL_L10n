line:0340a4c: '{0} nhìn thấy một Chứng Vật trôi nổi trên mặt nước. Có muốn vớt nó
  lên không?'
line:0b63278: '"Sao mình có cứ cảm giác như đang bị ai đó theo dõi thế nhỉ..."'
line:00e3d78: '"Sao mọi người tìm được Chứng Vật dễ dàng thế? Thật ghen tỵ quá."'
line:094a004: '"Sao cô lại có thể hào phóng đến vậy?! Sự tốt bụng này thật đáng ghen
  tỵ quá đi!"'
line:0557dad: '[Lấy Nó] Nhận một Chứng Vật ngẫu nhiên'
line:0dc3dde: Một tiếng động đáng ngờ phát ra từ trong rừng tre…
line:0c4a8da: '[Mặc Kệ] Không có chuyện gì xảy ra'
line:0bbc877: '[Đưa Một Chứng Vật] Mất |{0}|'
line:0eb1ea2: '[Không Hợp Lệ] Không đủ Chứng Vật'
line:0724a11: '[Đưa Một Chứng Vật Khác] Mất |{0}|'
line:0f2d695: '[Không Hợp Lệ] Không đủ chứng vật'
line:028b07c: '"Tôi sẽ nguyền rủa cô chỉ tìm được những chứng vật vớ vẩn đêm nay!"'
line:0f9fdb8: '{0}'
line:0eea103: '"Từ từ, tôi cũng không có cần đến |{0}|, cho cô đấy."'
line:0d7d127: '{0}'
line:0d0c814: '"Cô sẽ cho tôi cái |{0}| đáng nguyền rủa đó á? Tha cho cô đấy~"'
line:0d2e77f: '"Ừ ừ. Nhưng không phải mắt cô có màu xanh à?"'
line:03c49f5: '[Không Cho Gì Cả] Nhận Vận Rủi: |{0}|'
line:0b15c0b: '"Ai thấy trước là của người đó~"'
line:092a6ef: '"Mức độ vô liêm sỉ đó thật đáng ghen tỵ.... cứ đợi đến nửa đêm xem!"'
line:06c46e2: '"Có chuyện chẳng lành? Chuồn thôi."'
line:09c940c: '"Ôi trời, vội vã thế à."'
line:0eab3e1: '"Vì tôi rất mạnh, nên tôi có nghĩa vụ phải bao dung cô."'
line:0ed1f87: '"Trong đầu không suy nghĩ gì đôi khi cũng có cái hay."'
line:0257156: '"Không đâu nhé~sao cô không thử tự đi mình đi vớt nhỉ?"'
line:0640b79: '"Ồ, cô muốn {0} đúng không, cho cô đấy."'
line:00dc681: '"Ưm~tôi không cần {0} này, cầm lấy đi nhé."'
line:07cb2be: '"Bạn chậm một bước rồi, tôi vẫn khá tự tin về tốc độ của mình đấy."'
line:0155b90: '"Của tôi nhé! Không cho cô!"'
line:0003aa9: '"Từ từ đã, {0} này tôi cũng không dùng đến, cô cầm lấy mà dùng đi."'
line:0f52646: '"Sao cơ, cô muốn lấy {0} á, vì tôi đang có tâm trạng tốt nên cho cô
  đấy."'
line:0a0da16: '"Thật không may, thứ này đã là một phần trong bộ sưu tập của tôi rồi."'
