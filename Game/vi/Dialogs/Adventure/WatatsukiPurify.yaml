line:005d895: Tuy có chút mùi khả nghi của chất phụ gia công nghiệp, nhưng quả đào
  đã trải qua biến đổi gen của Nguyệt Đô vẫn rất ngon.
line:05fe9e1: '"Thấy bạn rồi, trợ thủ của Eirin đại nhân, cho phép tôi giúp đỡ bạn
  một chút."'
line:0220408: '[Cầu Thần] Mất {0} HP tối đa, nhận 2 lá |{1}|'
line:08e2a8a: '"Tôi mượn được từ Yorihime chiếc chuông Kagura của |Izunome| này, hãy
  để nó thanh tẩy sự ô uế trong cô."'
line:050b98e: Dưới sự chúc phúc từ chuông Kagura, {0} cảm thấy sư ô uế của bản thân
  tiêu tán đi một chút…
line:022c54a: '"Cảm ơn nhé!"'
line:015cd2b: '[Ăn Quả Đào] Tăng {0} HP tối đa, nhận Vận Rủi: |{1}|'
line:07b8cb5: '"Nếu muốn, cô có thể ăn quả đào mà tôi mang theo này, nó khá ngọt đấy."'
line:09c8a85: '"Thứ này ăn ngon quá!"'
line:0c671d8: '[Từ Chối] Không có chuyện gì xảy ra'
line:0c46a1e: '"Vậy cũng được, dù sao tôi cũng chỉ đến để tìm Eirin đại nhân."'
line:0b9590a: '"Với dị biến đơn giản như thế này thì tôi có thể tự xoay xở được."'
line:0c4ae27: '"Cảm ơn nhé!"'
line:00ebbaa: '"Cảm ơn nhé!"'
line:0eb127d: '"Cảm ơn nhé!"'
line:0052cc6: '"Cảm ơn nhé!"'
line:0b908c2: '"Cảm ơn nhé!"'
line:0ebbfcf: '"Có gì đó đang ngờ ở đây~, không nhé."'
line:0aeaa2e: '"Thật ngon! Phải mang cho đại tiểu thư một cái mới được."'
line:07574a3: '"Thứ này ngon quá, sao hồi trên Mặt Trăng cô không mời tôi món này."'
line:0cc6dc5: '"Ngon quá, giá mà mình được ăn nó dịp lên Mặt Trăng lần trước!"'
line:0e687b1: '"Ồ...! Ngon! Còn nữa không vậy!?"'
line:0b3c5dd: '"Ngon ngon ngọt ngọt~, hương vị làm tôi thấy thật hạnh phúc."'
line:087180e: '"Dù không có nó thì tôi vẫn là mạnh nhất! Nên không cần đâu!"'
line:07974a1: '"Khỏi cần, có cô ở đây rồi thì một chuyên gia dị biến như tôi hẳn là
  thừa thãi ha."'
line:0912025: '"Không cần, quá mức thông thuận thì thường ẩn chứa bẫy rập."'
