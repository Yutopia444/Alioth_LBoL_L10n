line:03b4cbd: Dường như Patchouli đang nghiên cứu những viên ma pháp quang ngọc này.
line:06ad387: '"Hừm, ra là như vậy..."'
line:0b23fed: "\"{0}, cô đến thật đúng lúc. Để tôi giúp cô điều chỉnh độ tương thích\
  \ của cô với những viên quang ngọc này.\"\n(Một đối tượng thí nghiệm tuyệt vời)"
line:07acb35: Lựa chọn một mana đơn sắc trong kho mana, chuyển hóa nó thành Mana Đa
  Sắc.
line:01cdad3: '[Đồng Ý] {0}.'
line:013e396: '"Thế thì, ma pháp quang ngọc mà cô muốn chọn là?"'
line:0fb491d: '{0} thực sự cảm thấy bản thân có thể vận dụng năng lượng ma thuật dễ
  dàng hơn.'
line:071a8e9: '"Cảm ơn cô, Patchouli. Không ngờ cô lại tốt bụng như vậy nha~"'
line:0cbf9f4: '"Cô đang nói linh tinh gì vậy?"'
line:0e78dc7: '"Cảm ơn, có cần tôi tiện đường mua một ít lá trà không?"'
line:0725f8e: '"Giúp tôi mua một ít trà Đại Hồng Bào, cảm ơn~"'
line:04eeb1a: '[Từ Chối] Không có chuyện gì xảy ra'
line:01c44c8: '"Không cần đâu, chúng ta có thể từ từ điều chỉnh nó sau khi cô về nhà."'
line:044f4bc: '"Uổng công mình ra khỏi cửa một lần..."'
line:04b1f03: '"Không cần đâu, trạng thái hiện tại của tôi đang rất tốt."'
line:0f3e81b: '"Vậy thì cô hãy trả lại những thứ cô đã mượn đi..."'
line:0465dee: '"Vẫn chưa tới lúc cho đồ uống lạnh đâu mà..."'
line:0bc2af5: '"Được khen ngợi bởi một kẻ ngốc..."'
line:0cfade6: '"Tôi không muốn bị bắt đi ướp lạnh đồ uống nữa đâu."'
line:0874548: '"Đột nhiên như vậy, tôi cảm thấy hơi bối rối."'
line:04fba63: '"Tạm thời hãy quên chuyện đó đi, nếu cô vẫn muốn nghiên cứu về nó thì
  hãy tới tìm tôi sau nhé."'
line:066cc93: '"Tôi có cảm giác cô sẽ mượn cơ hội này để đòi lại đồ."'
line:092f7e3: '"Có vẻ như mình có giải thích thế nào thì cô ấy cũng không hiểu, thôi
  bỏ đi vậy..."'
line:035363d: '"Sống ở nhà đỏ cũng ra gì đấy."'
line:07939f8: '"Đây hẳn phải là cơ hội kiếm tiền hiếm có lắm nên cô ta mới vội vàng
  như vậy."'
