line:0284c65: '[Ăn Rồi Chạy] Từ chối trả tiền'
line:01cb698: '"Ôi, tôi vội quá nên quên mang tiền theo rồi, cho tôi ghi nợ nhé."'
line:065edde: '"Đừng có ăn chùa chứ—"'
