line:0544220: '"Mấy xiên nấm nhìn ngon quá, cho tôi một xiên."'
line:0f8955e: '"Vâng~ một xiên nấm nướng, hết {0} <sprite="Point" name="Gold"> nhé."'
line:0602331: '{0}'
line:0a8caeb: '"Bao giờ lại ghé thăm nhé~"'
line:0086f01: '[Ăn Rồi Chạy] Từ chối trả tiền.'
line:05fa0d3: '"Nấm của cô vị không được tươi cho lắm, lần sau chọn nguyên liệu cẩn
  thận hơn nhé."'
line:0bf0f77: '"Tuy đây là quán nhỏ nhưng tôi đây làm ăn chân chính đấy nhé...!"'
line:0c3600a: '[Không Ăn Vặt Đêm Khuya] Không có chuyện gì xảy ra'
line:0c34697: '"Tôi nghe nói ăn quá nhiều và tập thể dục mạnh vào ban đêm rất có hại
  cho sức khỏe."'
line:0b5dafc: '"Thỉnh thoảng ăn một bữa gian lận cũng được mà...!"'
line:0159576: '"Một đĩa cá mút đá nướng nhé, thèm muốn chảy nước miếng rồi."'
line:0024284: '"Một đĩa cá mút đá nướng, không phải lúc nào mình cũng có cơ hội ăn
  món đó."'
line:0cbb734: '"Ngon quá! Cảm ơn đã khoản đãi~!"'
line:0b2075c: '"Đây có thật là nấm tươi không vậy? Mấy cây trong Rừng Ma Thuật còn
  ngon hơn thứ này."'
line:02fe6e4: '"Mùi vị thật lạ, chúng bị hỏng rồi à?"'
line:002e6b4: '"Một đĩa cá mút đá nướng, nhanh lên nhé."'
line:01d3662: '"Đây không phải là ăn quỵt đâu đúng không? Tôi chỉ đi tập thể dục sau
  bữa ăn mà thôi."'
line:05b6084: '"Ngon tuyệt vời~xin tạm biệt~"'
line:0adc673: '"Mấy cây nấm này, chúng không phải hàng hết hạn đâu đúng không?"'
line:0bab6c3: '"Trông chúng như bị mốc vậy!"'
line:001e989: '"Nhân viên gác cổng của chúng tôi là khách quen ở đây đúng không? Tôi
  sẽ bảo cô ấy trả tiền lần sau cô ấy tới."'
