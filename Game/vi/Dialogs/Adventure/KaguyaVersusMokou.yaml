  \ Sắp xếp băng đĩa là một công việc rất tốn sức đấy'}\""
line:015db7a: '"Hưm, tôi vẫn chưa thua đâu!"'
line:0c1db12: '"Chắc chắn cô {0} nghĩ giống tôi rồi. Với tư cách đồng minh, xin hãy
  nhận món đồ lưu niệm này như sự biết ơn của tôi."'
line:0460217: '[Tiếp Tục]'
line:0db14e0: '[Đi Qua] Không có chuyện gì xảy ra'
line:0a72879: '"Tôi chỉ muốn xem liệu đồ triển lãm của cô tốt thế nào, kết quả cô
  cũng chỉ có thế!"'
line:01185cd: '"Tốt hơn là cứ mặc kệ bọn họ..."'
line:04ceb26: "\"{Censor:select false= '「Game Girl Advance」là máy console cầm tay\
  \ tuyệt vời nhất! Tôi không cho phép cô nói xấu 「Nentendo」!' true='Cô thậm chí còn\
  \ không có nổi một băng game vật lý nào mà dám mạo xưng là người đam mê game à!\
  \ Tôi sẽ không bao giờ cho phép một người như cô, với một giá tủ rỗng tuếch, bôi\
  \ nhọ danh tiếng của chúng tôi!'}\""
line:0bc6368: (Mình không hiểu họ lại cãi nhau vì cái gì, nhưng tên trộm có thể lợi
