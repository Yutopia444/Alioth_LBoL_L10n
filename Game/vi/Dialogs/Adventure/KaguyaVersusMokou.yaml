  \ lý nữa thì các cửa tiệm nhỏ địa phương như của Rinnosuke sẽ đối mặt với khủng\
  \ hoảng tài chính đấy!'}\""
line:07ab6fd: '{0} cố gắng tách hai người ra bằng vũ lực--sau khi chặn được vài cú
