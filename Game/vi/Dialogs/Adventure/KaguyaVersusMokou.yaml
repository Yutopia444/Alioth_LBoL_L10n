line:0921fbf: '"Cô thật lắm chuyện, {0}..."'
line:0219773: '"Cô {0}, xin hãy nhận thứ này thay cho lời cảm ơn của tôi! Tôi trông
  cậy vào cô để giải quyết dị biến đó~"'
line:09d8d02: '[Tiếp Tục]'
line:0d3703c: '[Giúp Kokou] Mất {0} HP, nhận: |{1}|'
line:0500ae3: "\"{Censor:select false='Mong hai cô dừng tay! Tôi nghe nói「Moneyverse」\
