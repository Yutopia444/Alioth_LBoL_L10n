MainMenu:
  TrackName: Thức thứ 19 của Ảo Tưởng
  Name: Màn Hình Chính
  Original: Ảo Tưởng Hương Thiên Thu ~ History of the Moon
  Comment: "Một bản nhạc điện tử thử nghiệm lấy cảm hứng từ \"Gensokyo Millennium\"\
    . Sự tương phản giữa phần mở đầu và phần điệp khúc được làm nổi bật để phản ánh\
    \ tính chất của trò chơi, vừa nhẹ nhàng lại vừa kịch tính.\nCòn về \"Thức thứ\
    \ 19\" là do đây là bản Millennium Gensokyo thứ 19 mà chúng tôi từng tạo ra, và\
    \ chúng tôi vẫn đang khám phá những hướng đi sáng tạo mới."
Stage1:
  Name: 'Chương 1: Rừng Tre Lạc Lối'
  TrackName: Người Đuổi Đêm
  Original: Quả Báo Từ Đêm Bất Diệt ~ Imperishable Night
  Comment: "Khúc chủ đề cho Rừng tre lạc lối, bản nhạc nền đầu tiên.\nToàn bộ bản\
    \ nhạc ngập tràn sự phấn khích của các cuộc giao tranh, nhanh chóng đưa người\
    \ chơi vào trạng thái sẵn sàng chiến đấu.\nĐồng thời, việc sử dụng âm sắc giống\
    \ như tiếng chim hót càng làm nổi bật bầu không khí ban đêm của bản nhạc."
Stage2:
  Name: 'Chương 2: Đầm Huyền Vũ'
  TrackName: Discovery & Discoverer
  Original: Fall of Fall ~ Autumnal Waterfall
  Comment: "Khúc chủ đề cho Đầm Huyền Vũ, bản nhạc nền thứ hai.\nĐây là một bản nhạc\
    \ mang chủ đề về sự phiêu lưu, nhấn mạnh sự bí ẩn và những thứ chưa ai biết. Nó\
    \ sử dụng nhiều nhạc cụ dân tộc bộ gõ trong thiết kế để mang đến cho người nghe\
    \ cảm giác như đang ở một chốn xa lạ."
Stage3:
  Name: 'Chương 3: Hồ Thần Gió'
  TrackName: Cưỡi Gió Tìm Tiên
  Original: Cảnh Nhật Bản Hoang Sơ Trong Mắt Thiếu Nữ
  Comment: "Khúc chủ đề cho Hồ Thần Gió, bản nhạc nền thứ ba.\nBản nhạc mang lại cảm\
    \ giác như đang hòa mình theo gió, bạn có thấy đạn mạc giống như đang ở ngay phía\
    \ trước mình không? Hãy để trận đấu tiếp theo nhảy múa giữa thiên không cùng âm\
    \ nhạc!"
Shop:
  Name: Giao Diện Cửa Hàng
  TrackName: Nghỉ Chân Trong Rừng
  Original: Banditry Technology
  Comment: "Đây là một bản nhạc thể hiện trọn vẹn bầu không khí của một lễ hội.\n\
    Mọi người mau đình chiến, cùng nhau thư giãn thôi nào!"
Gap:
  Name: Căn Phòng Khe Nứt
  TrackName: Nhập Dạ Khúc
  Original: Necrofantasia
  Comment: "Một bản nhạc mang âm hưởng châu Âu.\nÂm thanh tao nhã của phong cầm và\
    \ tiếng chuông glockenspiel du dương hòa quyện với nhau tạo nên một bầu không\
    \ khí thật yên bình, khiến người ta muốn được nghỉ ngơi thư giãn."
Adventure1:
  Name: Sự Kiện 1
  TrackName: Khởi Hành
  Original: Ảo Tưởng Hương Thiên Thu ~ History of the Moon
  Comment: "Một bản nhạc có tính tự sự vui nhộn.\nSử dụng sáo Ireland, đàn marimba\
    \ và nhiều nhạc cụ bộ gõ khác cùng hòa tấu, giai điệu đan xen liên tiếp, tạo nên\
    \ một cảm xúc kỳ diệu tựa như một nhà thám hiểm chuẩn bị xuống núi khám phá thế\
    \ giới."
Adventure2:
  Name: Sự Kiện 2
  TrackName: Chơi Đùa Trong Rừng
  Original: Ảo Tưởng Hương Mà Các Vị Thần Yêu Mến
  Comment: "Đây là một bản nhạc truyền tải một cảm giác thư thái và tích cực.\nPhần\
    \ mở đầu sử dụng dương cầm để tạo cảm giác yên tĩnh của một khu rừng, trong khi\
    \ vĩ cầm chơi phần giai điệu chính vui tươi, tạo nên khung cảnh tự do chơi đùa\
    \ giữa rừng cây."
Adventure3:
  Name: Sự Kiện 3
  TrackName: Bị Bỏ Quên
  Original: Câu Lạc Bộ Phong Ấn Của Các Thiếu Nữ
  Comment: "Một bản được soạn lúc nhạc sĩ đang tâm trạng.\nCó lẽ emoji \"OTZ\" mô\
    \ tả nó chính xác nhất?"
Elite1:
  Name: Tinh Anh 1
  TrackName: Không Được Khinh Địch
  Original: Thiên Hạ Ba Ngày Vĩnh Cửu
  Comment: "Đây là bản nhạc nền khi một kẻ địch tinh anh xuất hiện trong trò chơi.\n\
    Nhịp điệu dồn dập nhắc nhở người chơi rằng một trận đại chiến sắp diễn ra, liệu\
    \ bạn có tự tin chiến thắng là của mình?"
Elite2:
  Name: Tinh Anh 2
  Original: Chuông Địa Ngục Vô Tận
  TrackName: Đối Mặt
  Comment: "Đây là bản nhạc nền khi một kẻ địch tinh anh xuất hiện trong trò chơi.\n\
    Nhịp điệu mạnh mẽ truyền tải sự căng thẳng và kịch tính của trận chiến, thất bại\
    \ rất có thể xảy đến nếu người chơi không cố gắng hết mình!"
Sanyue:
  Name: Tam Nguyệt Tinh
  TrackName: Tò Mò · Nhạy Bén · Nghịch Ngợm
  Original: Liều Cả Tính Mạng Để Chơi Khăm
  Comment: "Nhạc nền trong trận độc quyền của Ba tiên nữ ánh sáng.\nĐấu 1 chọi 1 đã\
    \ lỗi thời rồi, 3 đánh 1 mới thực sự thể hiện định được nghĩa về tình bạn. Tiếp\
    \ cận lặng lẽ, chỉ để lại một dấu vết mơ hồ. Thấy tức rồi à? Tức rồi kìa! Giờ\
    \ thì chúng ta có thể bắt đầu một trận đại chiến tranh công bằng và sòng phẳng\
    \ được rồi!"
Aya:
  Name: Shameimaru Aya
  TrackName: Story Chóng Vánh
  Original: Núi Yêu Quái ~ Mysterious Mountain
  Comment: "Nhạc nền trong trận độc quyền của Shameimaru Aya.\nỞ đâu có gió thổi qua,\
    \ ở đó có tiếng máy ảnh. Thật giả đúng sai, thực hư tốt xấu, mọi thứ đều được\
    \ lên báo, xua tan sự nhàm chán buổi ban chiều. Nếu xem xét kỹ lưỡng hơn, bạn\
    \ sẽ nhận thấy chúng hầu hết đều là những lời đồn chưa được kiểm chứng, không\
    \ thể không ngao ngán: \"Đúng là văn chương thời đại mới.\""
Rin:
  Name: Kaenbyou Rin
  TrackName: Nhà Ngoại Cảm
  Original: Xác Chết Du Hành ~ Be of good cheer!
  Comment: "Nhạc nền trong trận độc quyền của Kaenbyou Rin.\nMột con quái vật đáng\
    \ sợ đang ẩn nấp trong bóng tối, chờ đợi thời cơ ra tay, nếu bạn đang là mục tiêu\
    \ bị tấn công, bạn tốt hơn hết là nên coi chừng. Khi những oán linh từ địa ngục\
    \ tụ tập lại, không còn lựa chọn nào khác ngoài việc đối đầu trực tiếp với chúng.\
    \ Nhưng mà, tai họa của địa ngục đâu phải chỉ là lời nói suông?"
Nitori:
  Name: Kawashiro Nitori
  TrackName: in the blue
  Original: Hà Đồng Của Ryunosuke Akutagawa ~ Candid Friend
  Comment: "Nhạc nền trong trận độc quyền của Kawashiro Nitori.\nBạn có thể chạy thoát\
    \ được một lần, có lẽ được thêm lần thứ hai, nhưng quá tam ba bận. Nếu gặp lại\
    \ cô ấy, nhớ phải cẩn thận. Ban đầu có thể chỉ là nhẹ nhàng thư thổi bong bóng,\
    \ nhưng về sau có thể sẽ là sóng to gió lớn!"
Youmu:
  Name: Konpaku Youmu
  TrackName: Khoảnh Khắc Kiếm Giương
  Original: Đông Phương Yêu Yêu Mộng ~ Ancient Temple
  Comment: "Nhạc nền trong trận độc quyền của Konpaku Youmu.\nMỗi nốt nhạc như một\
    \ lưỡi kiếm sắc bén, trảm thiên địa, trảm vạn vật. Kiếm trận một ra, không còn\
    \ đường thoát. Có lẽ, đây cũng có thể được coi là một bài xuất kiếm thần khúc.\
    \ (cười)."
Kokoro:
  Name: Hata no Kokoro
  TrackName: Ǝmotioɲ
  Original: Cảm Xúc Đã Mất
  Comment: "Nhạc nền trong trận độc quyền của Hata no Kokoro.\nKhuôn mặt phía sau\
    \ chiếc mặt nạ đang khóc hay đang cười? Vô vàn cảm xúc tạo nên vô số biểu cảm,\
    \ một số đem lại cảm giác an tâm, một số lại mang đến cảm giác đe dọa. Khám phá\
    \ ra cảm xúc thật sự đằng sau lớp vỏ ngụy trang có thể là chìa khóa để đánh bại\
    \ cô ấy."
Clownpiece:
  Name: Clownpiece
  TrackName: Chaotic paradise
  Original: Nàng Hề Của Sao Và Sọc
  Comment: "Nhạc nền trong trận độc quyền của Clownpiece.\nSự hỗn loạn từ địa ngục\
    \ chính là món quà mà cô nàng mang tới cho nhân loại, và việc biến Nguyệt Đô thành\
    \ một địa đàng hỗn loạn là nhiệm vụ tối quan trọng lúc này. Vẫn còn thời gian\
    \ để chạy trốn trước khi dị biến đáng sợ đó xảy ra đấy. 3, 2, 1..., Hết Giờ!"
Siji:
  Name: Shiki Eiki
  TrackName: THe last judgment
  Original: Phiên Tòa Đông Phương Vào Năm Thứ Sáu Mươi ~ Fate of Sixty Years
  Comment: "Nhạc nền trong trận độc quyền của Shiki Eiki, Yamaxanadu.\nPhán xét cuối\
    \ cùng sắp sửa bắt đầu. Mau thú nhận tội lỗi của mình trước thẩm phán. Sau đó,\
    \ bạn sẽ được trao cho một cơ hội giãy dụa cuối cùng, hoặc là chiến đấu để giành\
    \ lấy tự do, hoặc là xuống sám hối dưới địa ngục."
Doremy:
  Name: Doremy
  TrackName: Close eyes
  Original: Mộng Xuân Vĩnh Cửu
  Comment: "Nhạc nền trong trận độc quyền của Doremy Sweet.\nHãy nhắm mắt lại, bước\
    \ vào trong giấc mơ và đắm chìm tại đó, không cần tỉnh dậy. Trong giấc mơ, mọi\
    \ ô uế sẽ được gột rửa, trật tự sẽ được tái lập, và sinh mệnh sẽ kết thúc."
Reimu:
  Name: Hakurei Reimu
  TrackName: Trận Pháp Phong Hồn
  Original: Khúc Ngẫu Hứng Của Thiếu Nữ ~ Dream Battle
  Comment: "Nhạc nền trong trận độc quyền khi đối đầu với Hakurei Reimu.\nNgay từ\
    \ khi cuộc phiêu lưu bắt đầu, cô gái quen thuộc này đã chờ đợi các đối thủ đến\
    \ để thách thức mình. \"Phong Linh Trận\" vĩnh cửu, luật lệ và trật tự bất diệt,\
    \ cả hai cùng nhau tạo thành một kết giới bất khả xâm phạm. Chỉ khi nào vượt qua\
    \ bài kiểm tra này và nhận được sự chấp thuận của cô ấy, người ta mới đủ điều\
    \ kiện để đi tiếp."
Marisa:
  Name: Kirisame Marisa
  TrackName: Trận Pháp Ma Thuật
  Original: Master Spark Màu Tình Yêu
  Comment: "Nhạc nền trong trận độc quyền khi đối đầu với Kirisame Marisa.\nNàng phù\
    \ thủy tiếng tăng lừng lẫy đã xuất hiện, theo đó là một màn trình diễn diễm lệ.\
    \ Vào khoảnh khắc đó, sao sáng đầy trời, và khi pháo ma thuật được kích hoạt,\
    \ trời đêm tĩnh lặng sẽ rực sáng bởi những tia lửa, tạo nên một cảnh tượng tuyệt\
    \ đẹp thoáng chốc nơi âm thanh và ánh sáng hòa quyện với nhau."
Sakuya:
  Name: Izayoi Sakuya
  TrackName: Trận Pháp Ngưng Thời
  Original: Flowering Night
  Comment: "Nhạc nền trong trận độc quyền khi đối đầu với Izayoi Sakuya.\nHiện tại,\
    \ dừng lại! Một không gian nằm ngoài thời gian, nơi mọi chuyển động đều tuân theo\
    \ sự chi phối tuyệt đối từ chủ nhân của nó. Sắp xếp lại các lưỡi dao thật ngăn\
    \ nắp, hướng về kẻ địch, rồi búng ngón tay. Thời gian và không gian luân chuyển,\
    \ thế gian đảo lộn."
Cirno:
  Name: Cirno
  Original: Cô Bé Tomboy Đang Yêu
  TrackName: Trận Pháp Hàn Băng
  Comment: "Nhạc nền trong trận độc quyền khi đối đầu với Cirno.\nDù đông hay hạ,\
    \ dù ngày hay đêm, cái lạnh vẫn là một chủ đề muôn thuở. Đừng phớt lờ chỉ vì cô\
    \ trông nhỏ bé, những trò chơi khăm của cô sẽ luôn khiến bạn phải đề cao cảnh\
    \ giác. Nếu không cẩn thận, bạn sẽ rơi vào tình huống nguy hiểm, khi mà bạn không\
    \ còn tự định đoạt được số phận của bản thân nữa, nơi nguy hiểm theo sát đằng\
    \ sau."
Koishi:
  Name: Komeiji Koishi
  TrackName: Tùy Tâm
  Original: Last Remote
  Comment: "Nhạc nền trong trận độc quyền khi đối đầu với Komeiji Koishi.\nTùy tâm\
    \ nhưng đừng bốc đồng, chỉ khi bạn bộc lộ những cảm xúc chân thật nhất của mình\
    \ với người khác, bạn mới có thể đón nhận một thế giới mộng ảo kỳ thú theo kèm\
    \ với chúng. Và chỉ những người mạnh mẽ nhất mới có thể đối mặt với trái tim mình\
    \ mà không để bị cô nàng ấy lợi dụng!"
Alice:
  Name: Alice
  TrackName: Trận Pháp Búp Bê
  Original: Phán Quyết Búp Bê ~ Thiếu Nữ Chơi Đùa Với Nhân Hình
  Comment: "Nhạc nền trong trận độc quyền khi đối đầu với Alice.\nTừ góc nhìn của\
    \ cô, khi những con rối được điều khiển bằng sợi chỉ ma thuật từ trên trời giáng\
    \ xuống và bao vây đối thủ, chiến thắng đã được định đoạt. Sức kháng cự của đối\
    \ thủ chỉ xuất phát từ việc cô ấy chưa sử dụng hết toàn bộ sức mạnh của mình.\
    \ Cách duy nhất để đánh bại cô ấy là giải mã bức tranh phức tạp và hỗn loạn này.\
    \ Hãy xác định những manh mối phù hợp và truy tìm vị ma pháp sư đang thao túng\
    \ mọi thứ."
Long:
  Name: Iizunamaru Megumu
  TrackName: Trận Pháp Giáng Sao
  Original: Trời Sao Đêm Trên Núi Tenma
  Comment: "Nhạc nền trong trận độc quyền khi đối đầu với Iizunamaru Megumu.\nTinh\
    \ hỏa liệu nguyên, nhưng cũng có thể trở thành một vũ khí lợi hại nhắm vào đối\
    \ thủ trong chớp mắt. Nếu lạc lối trong \"Pháp Trận Giáng Sao\" kỳ ảo này, nguy\
    \ hiểm sẽ bám theo bạn như hình với bóng. Khi ánh sao vụt tắt, cơ hội giải nguy\
    \ cũng như vậy. Trong khung cảnh rực rỡ và đầy màu sắc này, hãy mau tìm cho mình\
    \ lối thoát duy nhất!"
Tianzi:
  Name: Hinanawi Tenshi
  TrackName: Trận Pháp Kiếm Quang
  Original: Hữu Đỉnh Thiên Của Trẻ Thơ
  Comment: "Nhạc nền trong trận độc quyền khi đối đầu với Hinanawi Tenshi.\nThiên\
    \ tử hạ phàm, kiếm khí giáng chí. Một khí thế khai thiên tích địa, một tiếng vang\
    \ thạch phá thiên kinh. Một khi \"Pháp Trận Kiếm Quang\" được thiết lập, mọi điểm\
    \ yếu của đối thủ sẽ đều được phơi bày. Cùng với mặt đất rung chuyển, cô gái trẻ\
    \ này sẽ quét sạch tất cả những kẻ nào dám bất kính với mình."
Yuyuko:
  Name: Saigyouji Yuyuko
  TrackName: Trận Pháp Điệp Vũ
  Original: Hãy Nở Rộ Thật Duyên Dáng, Anh Đào Nhuộm Mực ~ Border of Life
