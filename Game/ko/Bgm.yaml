MainMenu:
  Name: 메인 메뉴
  TrackName: 환상의 열아홉번째 형태
  Original: 천년환상향 ~ History of the Moon
  Comment: "천년환상향을 기반으로 한 익스페리멘탈 일렉트로닉 음악입니다. 도입부와 후렴의 대비를 강조해 게임이 가볍고 유쾌하면서도 도전적이라는\
    \ 특징을 표현했습니다.\n'열아홉번째 형태'란, 이 노래가 저희가 만든 19번째 천년환상향 어레인지라는 뜻이며, 아직 이 곡이 지닌 여러가지\
    \ 가능성을 탐구하고 있습니다."
