line:05fe9e1: '"Lám itt van, Eirin Mester segédje. Engedd meg, hogy segítsek."'
line:08e2a8a: '"Kölcsön kértem Yorihimétől |Idunome| Kagura-csengőjét. Engedd hogy
  megtisztítson a szennytől."'
line:005d895: Annak ellenére hogy bűzölög a gyári adalékanyagoktól, a Holdfőváros
  génmódosított barackjai még mindig finomak.
line:0220408: '[Ima Elszavalás] Elveszt {0} életerőt, ad: két |{1}|.'
line:050b98e: A Kangura-csengő áldásával, {0} érzi hogy egy kis szenny elhagyja őt…
line:022c54a: '"Köszi!"'
line:015cd2b: '[Barack Elfogyasztása] Megnöveli a maximális életerőt {0} ponttal,
  ad egy Szerencsétlenséget: |{1}|.'
line:07b8cb5: '"Ha nem bánod, megeheted ezt a barackot amit hoztam. Egész édes."'
line:09c8a85: '"Túl jó az íze!"'
line:0c671d8: '[Elutasít] Semmi se történik.'
line:0b9590a: '"Egy ilyen kis problémát még csukott szemmel is megoldok~"'
line:0c46a1e: '"Azzal nincs baj. Csak Mester Eirinnel akarok én is találkozni."'
line:0b908c2: '"Köszi!"'
line:0c4ae27: '"Köszi!"'
line:0eb127d: '"Köszönöm szépen!"'
line:00ebbaa: '"Köszi!"'
line:0052cc6: '"Köszi!"'
line:07574a3: '"Ez mennyei. Miért nem kínáltál meg belőle, mikor a holdon jártam?"'
line:0cc6dc5: '"Ez nagyon finom volt! Bár akkor is megkóstolhattam volna, mikor a
  múltkor a holdon jártam!"'
line:0aeaa2e: '"Ez olyan ínycsiklandó! Haza kell vigyek a Nagyságos asszonyomnak belőle."'
line:0e687b1: '"Hűha—! Ez finom! Van még több!?"'
line:0b3c5dd: '"Annyira édes és zamatos~, igazán feldobott."'
line:07974a1: '"Nincs rá szükség. Ha már beleszólsz te is, mi haszna lenne a problémamegoldás
  mestereinek mint nekem?"'
line:0912025: '"Nem, köszönöm. Azok a dolgok, melyek túl jónak hangoznak hogy igazak
  legyenek, általában tényleg nem azok."'
line:0ebbfcf: '"Ez túl gyanús nekem... Kihagyom."'
line:087180e: '"A segítséged nélkül is a legerősebb vagyok! Nincs rá szükségem!"'
