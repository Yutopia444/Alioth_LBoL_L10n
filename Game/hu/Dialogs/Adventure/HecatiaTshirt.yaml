line:063a72b: „A kutatásom után rájöttem, hogy Kaguya kisasszony vendégszerető és
  más, mint a többi Holdlakó.”
line:008fa52: '"Gyerünk, támogassuk Kaguya-chant!"'
line:0678716: '[Ruha Elfogadása] Ad egy Kiállítási Tárgyat: |Bálvány Póló|.'
line:0ba9037: '"Ingyen? Hát akkor kérek egyet."'
line:0670be2: '"Ne felejtsd el felvenni, hogy mindenki lássa!"'
line:01566ec: '[Ruhacsere] Ad egy Kiállítási Tárgyat: |Bálvány Póló (Nagy)|.'
line:059fbd3: '"Ingyen? Hát akkor kérek egyet. És legyen nagy"'
line:0ba87b6: '"Ne felejtsd el felvenni, hogy mindenki lássa!"'
line:00d22b0: '[Elmegy] Semmi se tőrténik.'
line:0fc2c16: "\"{Censor:select false=\\\"Fúj, 'Kaguya-chan'. Milyen taszító.\\\"\
  \ true=\\\"Uff, a kinézeted épp eléggé fura volt—lehet jobb ha csak elfelejtjük\
  \ ezt az egészet.\\\"}\""
line:022c403: '"Azt mondja ingyen? Az asszonyom szuvenírje ez alkalommal kifejezetten
  egyedi lesz."'
line:0f24388: '"A legerősebbre varrt portékák ingyen is kéne legyenek."'
line:0a28c4c: '"Micsoda lehetőség—add ide a nagyot!"'
line:0c1968a: '"Hazaviszem Meilingnek szuvenírképp. Nyújtsa át a nagyobbat kérem."'
line:0e45c03: '"Természetesen a legnagyobbat választom!"'
line:0a99c1c: '"Hát, elviszem ezt a nagyot! Jól néz ki!"'
line:055f5d6: '"Úgy néz ki hogy rongynak is alig lehetne használni."'
line:0bd1ffa: '"A jég elolvad ha feketébe öltözök…"'
line:00a6aad: '"Fú—Ez~ nem is~ cuki~ egyáltalán!"'
line:062b5d5: "\"Ingyé'? Tehát kölcsön vehetem anélkül hogy visszahoznám, ugye?\""
line:00d286e: '"Semmit se kell fizessek? Ma este ebbe öltöztetem fel a nővérkém."'
