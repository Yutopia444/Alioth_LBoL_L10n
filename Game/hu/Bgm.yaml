MainMenu:
  TrackName: A fantázia tizenkilencedik formája
  Name: Főmenü
  Comment: "Kísérleti elektronikus zene, amely a Millennium Gensokyo témája alapján\
    \ készült. Hangsúlyozza a bevezető és a refrén közötti kontrasztot, tükrözve a\
    \ játék kettős természetét, ami egyszerre könnyed és akciódús.\nValamint a \"\
    tizenkilencedik formát\" illetően, ez a tizenkilencedik Millennium Gensokyo feldolgozás,\
    \ ami a mi tollunkból ered, és továbbra is vizsgáljuk ebben a zeneműben rejlő\
    \ különféle lehetőségeket."
  Original: Gensokyo Millenium ~ History of the Moon
Stage1:
  Name: '1. Szín: Az elveszettek bambuszerdeje'
  TrackName: Éjszakai hajsza
  Original: Büntetés az örök éjszakáért ~ Imperishable Night
  Comment: "Az Elveszettek bambuszerdejének főcímdala, az első szín első háttérzenéje.\n\
    Az egész darabról leró a csata izgalma, ami felkészíti a játékost a harcra.\n\
    Ugyanakkor madárdalszerű motívumokkal fokozza az éjszakai hangulatot a zenében."
Stage2:
  Name: '2. Szín: Genbu szurdok'
  TrackName: Felfedezés és a felfedező
  Original: Fall of Fall ~ Őszi vízesés
  Comment: "A Ganbu szurdok főcímdala, a második szín háttérzenéje.\nEz egy kalandos\
    \ darab, amely a rejtélyt és az ismeretlent dolgozza fel. Az ütemét főképp a sámándob,\
    \ és az ütőgardon adja így a játékos egy ismeretlen környezetben érezheti magát."
Stage3:
  Name: '3. Szín: A szélisten tava'
  TrackName: Szellő hátán, halhatatlanok nyomában
  Original: Japán ősi tájképe, amit a lány hajdan látott
  Comment: "A Szélisten tavának főcímdala, a harmadik szín háttérzenéje.\nA zene olyan,\
    \ mint a szélben táncoló falevél, és azt az érzést kelti, mintha az ellenfeled\
    \ valóban előtted lenne. Hadd csatázzunk a levegőben erre a zenére!"
Shop:
  Original: Szélhámos Technológia
  Name: Takane boltja
  TrackName: Erdei pihenő
  Comment: "Ez egy olyan mű, ami megragadja a hétvégi hangulatot.\nNe veszekedjetek!\
    \ Lazítsunk együtt!"
Gap:
  Name: Résen belül
  TrackName: Noktürn
  Original: Nekrofantázia
