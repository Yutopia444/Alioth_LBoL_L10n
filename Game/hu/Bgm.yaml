MainMenu:
  TrackName: A fantázia tizenkilencedik formája
  Name: Főmenü
  Comment: "Kísérleti elektronikus zene, amely a Millennium Gensokyo témája alapján\
    \ készült. Hangsúlyozza a bevezető és a refrén közötti kontrasztot, tükrözve a\
    \ játék kettős természetét, ami egyszerre könnyed és akciódús.\nValamint a \"\
    tizenkilencedik formát\" illetően, ez a tizenkilencedik Millennium Gensokyo feldolgozás,\
    \ ami a mi tollunkból ered, és továbbra is vizsgáljuk ebben a zeneműben rejlő\
    \ különféle lehetőségeket."
  Original: Gensokyo Millenium ~ History of the Moon
Stage1:
  Name: '1. Szín: Az elveszettek bambuszerdeje'
  TrackName: Éjszakai hajsza
  Original: Büntetés az örök éjszakáért ~ Imperishable Night
  Comment: "Az Elveszettek bambuszerdejének főcímdala, az első szín első háttérzenéje.\n\
    Az egész darabról leró a csata izgalma, ami felkészíti a játékost a harcra.\n\
    Ugyanakkor madárdalszerű motívumokkal fokozza az éjszakai hangulatot a zenében."
Stage2:
  Name: '2. Szín: Genbu szurdok'
  TrackName: Felfedezés és a felfedező
  Original: Fall of Fall ~ Őszi vízesés
  Comment: "A Ganbu szurdok főcímdala, a második szín háttérzenéje.\nEz egy kalandos\
    \ darab, amely a rejtélyt és az ismeretlent dolgozza fel. Az ütemét főképp a sámándob,\
    \ és az ütőgardon adja így a játékos egy ismeretlen környezetben érezheti magát."
Stage3:
  Name: '3. Szín: A szélisten tava'
  TrackName: Szellő hátán, halhatatlanok nyomában
  Original: Japán ősi tájképe, amit a lány hajdan látott
  Comment: "A Szélisten tavának főcímdala, a harmadik szín háttérzenéje.\nA zene olyan,\
    \ mint a szélben táncoló falevél, és azt az érzést kelti, mintha az ellenfeled\
    \ valóban előtted lenne. Hadd csatázzunk a levegőben erre a zenére!"
Shop:
  Original: Szélhámos Technológia
  Name: Takane boltja
  TrackName: Erdei pihenő
  Comment: "Ez egy olyan mű, ami megragadja a hétvégi hangulatot.\nNe veszekedjetek!\
    \ Lazítsunk együtt!"
Gap:
  Name: Résen belül
  TrackName: Noktürn
  Original: Nekrofantázia
  Comment: "Ez egy európai stílusú zene.\nElegáns csembalóval és békés harangjátékkal\
    \ egy mélyen nyugtató légkört ad át, mely megoldja, hogy egy kiérdemelt pihenés\
    \ után sóvárogj."
Adventure1:
  Name: Első esemény
  TrackName: Útra Fel
  Original: Gensokyo Millennium ~ History of the Moon
  Comment: "Ez egy vidám, narratív darab.\nÍr sípokkal, marimbával és különféle ütőhangszerekkel\
    \ egyidejűleg játszva, az összefonódó dallamvonalak kalandvágyat keltenek, átfogva\
    \ egy utazó csodaérzetét, aki a hegyekből készül leereszkedni és felfedezni a\
    \ világot."
Adventure2:
  Name: Második esemény
  TrackName: Játék az Erdőben
  Original: Az Istenek Szerette Gensokyo
  Comment: "Ez egy olyan zenemű, amely ellazult és pozitív érzéseket fejez ki.\nA\
    \ bevezetőben a zongora a nyugalom érzetét kelti az erdőben, míg a hegedű vidám\
    \ hangokat játszik fő dallamként, gondtalan játék látszatát teremtve az erdőben."
Adventure3:
  Name: Harmadik esemény
  TrackName: Hátrahagyva
  Original: Lányok Titkos Pecsételő Klubja
  Comment: "Ezt a zenét a szerző emós korszakából emeltük ki.\nTalán pontosabb leírása\
    \ lenne az \"OTZ\" emotikon?"
Elite1:
  Name: Első Elit
  TrackName: Ne Becsüld Alá
  Original: Örök Átmeneti Uralom
  Comment: "Ez egy olyan zene, ami egy elit ellenfél ellen játszódik.\nAz erőteljes\
    \ ritmus emlékeztet hogy egy nagyszerű csata kezdődik. Biztos vagy a győzelemben?"
Elite2:
  Name: Második Elit
  TrackName: Párbaj
  Original: Avīci harangja ~ Infinite Nightmare
  Comment: "Ez egy olyan zene, ami egy elit ellenfél ellen játszódik.\nAz erőteljes\
    \ ritmus átveszi a csata izgalmát––ha a játékos nem ad bele mindent, seperc alatt\
    \ legyőzik őt!"
Sanyue:
  Name: Három Fénytündér
  TrackName: Kiváncsi – Éber – Csintalan
  Original: Refrén a Bájos Nagyszerű Háborúból / Nagyszerű Tündérháború ~ Fairy Wars
  Comment: "Ez a karakterspecifikus csatatémája a Három Fénytündérnek.\nA párbajok\
    \ már rég időtmúltak, a barátság valódi definíciója a három az egy ellen! Halkan\
    \ osonj oda, alig hagyva nyomot. Türelmetlen vagy? Biztos hát! Had kezdődjön a\
    \ büszke teljháború!"
Aya:
  Name: Shameimaru Aya
  TrackName: Egy elhamarkodott történet
  Original: Youkai hegység ~ Mysterious Mountain
  Comment: "Ez a karakterspecifikus csatatémája Shameimaru Ayának.\nAkármerre fúj\
    \ a szél, azt a fényképezőgép kattogása követi. Igazság és hamisság, helyes és\
    \ helytelen, valóság és kitaláció mind utat talál az újságok lapjaira, elzavarva\
    \ a délutánok unalmát. De ha közelebbről megnézed, nem találsz mást csak bebizonyítatlan\
    \ pletykákat és sóhajtozol, \"Tipikus újságírói színvonal\"."
Rin:
  Name: Kaenbyou Rin
  TrackName: Lélek közvetítő
  Original: Hullautazás ~ Be of good cheer!
  Comment: "Ez a karakterspecifikus csatatémája Kaenbyou Rinnek.\nNem szívesen látott\
    \ youkai, árnyak közé bújva, várja az alkalmat. Szóval, ha téged célzott be, jobb\
    \ ha vigyázol. Mikor bosszús lelkek szorítanak sarokba, nincs más választásod,\
    \ szembe kell állni velük. \nTODO"
