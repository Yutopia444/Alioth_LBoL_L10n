Stage1:
  Name: 'Akt 1: Bambuswald der Verirrten'
  TrackName: Jäger der Nacht
  Original: Retribution for the Eternal Night ~ Imperishable Night
  Comment: "Titelsong zu Bambuswald der Verirrten, das Lied des ersten Levels.\nDieses\
    \ Werk ist gefüllt mit der Aufregung des Gefechts, um den Spieler auf die bevorstehenden\
    \ Kämpfe vorzubereiten.\nEs enthält zudem Geräusche, die an Vogelgesang erinnern,\
    \ um die nächtliche Atmosphäre des Liedes hervorzuheben."
MainMenu:
  Name: Hauptmenü
  Original: Gensokyo Millennium ~ History of the Moon
  TrackName: Die neunzehnte Form der Fantasie
  Comment: "Experimentelle elektronische Musik, inspiriert durch \"Gensokyo Millennium\"\
    . Diese Komposition hebt den Kontrast zwischen dem Intro und dem Chorus hervor\
    \ und enthüllt die unbeschwerte, aber dennoch spannende Natur des Spiels.\nBezüglich\
    \ der Beschreibung von \"Die neunzehnte Form\": Das ist unser neunzehntes Werk\
    \ von \"Gensokyo Millennium\" und wir werden auch weiterhin die verschiedenen\
    \ Möglichkeiten dieses Liedes erkunden."
Stage2:
  Name: 'Akt 2: Genbu-Schlucht'
  TrackName: Discovery & Discoverer
  Original: Fall of Fall ~ Autumnal Waterfall
Stage3:
  Name: 'Akt 3: See des Windgottes'
  Original: The Primal Scene of Japan the Girl Saw
  Comment: "Titelsong zu See des Windgottes, das Lied des dritten Levels.\nDieses\
    \ Werk gleitet mit dem Wind dahin. Es fühlt sich so an, als sei das Danmaku ganz\
    \ in der Nähe, nicht wahr? Lasst uns zu diesem Lied im bevorstehenden Kampf tanzen!"
Shop:
  Name: Takanes Laden
  TrackName: Eine Auszeit im Wald
  Original: Banditry Technology
  Comment: "Ein Lied, dass die entspannte Atmosphäre eines freien Tages versprüht.\n\
    Stoppt eure Konflikte und lasst uns diesen Moment gemeinsam genießen!"
Gap:
  Name: Innerhalb einer Spalte
  TrackName: Nächtliche Melodie
  Original: Necrofantasia
  Comment: "Ein Song im europäischen Stil.\nDas elegante Cembalo und ein ruhiges Glockenspiel\
    \ sorgen dafür, dass man sich sehr entspannt fühlt und Lust auf eine Auszeit bekommt."
Adventure2:
  Original: The Gensokyo the Gods Loved
  TrackName: Im Wald spielen
  Name: Event 2
  Comment: "Ein Lied, dass ein unbeschwertes und positives Gefühl vermittelt.\nDas\
    \ einleitende Piano erweckt die ruhige Atmosphäre eines Waldes, in Kombination\
    \ mit der heiteren Violine bildet sich daraus die Hauptmelodie und erschafft so\
    \ ein lebhaftes Bild eines sorgenfreien Spiels im Wald."
Adventure3:
  TrackName: Zurückgelassen
  Name: Event 3
  Original: Girls' Secret Sealing Club
  Comment: "Dieses Lied wurde geschrieben, als sich der Komponist in einer emotionalen\
    \ Phase befand.\nVielleicht fängt das Emote \"orz\" die Stimmung am besten ein?"
Elite1:
  TrackName: Nicht zu unterschätzen
  Original: Eternal Transient Reign
  Name: Elite 1
  Comment: "Dieses Lied erklingt, sobald ein Elitefeind erscheint.\nDer intensive\
    \ Rhythmus dient als Erinnerung, dass ein großer Kampf bevorsteht. Fühlst du dich\
    \ siegessicher?"
Sanyue:
  Name: Drei Feen des Lichts
  Original: Great Fairy Wars ~ The Refrain of the Lovely Great War
  TrackName: Neugierig · Vorsichtig · Listig
  Comment: "Die charakterspezifische Kampfmusik von den Drei Feen des Lichts.\n1-gegen-1\
    \ Kämpfe sind längst veraltet; 3-gegen-1 wiederum ist die wahre Definition von\
    \ Freundschaft. Schleiche dich lautlos an, ohne auch nur eine Spur zu hinterlassen.\
    \ Wirst du schon ungeduldig? Darauf kannst du wetten! Jetzt können wir voller\
    \ Stolz einen Krieg im vollen Umfang entfachen!"
Rin:
  Name: Rin Kaenbyou
  Original: Corpse Voyage ~ Be of good cheer!
  TrackName: Medium
  Comment: "Die charakterspezifische Kampfmusik von Rin Kaenbyou.\nUnerwünschte Youkai\
    \ lauern in den Schatten und warten auf ihre Chance. Du solltest auf der Hut sein,\
    \ falls du ins Visier genommen wurdest. Wenn sich die rachsüchtigen Geister annähern,\
    \ bleibt dir nichts anderes übrig, als dich ihnen zu stellen. Wird sie ihrem Ruf\
    \ als 'Höllischer Verkehrsunfall' gerecht?"
Nitori:
  Name: Nitori Kawashiro
  TrackName: in the blue
  Original: Akutagawa Ryuunosuke's "Kappa" ~ Candid Friend
  Comment: "Die charakterspezifische Kampfmusik von Nitori Kawashiro.\nDu wirst vielleicht\
    \ beim ersten Mal davonkommen, oder sogar beim zweiten Mal, doch ganz gewiss kein\
    \ drittes Mal. Bei der nächsten Begegnung mit ihr solltest du auf der Hut sein.\
    \ Es fängt ganz harmlos mit Luftblasen an, sie wird allerdings im Handumdrehen\
    \ deine Welt auf den Kopf stellen!"
Youmu:
  Name: Youmu Konpaku
  TrackName: Schwung der Klinge
  Original: Eastern Ghostly Dream ~ Ancient Temple
  Comment: "Die charakterspezifische Kampfmusik von Youmu Konpaku.\nJede Note ist\
    \ wie eine scharfe Klinge, die sich durch den Himmel, die Erde und alles andere\
    \ schneidet. Sobald die Schwertformation erscheint, gibt es kein Entkommen mehr.\
    \ Möglicherweise ist das sogar die Sinfonie der Schwerter. (Haha)"
Kokoro:
  Original: The Lost Emotion
  Name: Hata no Kokoro
  TrackName: Ǝmotioɲ
Clownpiece:
  TrackName: Chaotic paradise
  Original: Pierrot of The Star-Spangled Banner
  Name: Clownpiece
  Comment: "Die charakterspezifische Kampfmusik von Clownpiece.\nDas Chaos aus der\
    \ Hölle ist ihr Geschenk an die Menschheit und die Verwandlung der Mondhauptstadt\
    \ in ein chaotisches Paradies ihre wichtigste Aufgabe. Dir bleibt noch genug Zeit,\
    \ um zu fliehen, bevor du in diesen Vorfall verwickelt wirst. 3, 2, 1 … die Zeit\
    \ ist um!"
Siji:
  Name: Eiki Shiki
  TrackName: THe last judgment
  Original: Eastern Judgement in the Sixtieth Year ~ Fate of Sixty Years
  Comment: "Die charakterspezifische Kampfmusik von Eiki Shiki.\nDas letzte Urteil\
    \ steht bevor. Bekenne vor dem Richter deine Sünden und gewähre jedem die Chance,\
    \ Einspruch einzulegen. Kämpfe für deine Freiheit oder büße für deine Sünden in\
    \ der Hölle."
Doremy:
  Name: Doremy
  TrackName: Close eyes
  Original: Eternal Spring Dream
  Comment: "Die charakterspezifische Kampfmusik von Doremy Sweet.\nSchließe deine\
    \ Augen und lasse dich in einen Traum treiben, um dich darin zu verlieren und\
    \ nicht mehr wieder aufzuwachen. Dieser Traum ist frei von Unreinheiten und besitzt\
    \ eine etablierte Ordnung, das Leben dort schwindet dahin."
Reimu:
  Name: Reimu Hakurei
  Original: Maiden's Capriccio ~ Dream Battle
  TrackName: Formation des Geistersiegels
  Comment: "Die charakterspezifische Kampfmusik von Reimu Hakurei.\nAm Anfang eines\
    \ Abenteuers wartet sie, wie sonst auch, auf neue Herausforderer. Die ewige Formation\
    \ des Geistersiegels, zusammen mit ihrer Ordnung und den zeitlosen Regeln, bilden\
    \ eine unüberwindbare Barriere. Nur wenn du diese Prüfung bestehst, wird sie dich\
    \ anerkennen und dich weiterziehen lassen."
Marisa:
  Name: Marisa Kirisame
  Original: Love-Colored Master Spark
  TrackName: Formation der Magie
  Comment: "Die charakterspezifische Kampfmusik von Marisa Kirisame.\nDie berühmt-berüchtigte\
    \ Magierin ist eingetroffen und verspricht ein glanzvolles Spektakel. Der stille\
    \ Nachthimmel wird aufleben und Funken werden wie Sternenlicht strahlen, sobald\
    \ sie ihr Mini-Hakkero verwendet. Es entsteht ein atemberaubender Moment, bei\
    \ dem Licht und Klang zusammenlaufen."
Sakuya:
  Original: Flowering Night
  Name: Sakuya Izayoi
  TrackName: Formation der gestoppten Zeit
  Comment: "Die charakterspezifische Kampfmusik von Sakuya Izayoi.\nEin Moment der\
    \ Stille! In einer Welt jenseits der Zeit ist jede Bewegung innerhalb der Reichweite\
    \ ihres Herrschers. Ordne die Messer perfekt an, mit der Spitze auf den Feind\
    \ gerichtet, und schnippe mit dem Finger! Setze den Lauf der Zeit fort und stelle\
    \ alles auf den Kopf."
Cirno:
  Name: Cirno
  Original: Tomboyish Girl in Love
  TrackName: Formation des Eises
  Comment: "Die charakterspezifische Kampfmusik von Cirno.\nEgal zu welcher Jahreszeit,\
    \ ob bei Tag oder Nacht, die Kälte bleibt zeitlos. Unterschätze sie nicht, nur\
    \ weil sie noch ein Kind ist; ihre kindischen Streiche können dir schnell zu schaffen\
    \ machen. Wenn du nicht aufpasst und du dich in die eisige Ecke drängen lässt,\
    \ wird dir dein Schicksal durch die Finger gleiten … und die Gefahr wird nicht\
    \ lange auf sich warten lassen."
Koishi:
  Original: Last Remote
  Name: Koishi Komeiji
  TrackName: Folge deinem Herzen
  Comment: "Die charakterspezifische Kampfmusik von Koishi Komeiji.\nAufrichtig, ohne\
    \ sich durch unüberlegte Impulse leiten zu lassen. Sie teilt dabei ihre wahrhaftigsten\
    \ Gefühle, die dich zusammen mit unbekannten Träumen überschwemmen. Nur die Stärksten\
    \ können sich ihrem inneren Selbst stellen und verhindern, dass ihre Schwachstellen\
    \ ausgenutzt werden!"
Alice:
  Name: Alice
  Original: Doll Judgement ~ The Girl Who Played with People's Shapes
  TrackName: Formation der Puppen
  Comment: "Die charakterspezifische Kampfmusik von Alice.\nFür sie ist der Sieg bereits\
    \ sicher, sobald die durch Magie kontrollierten Puppen vom Himmel herabsteigen\
    \ und alle Feinde umzingeln. Der Widerstand ihrer Feinde ist nur möglich, weil\
    \ sie ihre volle Kraft noch nicht eingesetzt hat. Sie kann nur geschlagen werden,\
    \ wenn ihr chaotisches und verwirrendes Netz aus Schnüren entschlüsselt wird.\
    \ Finde den entscheidenden Hinweis und spüre die Magierin auf, die alle Fäden\
    \ in der Hand hält."
Tianzi:
  Original: Bhavaagra As Seen Through a Child's Mind
  Name: Tenshi Hinanawi
  TrackName: Formation der schimmernden Klinge
Yuyuko:
  Name: Yuyuko Saigyouji
  TrackName: Formation des Schmetterlingstanzes
  Original: Bloom Nobly, Ink-Black Cherry Blossom ~ Border of Life
  Comment: "Die charakterspezifische Kampfmusik von Yuyuko Saigyouji.\nEine elegante,\
    \ klassische Melodie liegt in der Luft, Geister und Schmetterlinge nähern sich\
    \ an und bilden einen Kreis. Solltest du versuchen, einen Blick durch das Tor\
    \ der Unterwelt zu erhaschen, sei vorsichtig und gerate nicht in das Reich der\
    \ Toten. Die Formation des Schmetterlingstanzes ist ruhig eingestellt, der Aufruhr\
    \ kommt sofort zum Stillstand und hinterlässt Kirschblüten in voller Blüte, sowie\
    \ die Seelen der Verstorbenen."
Remilia:
  Original: Septette for a Dead Princess
  Name: Remilia
  TrackName: Scharlachrote Formation
  Comment: "Die charakterspezifische Kampfmusik von Remilia Scarlet.\nEine Einladung\
    \ von der Herrscherin der scharlachroten Teufelsvilla, wieso nimmst du nicht Platz\
    \ und genießt eine Tasse Tee?\nNatürlicherweise passt nur ein wilder, pulsierender\
    \ Rhythmus zu den scharlachroten Wirbeln in der Luft. Aber sei vorsichtig, ehe\
    \ du dich versiehst, wirst du von der scharlachroten Formation verschlungen."
Sanae:
  Name: Sanae Kochiya
  Original: Faith is for the Transient People
  TrackName: Formation der Windpriesterin
  Comment: "Die charakterspezifische Kampfmusik von Sanae Kochiya.\nBeschwöre den\
    \ Wind herbei! Und kämpft! Tanze zum Rhythmus der elektronischen Musik und ehe\
    \ du dich versiehst, nimmt die Formation der Windpriesterin Gestalt an. Bewohner\
    \ von Gensokyo, haltet an eurem Glauben fest und wartet darauf, dass der Gott\
    \ des Windes euch ein Wunder bringt."
Junko:
  Name: Junko
  Original: Pure Furies ~ Whereabouts of the Heart
  TrackName: Formation der mörderischen Intentionen
  Comment: "Die charakterspezifische Kampfmusik von Junko.\nDer Groll verwandelt sich\
    \ in eine blinde Hingabe nach mehr Macht und schwört, jeden Feind erbarmungslos\
    \ zu verschlingen. Gefangen in der Formation der mörderischen Intentionen treibt\
    \ die rasende Musik den Kampf an den Rand des Wahnsinns. Sieg oder Niederlage,\
    \ es steht alles auf dem Spiel."
Stage4:
  TrackName: Der Weg zum Mittelpunkt
  Original: The Exaggerated Castle Keep
  Name: 'Finaler Akt: Himmel über dem See des Windgottes'
  Comment: "Die Titelmusik für den finalen Akt.\nDer stärkste Feind steht im Zentrum\
    \ der Welt, alle Wege führen dorthin. Einst ein unberührter Ort, jedoch …"
Seija:
  Name: Seija Kijin
  Original: Romantic Escape Flight
  TrackName: Gesellschaftlicher Aufruhr und finaler Stillstand
Fail:
  Original: The Venerable Ancient Battlefield ~ Suwa Foughten Field
  TrackName: Niederlage
  Name: Niederlage
Victory:
  Name: Sieg
  TrackName: Sieg
  Original: Gensokyo Millennium ~ History of the Moon
VictoryLong:
  Name: Sieg (erweiterte Version)
  TrackName: Sieg (erweiterte Version)
  Original: Gensokyo Millennium ~ History of the Moon
Adventure1:
  Name: Event 1
  Original: Gensokyo Millennium ~ History of the Moon
  TrackName: Aufbruch
  Comment: "Ein fröhliches, erzählerisches Lied.\nEs beinhaltet die Tin Whistle, eine\
    \ Marimba und eine Vielzahl an Schlaginstrumenten, die im Einklang zusammenspielen.\
    \ Die ineinandergreifenden Melodien erzeugen ein Gefühl der Aufregung, ähnlich\
    \ wie bei einem Abenteurer, der sich auf seine Reise um die Welt vorbereitet."
Elite2:
  Name: Elite 2
  Original: Bell of Avīci ~ Infinite Nightmare
  TrackName: Konfrontation
  Comment: "Dieses Lied erklingt, sobald ein Elitefeind erscheint.\nDer intensive\
    \ Rhythmus gibt die Spannung und den Nervenkitzel des Kampfes wieder. Wenn der\
    \ Spieler nicht alles gibt, wird er hier den Kürzeren ziehen!"
Aya:
  Original: Youkai Mountain ~ Mysterious Mountain
  Name: Aya Shameimaru
  TrackName: Schnelle Story
  Comment: "Die charakterspezifische Kampfmusik von Aya Shameimaru.\nWo auch immer\
    \ der Wind weht, ist das Geräusch einer Kamera nicht weit entfernt. Wahrheit und\
    \ Lüge, Recht und Unrecht, Realität und Fiktion — sie alle finden ihren Weg in\
    \ die Zeitung, um die Langeweile am Nachmittag zu vertreiben. Wenn du aber genauer\
    \ hinschaust, wirst du erkennen, dass das meiste davon unbestätigte Gerüchte sind,\
    \ worauf man nur ein seufzendes \"Typisch Journalismus!\" herausbekommt."
Long:
  Original: Starry Mountain of Tenma
  Name: Megumu Iizunamaru
  TrackName: Formation des gefallenen Sterns
