Remilia:
  Original: Septette for a Dead Princess
  Name: Remilia
  TrackName: Scharlachrote Formation
  Comment: "Die charakterspezifische Kampfmusik von Remilia Scarlet.\nEine Einladung\
    \ von der Herrscherin der scharlachroten Teufelsvilla, wieso nimmst du nicht Platz\
    \ und genießt eine Tasse Tee?\nNatürlicherweise passt nur ein wilder, pulsierender\
    \ Rhythmus zu den scharlachroten Wirbeln in der Luft. Aber sei vorsichtig, ehe\
    \ du dich versiehst, wirst du von der scharlachroten Formation verschlungen."
