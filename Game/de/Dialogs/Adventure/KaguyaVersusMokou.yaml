line:008a9a4: '[Hilf Kaguya] Verliere {0} Leben, erhalte Ausstellungsstück: |{1}|.'
line:0848d98: "\"Hört auf zu streiten! {Censor:select false=\\\"Nentendos 'Ultimate\
  \ Mariso: Galaxy' macht wirklich viel Spaß\\\" true=\\\"Digitale Spiele konnte ich\
  \ mir nie ausleihen, da es davon keine CDs gab\\\"}!\""
line:09d8d02: '[Fortsetzen]'
line:0d3703c: '[Hilf Mokou] Verliere {0} Leben, erhalte Ausstellungsstück: |{1}|.'
line:015db7a: '"Hmpf, es ist noch nicht vorbei!"'
line:0460217: '[Fortsetzen]'
line:0db14e0: '[Vorbeilaufen] Nichts passiert.'
line:04ceb26: "\"{Censor:select false=\\\"'Game Girl Advance' ist die beste Handheld-Konsole!\
  \ Ich lasse nicht zu, dass du so schlecht über 'Nentendo' redest\\\" true=\\\"Du\
  \ wagst es, dich als Gamer zu bezeichnen, obwohl du noch nie eine Spielkassette\
  \ besessen hast? Ich lasse nicht zu, dass ein Bücherwurm wie du unsere Reputation\
  \ in den Dreck zieht\\\"}!\""
line:0bc6368: (Ich habe keine Ahnung worüber die beiden streiten, aber wenn der Kampf
  weiter anhält, könnte der Dieb das Chaos nutzen, um zu flüchten.)
line:06b80ce: "\"{Censor:select false=\\\"Ein Unternehmen, das nicht einmal das Konzept\
  \ des 'Metaverse' versteht? Die sind so lausig wie deine Ausstellungsstücke\\\"\
  \ true=\\\"Wer hortet heutzutage noch Produkte bei sich zuhause, die nicht einmal\
  \ feuerfest sind? Genau wie du ist deine Expo einfach nicht mehr zeitgemäß\\\"}!\""
line:02e8c97: '"Hört auf zu streiten! {Censor:select false=\"Ich habe gehört, dass
  Nentendo ein Strategiespiel hat, bei dem es um Feuer geht\" true=\"Lokale Geschäfte
  wie das Kourindou geraten in eine wirtschaftliche Krise, wenn keiner mehr CDs kauft\"}!"'
line:093aa03: "\"Hört bitte auf! {Censor:select false=\\\"Meine Herrin spielt auch\
  \ gerne 'Scarletvania: Symphony of the Devil' auf dieser Konsole\\\" true=\\\"Ihr\
  \ könnt eine Spielkonsole gewinnen, wenn ihr zusammen mit meiner Herrin spielt\\\
  \"}!\""
line:07ab6fd: '{0} versucht die beiden gewaltsam zu trennen — nachdem einige Hiebe
  von Mokou geblockt wurden, konnte Kaguya die Oberhand gewinnen.'
line:0921fbf: '"Tsk, hör auf dich einzumischen, {0} …"'
line:04fec24: '{0} versucht die beiden gewaltsam zu trennen — in dem ganzen Chaos
  schafft es Mokou, die Oberhand zu gewinnen.'
line:0f73a43: '"Es gibt keinen Grund zu streiten! {Censor:select false=\"Ich habe
  gehört, dass man durch die ''Moneyverse-Technologie'' reich werden kann\" true=\"Nicht
  einmal Rinnosuke besitzt so viele CDs\"}!"'
line:0219773: '"{0}, bitte akzeptiere das als Zeichen meiner Dankbarkeit! Ich zähle
  darauf, dass du diesen Vorfall lösen wirst."'
line:0a72879: '"Ich wollte nur schauen, ob die Exposition so gut ist wie du behauptest!
  Es war aber genauso schlecht, wie ich es mir vorgestellt habe!"'
line:01185cd: '"Ich lasse die beiden lieber alleine …"'
line:0e1beb9: "\"Es gibt keinen Grund zu kämpfen! Ich habe gehört, dass {Censor:select\
  \ false=\\\"alles im 'Moneyverse' nicht austauschbar ist\\\" true=\\\"man durch\
  \ die Registrierung für die digitale Version früher auf das Spiel zugreifen kann\\\
  \"}!\""
line:0500ae3: "\"Bitte hört auf! {Censor:select false=\\\"Ich habe im heutigen Wirtschaftsblatt\
  \ gelesen, dass das 'Moneyverse' die traditionellen Expositionen stärken kann\\\"\
  \ true=\\\"Kassetten zu sortieren ist wirklich mühselig\\\"}!\""
line:0c1db12: '"Sieht so aus, als wäre {0} meiner Meinung. Als Gleichgesinnte überlasse
  ich dir ein kleines Geschenk als Dank."'
line:0677c42: '"Du sagst das zwar, aber warum fragst du mich dann, ob {Censor:select
  false=''die Spielkonsolen von Rinnosuke auch ausgestellt wurden'' true=''das Verpackungsdesign
  des neuen Spiels süß aussieht''}?"'
