line:094a004: '"Wie kannst du nur so wohltätig sein?! Deine Großzügigkeit macht mich
  wirklich neidisch!"'
line:0b15c0b: "\"Wer's findet, darf's behalten~\""
line:00e3d78: '"Wieso findet jeder so einfach Ausstellungsstücke? Das macht mich wirklich
  neidisch."'
line:0eea103: '"Einen Moment, ich habe keine Verwendung für |{0}|, du kannst es gerne
  haben."'
line:0724a11: '[Fund überlassen] Verliere Ausstellungsstück: |{0}|.'
line:0d0c814: '"Du würdest mir das verfluchte |{0}| überlassen? In diesem Fall verzeihe
  ich dir~"'
line:0d2e77f: '"Puh, alles klar. Aber warum sind deine Augen noch so grün vor Neid?"'
line:0640b79: '"Oh, du brauchst |{0}|? Nimm es ruhig."'
line:0003aa9: '"Einen Moment bitte … Ich habe noch |{0}| übrig, tu dir keinen Zwang
  an wenn du es brauchst."'
line:0f52646: '"Wie, du möchtest |{0}| haben? Ich habe gute Laune, daher überlasse
  ich es dir."'
line:00dc681: '"Hmm … Ich wollte es in erster Linie sowieso nicht. Hier, du kannst
  es gerne haben."'
line:0a0da16: '"Was für ein Pech, es ist bereits Teil meiner Sammlung."'
line:0155b90: '"Das gehört mir! Ich werde es dir nicht überlassen!"'
line:07cb2be: '"Du warst einfach etwas zu langsam. Ich bin nun mal sehr zuversichtlich
  in meine Geschwindigkeit."'
line:0257156: '"Auf keinen Fall~ Wieso fischt du dir nicht ein eigenes?"'
line:0ed1f87: '"Manchmal ist es schön, einfach über nichts nachzudenken~"'
