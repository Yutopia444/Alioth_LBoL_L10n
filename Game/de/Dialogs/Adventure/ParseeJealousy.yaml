line:0557dad: '[Mitnehmen] Erhalte ein zufälliges Ausstellungsstück.'
line:0dc3dde: Ein verdächtiges Geräusch kommt aus dem Bambuswald …
line:03c49f5: '[Nichts geben] Erhalte Unglück: |{0}|.'
line:0340a4c: '{0} sieht ein Ausstellungsstück im Wasser treiben. Soll es geborgen
