line:0220408: '[Gebet sprechen] Verliere {0} maximales Leben, erhalte zwei |{1}|.'
line:022c54a: '"Danke!"'
line:015cd2b: '[Pfirsich essen] Erhalte {0} maximales Leben und Unglück: |{1}|.'
line:09c8a85: '"Es schmeckt viel zu gut!"'
line:0c671d8: '[Ablehnen] Nichts passiert.'
line:0b9590a: '"Ich kann einen kleinen Vorfall wie diesen mit geschlossenen Augen
  lösen~"'
line:005d895: Obwohl sie nach industriellen Zusatzstoffen riechen, schmecken die genmodifizierten
  Pfirsiche der Mondhauptstadt dennoch sehr gut.
line:0c46a1e: '"Schon in Ordnung. Ich bin nur hier, um Meisterin Eirin einzuholen."'
line:05fe9e1: '"Hier steckst du also, Assistentin von Meisterin Eirin. Erlaube mir,
  dich zu unterstützen."'
line:07b8cb5: '"Wenn du möchtest, kannst du diesen Pfirsich essen, den ich mitgebracht
  habe. Er ist ziemlich süß."'
line:050b98e: Durch den Segen der Kagura-Glocke fühlt {0}, wie ein kleiner Teil ihrer
  Unreinheiten verschwindet …
line:08e2a8a: '"Yorihime hat mir die Kagura-Glocke von |Izunome| geliehen. Ihr Klang
  kann deine Unreinheiten beseitigen."'
line:0c4ae27: '"Danke!"'
line:0eb127d: '"Danke!"'
line:00ebbaa: '"Danke!"'
line:0052cc6: '"Danke!"'
line:0b908c2: '"Danke!"'
line:0e687b1: '"Wow! Das schmeckt so gut! Gibt es mehr davon!?"'
line:0aeaa2e: '"Das ist sehr lecker! Ich muss meiner Herrin ein paar davon mitbringen."'
line:07574a3: '"Das ist wirklich lecker. Warum hast du mir damals auf dem Mond keine
  angeboten?"'
line:0cc6dc5: '"Das hat wirklich gut geschmeckt! Ich wünschte, ich hätte bei meinem
  letzten Besuch auf dem Mond schon welche gegessen!"'
line:0b3c5dd: '"So süß und lecker~ Das macht mich ganz munter."'
line:0912025: '"Nein danke. Wenn sich etwas zu gut anhört, um wahr zu sein, gibt es
  immer einen Haken."'
line:087180e: '"Ich bin bereits ohne deine Hilfe die Stärkste! Ich brauche das nicht!"'
line:0ebbfcf: '"Das kommt mir alles ein wenig verdächtig vor … Ich verzichte lieber."'
line:07974a1: '"Das ist nicht notwendig. Wenn du bereits involviert bist, wozu braucht
  man noch einen Spezialisten für Vorfälle wie mich?"'
