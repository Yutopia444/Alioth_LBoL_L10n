line:0670be2: '"Vergiss nicht, es zu tragen, damit es jeder sehen kann!"'
line:059fbd3: '"Kostenlos? Dann nehme ich eins und am besten eine Nummer größer."'
line:00d22b0: '[Verlassen] Nichts passiert.'
line:0fc2c16: '"{Censor:select false=\"Ähm, ''Kaguya-chan''? Wieso sprichst du so,
  wie peinlich\" true=\"Dein Outfit zuvor war auch schon seltsam … Vergessen wir das
  einfach\"}."'
line:008fa52: '"Komm schon, lass uns Kaguya-chan gemeinsam unterstützen!"'
line:0678716: '[Kleidung annehmen] Erhalte Ausstellungsstück: |Idol T-Shirt|.'
line:063a72b: '"Meinen Recherchen zufolge ist Kaguya-chan sehr warmherzig und nett,
  im Gegensatz zu den anderen Mondbewohnern."'
line:0ba9037: '"Kostenlos? Dann nehme ich eins."'
line:01566ec: '[Kleidung annehmen] Erhalte Ausstellungsstück: |Idol T-Shirt (Large)|.'
line:0ba87b6: '"Vergiss nicht, es zu tragen, damit es jeder sehen kann!"'
line:0e45c03: '"Selbstverständlich nehme ich das Größte!"'
line:00d286e: '"Ich muss nicht dafür bezahlen? Dann werde ich meine Schwester dazu
  bringen, es heute Nacht anzuziehen."'
line:062b5d5: '"Kostenlos? Das heißt, ich kann es mir ausleihen und muss es nicht
  zurückgeben, richtig?"'
line:0f24388: '"Dinge, die für die Stärkste bestimmt sind, sollten immer kostenlos
  sein."'
line:022c403: '"Sagtest du eben kostenlos? Das Souvenir, dass ich der Herrin dieses
  Mal mitbringe, ist äußerst einzigartig."'
line:0a28c4c: '"Das ist eine gute Gelegenheit, bitte gib mir das Größere!"'
line:0c1968a: '"Ich werde das für Meiling als Souvenir mitnehmen. Gib mir einfach
  das Größere."'
line:055f5d6: '"Das würde sich nicht einmal gut als Putzlappen eignen."'
line:0bd1ffa: '"Wenn ich schwarze Kleidung trage, schmilzt das Eis …"'
line:00a6aad: '"Wow! Das~ ist~ überhaupt nicht süß!"'
line:0a99c1c: '"Dann nehme ich das Größere! Das sieht gut aus!"'
