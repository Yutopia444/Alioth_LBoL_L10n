line:05575e9: '[Helfen] Erhalte: |{0}|.'
line:09ee960: '"Was ist ein geistiges Eigentum? Ich weiß nur, dass diese Drohnen nervig
  sind."'
line:0ddd7b7: '[Fortsetzen]'
line:0b93b5a: '[Ablehnen] Erhalte drei zufällige Werkzeugkarten und Unglück: |{0}|.'
line:0a26145: '"Wieso kommandiert mich ein Mondhase herum? Muss ich dir erst eine
  Lektion erteilen?"'
line:06797b6: '"… Hmm? Ein Mondhase besucht die Erde, um Dangos zu kaufen? Sehr seltsam."'
line:0c1abfc: '"Wow! Wer hat all diese Apparate zurückgelassen …"'
line:095a793: '[Nicht meine Angelegenheit] Nichts passiert.'
line:0e80e9a: '"Oh, hi {0}~ Du bist doch den Drohnen der Kappas begegnet, richtig?"'
line:0deca08: "\"Sehr freundlich von dir! Diese Waffe wurde als Gegenmaßnahme von\
  \ der Mondhauptstadt entwickelt, sie wird dir sicher weiterhelfen.\"\n(Nun muss\
  \ ich mich nicht darum kümmern und Tests durchführen~)"
line:080f7f2: Ringo holt ein seltsames, stabförmiges Instrument heraus und wedelt
  damit vor {0} herum. Sie lässt etwas Zeug fallen und flüchtet.
line:065ee92: '"Wenn ein Yama einen Urheberrechtsstreit lösen kann, könnte sie vielleicht
  auch etwas gegen die Streiks der Mondhasen unternehmen."'
line:00a9945: '"Das sind nämlich Plagiate unserer Modelle aus der Mondhauptstadt.
  Wir hoffen, dass du uns dabei helfen kannst, unser geistiges Eigentum zu schützen."'
line:0bfddbe: '"Vielleicht solltest du dich für solche Angelegenheiten an Eiki wenden."'
line:0b3160d: '"Nein, nein, nein! Ich würde es nicht wagen! Vergiss es einfach, du
  hast nur einen Hasen getroffen, der sich Dangos kaufen wollte."'
line:082e36e: '"Drohnen auszulöschen ist ein Kinderspiel."'
line:0250688: '"Dieses Gerät wird also Drohne genannt. Dann werde ich nicht zögern,
  sie zu zerstören."'
line:0659c8a: '"Ich hasse Drohnen, sie lassen sich nicht einfrieren. Ich werde sie
  alle vernichten!"'
line:00f11f7: '"Ich bin die Stärkste! Wenn du mir nicht glaubst, werde ich dich einfrieren."'
line:0e52736: '"Mondbewohner und deren Angelegenheiten bedeuten nichts als Ärger.
  Lasst mich daher aus dem Spiel."'
line:01cf70f: '"Ich unterzeichne keine Verträge, ohne das Kleingedruckte gelesen zu
  haben. Bis dann."'
line:057628f: '"Uh, von diesem langen Text wird mir schwindelig."'
line:00f79ea: '"Gehörst du etwa auch zu diesen Telefonbetrügern? Soll ich dich hier
  und jetzt zur Strecke bringen?"'
line:06e4380: '"Das kommt mir seltsam vor, soll ich meine Schwester dazuholen?"'
line:010ac9a: '"Das war vielleicht ein wenig zu viel verlangt von einer Fee …"'
line:0d19c44: '"Ich wünschte, es würden ein paar einfachere Klienten auftauchen. Als
  Verkäufer im Außendienst hat man es echt nicht leicht …"'
line:014c651: '"Das ist ein guter Einwand, du hast mich überzeugt …"'
line:0ed06df: '"Ich verstehe solche Sachen wie geistiges Eigentum nicht und ich möchte
  es auch nicht verstehen."'
line:0966360: '"Aber da steht doch gar kein Kleingedrucktes … Warte, lass mich selbst
  kurz schauen."'
