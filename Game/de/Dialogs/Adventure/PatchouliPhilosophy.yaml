line:04eeb1a: '[Ablehnen] Nichts passiert.'
line:071a8e9: '"Danke, Patchouli. Ich wusste nicht, dass du so nett bist~"'
line:03b4cbd: Es scheint so, als ob Patchouli diese magischen Juwelen studiert.
line:06ad387: '"Hmm, ich verstehe …"'
line:01cdad3: '[Akzeptieren] {0}'
line:0b23fed: "\"Was für ein Zufall, {0}. Ich kann mithilfe dieser Juwelen deine Affinität\
  \ verbessern.\n(Ein mehr als ausreichendes Testsubjekt)"
line:0cbf9f4: '"Wovon redest du da?"'
line:0e78dc7: '"Vielen Dank. Möchtest du, dass ich dir auf dem Rückweg einen Tee mitbringe?"'
line:07acb35: Wandle ein farbiges Mana in deiner Manabasis in ein Philosophen-Mana
  um.
line:013e396: '"Also, für welches Manajuwel hast du dich entschieden?"'
line:0725f8e: '"Etwas Earl Grey wäre perfekt. Ich danke dir~"'
line:0fb491d: '{0} konnte fühlen, dass sie nun einen mächtigen Fluss an Mana kanalisieren
  kann.'
line:044f4bc: '"Dabei bin ich extra hierhergekommen …"'
line:04b1f03: '"Schon gut, ich bin in Topform."'
line:01c44c8: '"Schon in Ordnung, ich kann selbst Anpassungen vornehmen, sobald ich
  wieder zuhause bin."'
line:0bc2af5: '"Ein Idiot macht mir also schon Komplimente …"'
line:0f3e81b: '"Dann solltest du besser zurückzahlen, was du mir schuldest …"'
line:035363d: '"Die Bewohner der scharlachroten Villa haben es wirklich drauf!"'
line:0cfade6: '"Ich will nicht mehr dazu gezwungen werden, Getränke für dich zu kühlen!"'
line:0465dee: '"Die Zeit für gekühlte Getränke ist noch nicht gekommen …"'
line:092f7e3: '"Ich bezweifle, dass ich ihr das erklären kann. Da kann man nichts
  machen …"'
line:0874548: '"Ich verstehe nicht ganz, warum du das plötzlich ansprichst."'
line:07939f8: '"Vielleicht ist es eine seltene Gelegenheit an Geld zu kommen, die
  hatten es ja wirklich eilig …"'
line:066cc93: '"Irgendwie habe ich das Gefühl, das ist nur ein Vorwand, damit du deine
  Schulden eintreiben kannst."'
line:04fba63: '"Ach, schon gut. Komm einfach später vorbei, wenn du weiter recherchieren
  möchtest."'
