line:09ab42a: Ich wurde besiegt, besiegt …
line:0b383a1: Nun sag mir, wer ist der Übeltäter und wo befindet er sich?
line:0b24c1c: "Ganz ruhig, ich habe nie behauptet, dass ich die Identität kenne.\n\
  Das Manajuwel flog in Richtung See des Windgottes, dort müsstest du die gesuchte\
  \ Person finden."
line:0ea1bf1: Am See des Windgottes! Das ist doch wieder eine Masche des Moriya-Schreins.
line:0eb0243: Ob du den wahren Übeltäter finden kannst, bleibt unklar.
