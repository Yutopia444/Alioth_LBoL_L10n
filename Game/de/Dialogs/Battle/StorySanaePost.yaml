line:00c39ca: '{0} fehlten die Gegenstände, um den wahren Übeltäter aufzuspüren. Bitte
  achte auf die Ausstellungsstücke, die aus der Außenwelt stammen.'
line:0e4c109: Verdammt! Ich war einen Zug davon entfernt, "Emr*kul, die zerfetzten
  Zeitalter" zu beschwören!
line:0e4760b: Aber die Juwelen wurden in der Nähe des Sees des Windgottes gesichtet,
  oder etwa nicht? Habe ich etwas Wichtiges übersehen?
line:0f042cd: Ich war es wirklich nicht, ich habe heute Nacht nur nach einem Gegner
  für ein Kartenduell gesucht.
line:00850b4: Du bist so begriffsstutzig, {0}. Das Radar, das ich dir gegeben habe,
  hat den wahren Übeltäter bereits aufgespürt.
line:0ef03b9: Ist es {0}? Wie langweilig, das war mir schon längst klar.
line:07de4c3: Wird es nicht langsam Zeit, dass der Übeltäter sein Geständnis ablegt?
line:0bd9337: Das |{1}|, welches |{0}| mit sich führt, blockiert das Signal vom |{2}|.
  Der wahre Übeltäter konnte nicht gefunden werden.
