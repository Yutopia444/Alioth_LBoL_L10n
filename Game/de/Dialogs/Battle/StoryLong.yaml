line:0a40c82: Verlässliche Informationen haben allerdings ihren Preis.
line:0ec2b1b: Ich habe hier die ganze Nacht lang die Sterne beobachtet, daher weiß
  ich genau, wo sich die gesuchte Person aufhält.
line:093599e: Ich sehe schon, du bist so höflich wie eh und je.
line:08c8590: Hey du, Tengu!
line:01abffb: Du hast echt Nerven mich zu erpressen!
line:054cea5: Kam hier jemand vorbei, der den Eindruck eines Diebes gemacht hat?
