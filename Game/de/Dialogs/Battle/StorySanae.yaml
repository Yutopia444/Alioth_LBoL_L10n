line:0068a0e: Du führst definitiv etwas im Schilde.
line:0d8bd8d: Wovon redest du da? Ich habe mir nur die Exposition angesehen!
line:05f9530: Endlich bin ich da, der Youkai-Schrein am Gipfel des Berges.
line:09f307c: Wieso tauchst du hier mitten in der Nacht auf? Du führst doch was im
  Schilde, nicht wahr {0}?
